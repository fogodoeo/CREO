<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4f1e9">
    <meta name="description" content="20개의 선택으로 알아보는 크레와트 성향 테스트">
    <meta property="og:title" content="CREWARTS PERSONALITY TEST">
    <meta property="og:description" content="20개의 선택으로 알아보는 크레 앞의 나">
    <title>CREWARTS PERSONALITY TEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link rel="stylesheet" href="crewart-survey-v2.css?v=20260720-band-first-v1">
    <script src="supabase-bridge.js?v=20260717-egress-hotfix-v1"></script>
    <script src="assets/vendor/kakao-2.8.1.min.js"></script>
    <script src="crewart-survey-core.js?v=20260718-cre-mbti-v4"></script>
    <script src="crewart-survey.js?v=20260720-band-first-v2" defer></script>
</head>
<body>
    <div class="cw-atmosphere" aria-hidden="true"><i></i><i></i><i></i></div>

    <main class="cw-app" id="app">
        <section class="cw-screen cw-intro is-active" id="intro-screen">
            <video class="cw-intro-video" id="intro-video" autoplay muted loop playsinline webkit-playsinline preload="auto" tabindex="-1" disablepictureinpicture controlslist="nodownload nofullscreen noplaybackrate" aria-hidden="true">
                <source src="assets/crewarts-sealing-wax.mp4" type="video/mp4">
            </video>
            <div class="cw-intro-content">
                <header class="cw-intro-heading">
                    <h1><span class="cw-wordmark is-pending" id="crewart-wordmark">CREWARTS</span><small>PERSONALITY TEST</small></h1>
                    <p class="cw-intro-copy">20문항 · 약 2분</p>
                </header>
                <div class="cw-intro-actions">
                    <button class="cw-band-entry" id="band-float" type="button" disabled>
                        <span aria-hidden="true">B</span><strong id="band-float-label">BAND 로그인하고 테스트</strong>
                    </button>
                    <small class="cw-intro-note" id="band-entry-note">BAND 연결 상태를 확인하고 있어요</small>
                    <button class="cw-guest-entry" id="start-button" type="button" disabled>
                        <span>로그인 없이 테스트하기</span>
                    </button>
                </div>
            </div>
        </section>

        <section class="cw-screen cw-test" id="question-screen" hidden>
            <header class="cw-progress-head">
                <button class="cw-back-button" id="question-back" type="button" aria-label="이전 질문">‹</button>
                <div class="cw-progress-copy"><span id="progress-text">1 / 20</span><small id="progress-axis">크레 앞의 나를 찾는 중</small></div>
                <span class="cw-progress-space" aria-hidden="true"></span>
            </header>
            <div class="cw-progress-track" aria-hidden="true"><i id="progress-bar"></i></div>
            <article class="cw-question-card" id="question-card" aria-live="polite">
                <p id="question-label"></p>
                <h1 id="question-title"></h1>
                <figure class="cw-question-illustration" id="question-illustration">
                    <img id="question-image" src="" alt="" width="960" height="640" decoding="async">
                </figure>
                <div class="cw-choice-list" id="choice-list"></div>
            </article>
        </section>

        <section class="cw-screen cw-mbti" id="mbti-screen" hidden>
            <header class="cw-simple-head">
                <h1>평소 MBTI는?</h1>
                <p>모르면 바로 결과를 볼 수 있어요.</p>
            </header>
            <div class="cw-mbti-grid" id="mbti-grid" aria-label="평소 MBTI 선택"></div>
            <div class="cw-mbti-actions">
                <button class="cw-secondary-button" id="mbti-unknown" type="button">잘 모르겠어요</button>
                <button class="cw-primary-button" id="show-result" type="button" disabled><span>결과 보기</span></button>
            </div>
        </section>

        <section class="cw-screen cw-result" id="result-screen" hidden>
            <div id="result-content"></div>
        </section>
    </main>

    <button class="cw-top-home" id="persistent-home-button" type="button" aria-label="크레와트 메인으로 돌아가기" title="크레와트 메인으로 돌아가기" hidden>처음으로</button>

    <footer class="cw-persistent-footer" id="survey-footer" hidden>
        <div class="cw-persistent-footer-inner">
            <button class="cw-persistent-band" id="persistent-band-button" type="button" disabled>
                <span aria-hidden="true">B</span>
                <strong id="persistent-band-label">BAND 연결 확인 중</strong>
            </button>
            <small id="persistent-band-note">현재 테스트 내용을 저장하고 같은 화면으로 돌아와요.</small>
        </div>
    </footer>

    <section class="cw-guest-dialog" id="guest-confirm" role="dialog" aria-modal="true" aria-labelledby="guest-confirm-title" hidden>
        <div class="cw-guest-dialog-card">
            <button class="cw-dialog-close" id="guest-confirm-close" type="button" aria-label="닫기">×</button>
            <span class="cw-dialog-band-mark" aria-hidden="true">B</span>
            <h2 id="guest-confirm-title">BAND 로그인 없이<br>테스트할까요?</h2>
            <p>로그인하면 테스트 결과가 크레와트 BAND 활동과 연결돼요.</p>
            <ul>
                <li>기숙사별 상품·이벤트 혜택</li>
                <li>경매 참여 시 회원 할인</li>
                <li>선택 분석과 상세 결과 열람</li>
            </ul>
            <small>로그인 없이도 테스트할 수 있지만 상세 결과 일부는 제한됩니다.</small>
            <button class="cw-dialog-band-button" id="guest-confirm-band" type="button"><span aria-hidden="true">B</span><strong>BAND 로그인하고 계속</strong></button>
            <button class="cw-dialog-continue" id="guest-confirm-continue" type="button">그래도 로그인 없이 테스트하기</button>
        </div>
    </section>

    <div class="cw-toast" id="toast" role="status" aria-live="polite"></div>
    <noscript>이 테스트를 이용하려면 자바스크립트를 켜주세요.</noscript>
</body>
</html>
