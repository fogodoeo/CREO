        let broadcastConfigCache = null;
        let broadcastConfigCacheAt = 0;

        async function getBroadcastConfigCached(force = false) {
            const now = Date.now();
            if (!force && broadcastConfigCache && now - broadcastConfigCacheAt < 750) {
                return broadcastConfigCache;
            }
            broadcastConfigCache = await getRuntimeConfigMap(force);
            broadcastConfigCacheAt = now;
            return broadcastConfigCache;
        }

        async function refreshBracketPage(prefetchedItems) {
            try {
                const [map, items] = await Promise.all([
                    getBroadcastConfigCached(false),
                    Array.isArray(prefetchedItems) ? Promise.resolve(prefetchedItems) : getBroadcastItemsLite()
                ]);
                battleItemsCache = items || [];
                battleItemsCacheAt = Date.now();
                applyBracketPageMap(map, items);
                await refreshBattleOverlayState(map, items);
            } catch (err) {
                console.error('refreshBracketPage error', err);
                throw err;
            }
        }

        let bracketFullRenderId = 0;
        let battleItemsCache = [];
        let battleItemsCacheAt = 0;
        let battleItemsRequest = null;

        async function getBattleItemsCached() {
            if (battleItemsCache.length && Date.now() - battleItemsCacheAt < 1500) {
                return battleItemsCache;
            }
            if (battleItemsRequest) return battleItemsRequest;
            battleItemsRequest = getBroadcastItemsCached(false, 15000)
                .then(items => {
                    battleItemsCache = items || [];
                    battleItemsCacheAt = Date.now();
                    return battleItemsCache;
                })
                .finally(() => { battleItemsRequest = null; });
            return battleItemsRequest;
        }

        function getBracketViewRound(scale, map) {
            let round = parseInt(map?.bracket_view_round, 10);
            const currentParts = String(map?.battle_current_match || '').split('_');
            if (!round && currentParts.length >= 2) round = parseInt(currentParts[1], 10);
            if (!round || round > scale) round = scale;
            return round;
        }

        function getCurrentMatchContext(map) {
            const parts = String(map?.battle_current_match || '').split('_');
            return {
                round: parts.length >= 2 ? (parseInt(parts[1], 10) || 0) : 0,
                group: parts.length >= 3 ? (parseInt(parts[2], 10) || 0) : 0
            };
        }

        async function renderBracketPageTree(scale, bracket, map, providedItems = null) {
            const renderId = ++bracketFullRenderId;
            const tree = document.getElementById('bracket-page-tree-full');

            // 전체 결과는 수동 winner 값이 아니라 실제 낙찰 완료 데이터로 계산한다.
            let items = providedItems && providedItems.length ? providedItems : [];
            if (!items || !items.length) {
                try { items = await getBattleItemsCached(); } catch (e) {
                console.error('Failed to load auction results for bracket', e);
            }
            }
            if (renderId !== bracketFullRenderId) return;
            const displayScale = getBracketViewRound(scale, map);
            // 전체 대진 점수도 현재 표시 라운드 데이터만 사용한다.
            // 결승 편성 전에는 과거 4강 낙찰액을 결승 점수로 재사용하지 않는다.
            items = scopeTournamentItems(items, displayScale);
            tree.innerHTML = '';
            const activeAuctionItem = items.find(item => isAuctionActiveItem(item));
            const activeAuctionCode = getCleanCode(activeAuctionItem) || '';

            // 업체 로고 맵 구성 (업체명 -> 로고URL)
            const teamLogoMap = {};
            for (let i = 1; i <= 20; i++) {
                const raw = map['team_logo' + i];
                if (!raw) continue;
                try {
                    const obj = JSON.parse(raw);
                    if (obj.name && obj.url) teamLogoMap[obj.name.trim()] = obj.url;
                } catch(e) {}
            }
            // 이름 매칭 헬퍼: 정확매칭 우선, 없으면 포함 매칭
            function getTeamLogo(teamName) {
                if (!teamName) return '';
                const t = teamName.trim();
                if (teamLogoMap[t]) return teamLogoMap[t];
                // 부분 매칭 (로고 등록명이 팀명에 포함되거나 반대)
                for (const [name, url] of Object.entries(teamLogoMap)) {
                    if (t.includes(name) || name.includes(t)) return url;
                }
                return '';
            }

            const isAuctionDone = item => item && ['완료', 'sold', '낙찰', '유찰'].includes(item.status);
            const toPrice = item => Number.parseFloat(item?.sold_price || item?.soldPrice || 0) || 0;
            const matchCount = tournamentStageMatchCount(scale);
            // 개체 경매 화면의 블라인드 정책과 분리한다. 전체 대진은
            // 운영자가 이 전용 토글로 업체 공개 여부를 결정한다.
            const fullBracketBlind = Number(displayScale) === 2
                ? false
                : String(map.bracket_full_blind ?? '1') !== '0';

            let schedule = [];
            try { if (map.battle_schedule) schedule = JSON.parse(map.battle_schedule); } catch (e) {}
            const roundsByMatch = {};
            schedule.forEach(step => {
                if (step?.matchKey) roundsByMatch[step.matchKey] = Number(step.roundsPerMatch) || 4;
            });

            // 1라운드 매칭으로 회사명 -> 알파벳 매핑 생성 (가장 큰 대진표 기준으로 매핑해야 개체 코드 A1~P4와 매치됨)
            const teamToLetter = {};
            
            function hasAnyMatches(br) {
                if (!br || !br.matches) return false;
                return Object.values(br.matches).some(m => (m.left && m.left.trim()) || (m.right && m.right.trim()));
            }

            let baseBracket = null;
            let baseScale = 0;
            const activeScale = Number.parseInt(map.active_tournament || '', 10);
            if ([16, 8, 4, 2].includes(activeScale) && map['tournament_bracket_' + activeScale]) {
                try {
                    const parsed = JSON.parse(map['tournament_bracket_' + activeScale]);
                    if (hasAnyMatches(parsed)) {
                        baseBracket = parsed;
                        baseScale = activeScale;
                    }
                } catch(e){}
            }
            [16, 8, 4, 2].forEach(candidateScale => {
                if (baseBracket || !map['tournament_bracket_' + candidateScale]) return;
                try {
                    const parsed = JSON.parse(map['tournament_bracket_' + candidateScale]);
                    if (hasAnyMatches(parsed)) {
                        baseBracket = parsed;
                        baseScale = candidateScale;
                    }
                } catch(e){}
            });
            if (!baseBracket) {
                baseBracket = bracket;
                baseScale = scale;
            }
            const baseMatchCount = tournamentStageMatchCount(baseScale);
            for (let i = 1; i <= baseMatchCount; i++) {
                const matchKey = baseScale + '_' + i;
                const match = baseBracket.matches[matchKey] || { left: '', right: '', winner: '' };
                const leftLetter = String.fromCharCode(65 + (i - 1) * 2);      // A, C, E...
                const rightLetter = String.fromCharCode(65 + (i - 1) * 2 + 1);  // B, D, F...
                if (match.left) teamToLetter[match.left.trim()] = leftLetter;
                if (match.right) teamToLetter[match.right.trim()] = rightLetter;
            }
            
            // 실시간 대진과 동일한 기준으로 현재 표시 라운드를 결정한다.
            const round = displayScale;
            const rMatchCount = tournamentStageMatchCount(round);
            const roundTitle = round === 2 ? '결승·3·4위전' : `${round}강`;
            const board = document.createElement('section');
            const shouldAnimate = window._animateFullResults === true;
            window._animateFullResults = false;
            board.className = 'sports-results-board' + (shouldAnimate ? ' animate-in' : '');
            board.innerHTML = `
                <header class="sports-results-header">
                    <div class="sports-results-heading">
                        <span class="sports-results-kicker">CDCUP MATCH CENTER</span>
                        <h2 class="sports-results-title">${roundTitle} 전체 경기 결과</h2>
                    </div>
                    <span class="sports-results-live">LIVE MATCH RESULTS</span>
                </header>
            `;
            const col = document.createElement('div');
            col.className = 'sports-results-grid';
            if (rMatchCount === 1) col.style.gridTemplateColumns = 'minmax(0, 1fr)';

            for (let i = 1; i <= rMatchCount; i++) {
                const matchKey = round + '_' + i;
                const match = bracket.matches[matchKey] || { left: '', right: '', winner: '' };
                
                const leftL = teamToLetter[match.left?.trim()] || String.fromCharCode(65 + (i - 1) * 2);
                const rightL = teamToLetter[match.right?.trim()] || String.fromCharCode(65 + (i - 1) * 2 + 1);
                const roundsPerMatch = roundsByMatch[matchKey]
                    || getTournamentMatchRoundCount(items, i, tournamentRoundsPerMatch(map, round, i));
                let ls = 0, rs = 0, draws = 0, completedRounds = 0;
                let leftTotal = 0, rightTotal = 0;

                for (let r = 1; r <= roundsPerMatch; r++) {
                    const leftItem = findItemByCode(items, leftL + r);
                    const rightItem = findItemByCode(items, rightL + r);
                    if (isAuctionDone(leftItem)) leftTotal += toPrice(leftItem);
                    if (isAuctionDone(rightItem)) rightTotal += toPrice(rightItem);
                    if (!isAuctionDone(leftItem) || !isAuctionDone(rightItem)) continue;
                    const leftPrice = toPrice(leftItem);
                    const rightPrice = toPrice(rightItem);
                    completedRounds++;
                    if (leftPrice > rightPrice) ls++;
                    else if (rightPrice > leftPrice) rs++;
                    else draws++;
                }

                const isComplete = completedRounds === roundsPerMatch;
                let calculatedWinner = '';
                if (completedRounds > 0) {
                    if (leftTotal > rightTotal) calculatedWinner = 'left';
                    else if (rightTotal > leftTotal) calculatedWinner = 'right';
                    else if (isComplete) calculatedWinner = 'draw';
                }
                const hasScore = completedRounds > 0;
                const displayWinner = calculatedWinner || (!hasScore ? match.winner : '');
                
                const node = document.createElement('article');
                const isCurrent = !isComplete && Boolean(activeAuctionCode) && (
                    activeAuctionCode.startsWith(leftL) || activeAuctionCode.startsWith(rightL)
                );
                node.className = 'sports-match-card' + (isCurrent ? ' is-current' : '') + (fullBracketBlind ? ' is-blind' : '');
                node.style.setProperty('--match-index', i - 1);
                const titleText = tournamentMatchTitle(round, i);
                const leftWin = displayWinner === 'left';
                const rightWin = displayWinner === 'right';
                const stateText = isComplete ? 'FINAL' : (isCurrent ? 'LIVE' : (completedRounds > 0 ? `${completedRounds}/${roundsPerMatch}` : ''));
                const leftName = fullBracketBlind ? leftL + '팀' : (match.left || '대기 중');
                const rightName = fullBracketBlind ? rightL + '팀' : (match.right || '대기 중');
                const leftScore = leftTotal;
                const rightScore = rightTotal;
                const scoreLabel = '합산 낙찰금액';

                const leftLogo = fullBracketBlind ? '' : getTeamLogo(match.left);
                const rightLogo = fullBracketBlind ? '' : getTeamLogo(match.right);

                node.innerHTML = `
                    <div class="sports-match-meta">

                        <span class="sports-match-state">${stateText}</span>

                    <div class="sports-scoreline">

                        <div class="sports-team sports-team--left${leftWin ? ' is-leading' : ''}">
                            <span class="sports-team-code">${fullBracketBlind ? 'BLIND ' + esc(leftL) : esc(leftL) + ' TEAM'}</span>

                            <span class="${leftWin ? 'is-leading' : ''}">${leftScore}</span>
                            <i class="sports-score-separator">:</i>
                            <span class="${rightWin ? 'is-leading' : ''}">${rightScore}</span>
                            
                        </div>
                        <div class="sports-team sports-team--right${rightWin ? ' is-leading' : ''}">
                            <span class="sports-team-code">${fullBracketBlind ? 'BLIND ' + esc(rightL) : esc(rightL) + ' TEAM'}</span>
                            <strong class="sports-team-name">${esc(rightName)}</strong>
                        </div>
                        ${fullBracketBlind ? '' : (rightLogo ? `<img src="${rightLogo}" class="sports-team-logo" alt="" onerror="this.style.display='none'">` : '<div class="sports-logo-placeholder"></div>')}
                    </div>
                    <div class="sports-match-footer">
                        <span>${leftTotal > 0 ? `${leftTotal.toLocaleString()}만원` : '-'}</span>
                        <span class="sports-match-draws">${isComplete ? 'FINAL' : (completedRounds > 0 ? `${completedRounds}/${roundsPerMatch}` : '')}</span>
                        <span>${rightTotal > 0 ? `${rightTotal.toLocaleString()}만원` : '-'}</span>
                    </div>
                `;
                col.appendChild(node);
            }
            board.appendChild(col);
            // 안내문구 제거됨
            tree.appendChild(board);

            // ── 이벤트 매치 전체 결과 (토너먼트 그리드 안에 합침) ──
            const eventShowConfig = String(map?.event_match_show ?? '0') === '1';
            if (eventShowConfig) {
                const eventRows = getEventMatchRows(items);
                if (eventRows.length >= 2) {
                    const eventSorted = [...eventRows].sort((a, b) => b.total - a.total);

                    // 구분선
                    const divider = document.createElement('div');
                    divider.style.cssText = 'grid-column: 1 / -1; border-top: 1px solid rgba(56,189,248,0.2); margin: 8px 0 4px; display:flex; align-items:center; gap:8px; padding-top:8px;';
                    divider.innerHTML = '<span style="font-size:11px;font-weight:800;color:#38bdf8;letter-spacing:0.08em;">EVENT MATCH</span>';
                    col.appendChild(divider);

                    // 이벤트 매치 카드
                    const evNode = document.createElement('article');
                    const allComplete = eventSorted.every(r => r.soldCount === r.itemCount && r.itemCount > 0);
                    evNode.className = 'sports-match-card' + (allComplete ? '' : ' is-current');
                    evNode.style.cssText = 'grid-column: 1 / -1;';
                    evNode.style.setProperty('--match-index', 0);

                    const leftEv = eventSorted[0];
                    const rightEv = eventSorted[1];
                    const leftEvWin = leftEv.total > rightEv.total && leftEv.total > 0;
                    const rightEvWin = rightEv.total > leftEv.total && rightEv.total > 0;
                    const evState = allComplete ? 'FINAL' : 'LIVE';

                    const leftEvLogo = fullBracketBlind ? '' : getTeamLogo(leftEv.company);
                    const rightEvLogo = fullBracketBlind ? '' : getTeamLogo(rightEv.company);

                    evNode.innerHTML = `
                        <div class="sports-match-meta">
                            <span>이벤트 매치</span>
                            <span class="sports-match-state" style="background:rgba(56,189,248,0.12);color:#38bdf8;">${evState}</span>
                        </div>
                        <div class="sports-scoreline">
                            ${leftEvLogo ? '<img src="' + leftEvLogo + '" class="sports-team-logo" alt="" onerror="this.style.display=\'none\'">' : '<div class="sports-logo-placeholder"></div>'}
                            <div class="sports-team sports-team--left${leftEvWin ? ' is-leading' : ''}">
                                <span class="sports-team-code">${leftEv.soldCount}/${leftEv.itemCount}</span>
                                <strong class="sports-team-name">${esc(leftEv.company)}</strong>
                            </div>
                            <div class="sports-score${allComplete ? ' is-total' : ''}" aria-label="합산 ${leftEv.total} 대 ${rightEv.total}">
                                <span class="${leftEvWin ? 'is-leading' : ''}">${leftEv.total}</span>
                                <i class="sports-score-separator">:</i>
                                <span class="${rightEvWin ? 'is-leading' : ''}">${rightEv.total}</span>
                                
                            </div>
                            <div class="sports-team sports-team--right${rightEvWin ? ' is-leading' : ''}">
                                <span class="sports-team-code">${rightEv.soldCount}/${rightEv.itemCount}</span>
                                <strong class="sports-team-name">${esc(rightEv.company)}</strong>
                            </div>
                            ${rightEvLogo ? '<img src="' + rightEvLogo + '" class="sports-team-logo" alt="" onerror="this.style.display=\'none\'">' : '<div class="sports-logo-placeholder"></div>'}
                        </div>
                        <div class="sports-match-footer">
                            <span>${leftEv.total > 0 ? leftEv.total.toLocaleString() + '만원' : '-'}</span>
                            <span class="sports-match-draws">${allComplete ? 'FINAL' : leftEv.soldCount + rightEv.soldCount + '/' + (leftEv.itemCount + rightEv.itemCount)}</span>
                            <span>${rightEv.total > 0 ? rightEv.total.toLocaleString() + '만원' : '-'}</span>
                        </div>
                    `;
                    col.appendChild(evNode);
                }
            }
        }


        function maskAuctionWinner(value) {
            const raw = String(value || '').trim();
            const name = raw.split(/[\/|,(]/)[0].trim().replace(/[0-9-]/g, '').trim();
            if (!name) return '낙찰자';
            if (name.length === 1) return name + '*';
            return name.charAt(0) + '*'.repeat(Math.min(2, name.length - 1));
        }

        function formatAuctionMotionPrice(value) {
            const raw = String(value || '').trim();
            const num = Number(raw.replace(/[^0-9.]/g, ''));
            if (!Number.isFinite(num)) return raw || '-';
            return num.toLocaleString() + '만원';
        }

        function repaintBracketFromLatestMap() {
            if (window.latestConfigMap) applyBracketPageMap(window.latestConfigMap);
        }

        function clearAuctionMotionPortal() {
            const portal = document.getElementById('auction-motion-portal');
            if (!portal) return;
            portal.innerHTML = '';
            delete portal.dataset.motionKey;
        }

        function syncAuctionMotionPortal(html, key) {
            const portal = document.getElementById('auction-motion-portal');
            if (!portal) return;
            if (!html) {
                clearAuctionMotionPortal();
                return;
            }
            if (portal.dataset.motionKey === key) return;
            portal.dataset.motionKey = key;
            portal.innerHTML = html;
        }

        function getLiveAuctionState() {
            if (!window._liveAuctionState) {
                window._liveAuctionState = {
                    initialized: false,
                    itemStatus: new Map(),
                    playedEvents: new Set(),
                    queue: [],
                    motion: null,
                    timer: null
                };
            }
            return window._liveAuctionState;
        }

        function resolveScheduleRoundCount(roundsPerMatch, group) {
            if (roundsPerMatch && typeof roundsPerMatch === 'object') {
                return Math.max(1, Number.parseInt(roundsPerMatch[group], 10) || 1);
            }
            return Math.max(1, Number.parseInt(roundsPerMatch, 10) || 1);
        }

        function buildRotatingAuctionSchedule(matchCount, roundsPerMatch) {
            const steps = [];
            const maxRounds = Math.max(...Array.from({ length: matchCount }, (_, index) =>
                resolveScheduleRoundCount(roundsPerMatch, index + 1)
            ));
            for (let round = 1; round <= maxRounds; round++) {
                const startGroup = ((round - 1) % matchCount) + 1;
                for (let index = 0; index < matchCount; index++) {
                    const group = ((startGroup - 1 + index) % matchCount) + 1;
                    if (round > resolveScheduleRoundCount(roundsPerMatch, group)) continue;
                    steps.push({
                        group,
                        round
                    });
                }
            }
            return steps;
        }

        function getTournamentRoundCount(items, fallback) {
            const actualCount = (items || []).reduce((highest, item) => {
                const code = String(getItemAuctionMeta(item).tournamentCode || getCleanCode(item) || '').toUpperCase();
                const match = code.match(/^[A-Z]([1-9]\d*)$/);
                return match ? Math.max(highest, Number.parseInt(match[1], 10) || 0) : highest;
            }, 0);
            return actualCount || Math.max(1, Number.parseInt(fallback, 10) || 1);
        }

        function getTournamentMatchRoundCount(items, matchIndex, fallback) {
            const left = String.fromCharCode(65 + (Number(matchIndex) - 1) * 2);
            const right = String.fromCharCode(left.charCodeAt(0) + 1);
            const actualCount = (items || []).reduce((highest, item) => {
                const code = String(getItemAuctionMeta(item).tournamentCode || getCleanCode(item) || '').toUpperCase();
                const match = code.match(/^([A-Z])([1-9]\d*)$/);
                if (!match || (match[1] !== left && match[1] !== right)) return highest;
                return Math.max(highest, Number.parseInt(match[2], 10) || 0);
            }, 0);
            return actualCount || Math.max(1, Number.parseInt(fallback, 10) || 1);
        }

        function finishAuctionMotion() {
            const state = getLiveAuctionState();
            if (state.timer) clearTimeout(state.timer);
            state.timer = null;
            state.motion = null;
            window._auctionMotion = null;
            clearAuctionMotionPortal();
            repaintBracketFromLatestMap();
            const next = state.queue.shift();
            if (next) startAuctionMotion(next);
        }

        function startAuctionMotion(payload) {
            const state = getLiveAuctionState();
            if (!payload || !payload.eventKey || state.playedEvents.has(payload.eventKey)) return;
            if (state.motion) {
                if (!state.queue.some(item => item.eventKey === payload.eventKey)) state.queue.push(payload);
                return;
            }

            state.playedEvents.add(payload.eventKey);
            state.motion = Object.assign({ phase: 'sold', kind: 'auction' }, payload);
            window._auctionMotion = state.motion;
            repaintBracketFromLatestMap();
            state.timer = setTimeout(() => {
                if (payload.roundComplete) {
                    state.motion = Object.assign({}, payload, { phase: 'result', kind: 'auction' });
                    window._auctionMotion = state.motion;
                    repaintBracketFromLatestMap();
                    state.timer = setTimeout(() => {
                        finishAuctionMotion();
                    }, payload.matchComplete ? 7000 : 3600);
                } else {
                    finishAuctionMotion();
                }
            }, 2600);
        }

        async function renderBracketLiveView(scale, bracket, map) {
            const renderId = (window._bracketLiveRenderId || 0) + 1;
            window._bracketLiveRenderId = renderId;
            const tree = document.getElementById('bracket-page-tree-live');
            const titleEl = document.getElementById('bracket-page-title');

            // 결승/3·4위전은 한 경기당 두 업체뿐이라 별도 실시간 대진판을
            // 반복 노출하지 않는다. 현재 경기 정보는 전체 결과판이 담당한다.
            if (Number(scale) === 2) {
                if (tree) {
                    tree.innerHTML = '';
                    tree.dataset.liveRenderKey = '';
                }
                clearAuctionMotionPortal();
                return;
            }

            let items = [];
            try {
                items = scopeTournamentItems(await getBattleItemsCached(), scale);
            } catch(e){}
            if (renderId !== window._bracketLiveRenderId) return;

            // bracket 매치에서 팀 letter 매핑 자동 구성
            const matchCount = tournamentStageMatchCount(scale);
            const letterToTeam = {};
            const letterToGroup = {};
            for (let i = 1; i <= matchCount; i++) {
                const matchKey = scale + '_' + i;
                const m = bracket.matches[matchKey] || { left: '', right: '' };
                const lL = String.fromCharCode(65 + (i - 1) * 2);
                const rL = String.fromCharCode(65 + (i - 1) * 2 + 1);
                if (m.left) { letterToTeam[lL] = m.left.trim(); letterToGroup[lL] = i; }
                if (m.right) { letterToTeam[rL] = m.right.trim(); letterToGroup[rL] = i; }
            }
            const roundsByGroup = {};
            for (let group = 1; group <= matchCount; group++) {
                roundsByGroup[group] = getTournamentMatchRoundCount(
                    items,
                    group,
                    tournamentRoundsPerMatch(map, scale, group),
                );
            }
            let rpm = Math.max(...Object.values(roundsByGroup));

            const doneStatuses = new Set(['완료', 'sold', '낙찰', '유찰']);
            const isDone = item => Boolean(item && doneStatuses.has(item.status));
            const getItemKey = item => String(item?.row || getCleanCode(item) || item?.name || '').trim();

            // 상태 전이를 한 곳에서 소비한다. 같은 낙찰 이벤트는 렌더 횟수와 무관하게 정확히 한 번만 재생된다.
            const auctionState = getLiveAuctionState();
            const newSoldItems = [];
            if (!auctionState.initialized) {
                items.forEach(item => {
                    const key = getItemKey(item);
                    if (key) auctionState.itemStatus.set(key, item.status || '');
                });
                auctionState.initialized = true;
            } else {
                items.forEach(item => {
                    const key = getItemKey(item);
                    if (!key) return;
                    const previousStatus = auctionState.itemStatus.get(key) || '';
                    const currentStatus = item.status || '';
                    if (currentStatus === '낙찰' && previousStatus !== '낙찰') newSoldItems.push(item);
                    if (currentStatus !== '낙찰') auctionState.playedEvents.delete(key + '|낙찰');
                    auctionState.itemStatus.set(key, currentStatus);
                });
            }

            // 저장된 경매 순서와 실제 완료 상태를 함께 보고 아직 끝나지 않은 첫 단계를 찾는다.
            const activeItem = items.find(i => isAuctionActiveItem(i));
            const newestSoldItem = newSoldItems.length ? newSoldItems[newSoldItems.length - 1] : null;
            let detectedRound = 0, detectedGroup = 0, detectedLetter = '';
            let leftTeamLetter = '', rightTeamLetter = '';

            // 라운드가 바뀔 때 시작 조를 한 칸씩 민다.
            // 저장된 과거 스케줄 순서와 무관하게 1R=1조, 2R=2조, 3R=3조...를 보장한다.
            const scheduleSteps = buildRotatingAuctionSchedule(matchCount, roundsByGroup);

            function getPendingAuctionStep() {
                for (const step of scheduleSteps) {
                    const left = String.fromCharCode(65 + (step.group - 1) * 2);
                    const right = String.fromCharCode(65 + (step.group - 1) * 2 + 1);
                    const leftItem = findItemByCode(items, left + step.round);
                    const rightItem = findItemByCode(items, right + step.round);
                    const leftDone = isDone(leftItem);
                    const rightDone = isDone(rightItem);
                    if (leftDone && rightDone) continue;
                    if (leftDone !== rightDone) {
                        return { ...step, code: (leftDone ? right : left) + step.round };
                    }
                    if (step.round === 1) return { ...step, code: left + step.round };
                    const previousLeft = findItemByCode(items, left + (step.round - 1));
                    const previousRight = findItemByCode(items, right + (step.round - 1));
                    const previousLeftPrice = parseFloat(previousLeft?.sold_price || previousLeft?.soldPrice || 0) || 0;
                    const previousRightPrice = parseFloat(previousRight?.sold_price || previousRight?.soldPrice || 0) || 0;
                    return { ...step, code: (previousLeftPrice >= previousRightPrice ? left : right) + step.round };
                }
                return null;
            }

            const pendingStep = getPendingAuctionStep();

            const contextItem = activeItem || newestSoldItem;
            const presentationItem = contextItem || [...items].reverse().find(isDone) || items[0];
            const revealCompany = presentationItem
                ? getBroadcastPresentation(presentationItem, map).visibility === 'public'
                : String(map.bracket_full_blind ?? '1') === '0';
            const displayTeam = letter => revealCompany && letterToTeam[letter] ? letterToTeam[letter] : letter + '팀';
            if (contextItem) {
                const code = (getCleanCode(contextItem) || (contextItem.name || '').trim().toUpperCase());
                if (code && code.length >= 2) {
                    detectedLetter = code.charAt(0);
                    detectedRound = parseInt(code.substring(1), 10) || 0;
                    detectedGroup = letterToGroup[detectedLetter] || 0;
                }
            }

            const motion = auctionState.motion || window._auctionMotion;
            if (!detectedGroup && motion?.group) {
                detectedGroup = motion.group;
                detectedRound = motion.round;
                detectedLetter = motion.side === 'left' ? motion.leftTeamLetter : motion.rightTeamLetter;
            }

            if (!detectedGroup && pendingStep) {
                detectedGroup = pendingStep.group;
                detectedRound = pendingStep.round;
                detectedLetter = pendingStep.code.charAt(0);
            }

            // 모든 경매가 끝난 뒤에는 현재 전체결과가 보고 있는 조를 유지한다.
            if (!detectedGroup && !pendingStep) {
                const currentMatch = getCurrentMatchContext(map);
                if (currentMatch.group > 0 && currentMatch.group <= matchCount) {
                    detectedGroup = currentMatch.group;
                    detectedRound = roundsByGroup[currentMatch.group] || rpm;
                }
            }
            if (!detectedGroup && !pendingStep) {
                const parseAuctionTime = value => {
                    const raw = String(value || '').trim();
                    const timeMatch = raw.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?(?:\.\d+)?(?:Z)?$/);
                    if (timeMatch) {
                        return (Number(timeMatch[1]) * 3600) + (Number(timeMatch[2]) * 60) + Number(timeMatch[3] || 0);
                    }
                    const parsed = Date.parse(raw);
                    return Number.isFinite(parsed) ? parsed : -1;
                };
                const completed = items
                    .map((item, index) => ({ item, index, time: parseAuctionTime(item.start_time) }))
                    .filter(entry => isDone(entry.item))
                    .sort((a, b) => (a.time - b.time) || (a.index - b.index));
                const latest = completed.length ? completed[completed.length - 1].item : null;
                const latestCode = getCleanCode(latest) || '';
                const latestLetter = latestCode.charAt(0);
                const latestRound = parseInt(latestCode.slice(1), 10) || 0;
                const latestGroup = letterToGroup[latestLetter] || 0;
                if (latestGroup && latestRound) {
                    const pairLeft = String.fromCharCode(65 + (latestGroup - 1) * 2);
                    const pairRight = String.fromCharCode(65 + (latestGroup - 1) * 2 + 1);
                    const leftItem = findItemByCode(items, pairLeft + latestRound);
                    const rightItem = findItemByCode(items, pairRight + latestRound);
                    detectedGroup = latestGroup;
                    detectedRound = latestRound;
                    detectedLetter = latestLetter;
                }
            }

            if (detectedGroup > 0) {
                rpm = roundsByGroup[detectedGroup] || rpm;
                leftTeamLetter = String.fromCharCode(65 + (detectedGroup - 1) * 2);
                rightTeamLetter = String.fromCharCode(65 + (detectedGroup - 1) * 2 + 1);
            }

            if (!detectedGroup) {
                tree.innerHTML = '';
                delete tree.dataset.liveRenderKey;
                if (titleEl) titleEl.textContent = '';
                return;
            }

            const isChamp = (detectedRound === rpm);

            // 진행중인 팀 판별 (공개 범위 정책에 따라 업체명 또는 팀 코드 표시)
            const activeSide = detectedLetter === leftTeamLetter ? 'left' : (detectedLetter === rightTeamLetter ? 'right' : '');

            // 라운드별 데이터
            const roundData = [];
            let leftRoundWins = 0, rightRoundWins = 0;
            let leftAuctionTotal = 0, rightAuctionTotal = 0;
            for (let r = 1; r <= rpm; r++) {
                const lItem = findItemByCode(items, leftTeamLetter + r);
                const rItem = findItemByCode(items, rightTeamLetter + r);
                const lp = parseFloat(lItem?.sold_price || lItem?.soldPrice || 0) || 0;
                const rp = parseFloat(rItem?.sold_price || rItem?.soldPrice || 0) || 0;
                const lSold = isDone(lItem);
                const rSold = isDone(rItem);
                const bothDone = lSold && rSold;
                if (lSold) leftAuctionTotal += lp;
                if (rSold) rightAuctionTotal += rp;
                let roundWinner = '';
                if (bothDone) {
                    roundWinner = lp > rp ? 'left' : (rp > lp ? 'right' : 'draw');
                    if (roundWinner === 'left') leftRoundWins++;
                    if (roundWinner === 'right') rightRoundWins++;
                }
                roundData.push({ round: r, lItem, rItem, lp, rp, lSold, rSold, bothDone, roundWinner, isCurrent: r === detectedRound, leftItemName: leftTeamLetter + r, rightItemName: rightTeamLetter + r });
            }
            const matchComplete = roundData.length === rpm && roundData.every(data => data.bothDone);
            const matchWinner = matchComplete
                ? (leftAuctionTotal > rightAuctionTotal ? 'left' : (rightAuctionTotal > leftAuctionTotal ? 'right' : 'draw'))
                : '';

            // 낙찰 애니메이션
            const auctionMotionEnabled = String(map.auction_animation_enabled ?? '1') !== '0';
            if (!auctionMotionEnabled && auctionState.motion) {
                if (auctionState.timer) clearTimeout(auctionState.timer);
                auctionState.timer = null;
                auctionState.motion = null;
                auctionState.queue = [];
                window._auctionMotion = null;
            }
            if (newestSoldItem) {
                const cc = getCleanCode(newestSoldItem);
                const eventKey = getItemKey(newestSoldItem) + '|낙찰';
                const iL = cc.charAt(0).toUpperCase();
                const side = iL === leftTeamLetter ? 'left' : (iL === rightTeamLetter ? 'right' : '');
                const iR = parseInt(cc.slice(1), 10);
                const ri = roundData.find(data => data.round === iR);
                if (cc && side && iR) {
                    const motionPayload = {
                        eventKey,
                        group: detectedGroup,
                        side,
                        leftTeamLetter,
                        rightTeamLetter,
                        leftTeamLabel: displayTeam(leftTeamLetter),
                        rightTeamLabel: displayTeam(rightTeamLetter),
                        teamLabel: displayTeam(side === 'left' ? leftTeamLetter : rightTeamLetter),
                        teamLogo: revealCompany ? getConfiguredTeamLogo(map, letterToTeam[side === 'left' ? leftTeamLetter : rightTeamLetter]) : '',
                        itemName: auctionItemLabel(newestSoldItem),
                        round: iR,
                        isFinalRound: iR === rpm,
                        winner: maskAuctionWinner(newestSoldItem.winner || ''),
                        price: formatAuctionMotionPrice(newestSoldItem.sold_price || newestSoldItem.soldPrice || 0),
                        roundComplete: Boolean(ri?.bothDone),
                        roundWinner: ri?.roundWinner || '',
                        leftRoundPrice: formatAuctionMotionPrice(ri?.lp || 0),
                        rightRoundPrice: formatAuctionMotionPrice(ri?.rp || 0),
                        leftScore: leftRoundWins,
                        rightScore: rightRoundWins,
                        matchComplete,
                        matchWinner,
                        leftAuctionTotal,
                        rightAuctionTotal,
                        matchLabel: tournamentMatchShortLabel(scale, detectedGroup),
                        isThirdPlaceMatch: scale === 2 && detectedGroup === 2
                    };
                    if (auctionMotionEnabled) startAuctionMotion(motionPayload);
                }
            }

            // 오버레이 HTML
            let motionHtml = '';
            const mot = auctionState.motion || window._auctionMotion;
            const leftDisplayLabel = mot?.leftTeamLabel || (leftTeamLetter + '팀');
            const rightDisplayLabel = mot?.rightTeamLabel || (rightTeamLetter + '팀');
            if (auctionMotionEnabled && mot?.phase === 'sold') {
                const soldLogo = mot.teamLogo ? '<img src="' + esc(mot.teamLogo) + '" alt="">' : '';
                const soldPriceText = String(mot.price || '-');
                const soldPriceAmount = soldPriceText.endsWith('만원') ? soldPriceText.slice(0, -2) : soldPriceText;
                const soldPriceUnit = soldPriceText.endsWith('만원') ? '<small>만원</small>' : '';
                motionHtml = '<div class="auction-motion-overlay is-sold"><div class="auction-sold-content"><div class="auction-target-team ' + (mot.side === 'left' ? 'is-target' : '') + '">' + esc(leftDisplayLabel) + '</div><div class="auction-sold-copy"><span class="auction-sold-kicker">CDCUP · HAMMER DOWN</span><span class="auction-sold-seal" aria-hidden="true"><b>SOLD</b><i>✓</i></span><strong class="auction-sold-item">' + esc(mot.itemName) + '</strong><span class="auction-sold-turn">' + esc(mot.round) + ' ROUND</span><strong class="auction-sold-winner"><b>' + esc(mot.winner) + '</b><small>님 낙찰</small></strong><span class="auction-sold-price"><b>' + esc(soldPriceAmount) + '</b>' + soldPriceUnit + '</span><span class="auction-sold-team">' + soldLogo + esc(mot.teamLabel) + '</span></div><div class="auction-target-team ' + (mot.side === 'right' ? 'is-target' : '') + '">' + esc(rightDisplayLabel) + '</div></div></div>';
            } else if (auctionMotionEnabled && mot?.phase === 'result') {
                const isFinalResult = Boolean(mot.matchComplete);
                const resultWinner = isFinalResult ? mot.matchWinner : mot.roundWinner;
                const isDraw = resultWinner === 'draw';
                const winningTeam = resultWinner === 'left' ? leftDisplayLabel : rightDisplayLabel;
                const resultTitle = isFinalResult
                    ? (mot.isThirdPlaceMatch ? 'BRONZE MATCH WINNER' : 'FINAL WINNER')
                    : (esc(mot.round) + ' ROUND WINNER');
                const resultClass = 'auction-result-content winner-focus' + (isFinalResult ? ' is-final' : '') + (isDraw ? ' is-draw' : '');
                const scoreLabel = isFinalResult ? '최종 낙찰금액 합계' : '현재 스코어';
                const scoreValue = isFinalResult
                    ? (esc(mot.leftAuctionTotal ?? 0) + ' : ' + esc(mot.rightAuctionTotal ?? 0))
                    : (esc(mot.leftScore ?? 0) + ' : ' + esc(mot.rightScore ?? 0));
                const amountHtml = isFinalResult
                    ? '<div class="auction-result-amount"><b>만원</b></div>'
                    : '<div class="auction-result-amount"><span class="auction-result-amount-label">라운드 낙찰가</span><b>' + esc(mot.leftRoundPrice || '0만원') + '</b><i>:</i><b>' + esc(mot.rightRoundPrice || '0만원') + '</b></div>';
                motionHtml = '<div class="auction-motion-overlay"><div class="' + resultClass + '"><span class="auction-result-eyebrow">' + resultTitle + '</span><strong class="auction-result-winner">' + (isDraw ? '무승부' : esc(winningTeam)) + '</strong>' + (isDraw ? '' : '<span class="auction-result-verdict">승리</span>') + '<div class="auction-result-score"><span>' + scoreLabel + '</span><strong>' + scoreValue + '</strong>' + amountHtml + '</div></div></div>';
            }
            syncAuctionMotionPortal(motionHtml, mot ? [mot.eventKey, mot.phase].join('|') : '');

            // 렌더링 (실제 대진 코드 + 진행중 팀 하이라이트)
            const leftActive = activeItem && activeSide === 'left' ? ' is-active' : '';
            const rightActive = activeItem && activeSide === 'right' ? ' is-active' : '';
            const isWaiting = !activeItem && Boolean(pendingStep);
            if (isWaiting) {
                tree.innerHTML = '';
                tree.dataset.liveRenderKey = '';
                clearAuctionMotionPortal();
                return;
            }
            const isFinalTotals = !activeItem && !pendingStep && matchComplete;
            const finalLeftWin = isFinalTotals && matchWinner === 'left' ? ' is-active' : '';
            const finalRightWin = isFinalTotals && matchWinner === 'right' ? ' is-active' : '';
            const leftDisplayTeam = displayTeam(leftTeamLetter);
            const rightDisplayTeam = displayTeam(rightTeamLetter);
            const displayRound = getBracketViewRound(scale, map);
            const displayGroup = isWaiting ? pendingStep.group : detectedGroup;
            const displayAuctionRound = isWaiting ? pendingStep.round : detectedRound;
            const scaleLabel = tournamentMatchShortLabel(displayRound, displayGroup);
            const matchProgressTitle = isFinalTotals ? '최종 합계' : (displayAuctionRound === rpm ? '대장전' : (displayAuctionRound > 0 ? displayAuctionRound + '라운드' : ''));
            if (titleEl) titleEl.textContent = scaleLabel + ' ' + matchProgressTitle;
            if (isWaiting) {
                const desiredMatchKey = scale + '_' + displayRound + '_' + displayGroup;
                if (map.battle_current_match !== desiredMatchKey && window._lastWaitingMatchSyncKey !== desiredMatchKey) {
                    window._lastWaitingMatchSyncKey = desiredMatchKey;
                    updateConfigs({ battle_current_match: desiredMatchKey }).catch(err => {
                        window._lastWaitingMatchSyncKey = '';
                        console.error('waiting match sync failed', err);
                    });
                }
            }

            const scoreHtml = isFinalTotals
                ? '<div class="live-board-body"><div class="blind-live-match"><div class="blind-live-team' + finalLeftWin + '"><strong>' + esc(leftDisplayTeam) + '</strong></div><div class="blind-live-score is-total" aria-label="합산 낙찰금액 ' + leftAuctionTotal + ' 대 ' + rightAuctionTotal + '"><strong>' + leftAuctionTotal + '</strong><i>:</i><strong>' + rightAuctionTotal + '</strong><em class="blind-live-score-unit">만원</em></div><div class="blind-live-team' + finalRightWin + '"><strong>' + esc(rightDisplayTeam) + '</strong></div></div></div>'
                : '<div class="live-board-body"><div class="blind-live-match"><div class="blind-live-team' + leftActive + '"><strong>' + esc(leftDisplayTeam) + '</strong></div><div class="blind-live-score" aria-label="' + leftRoundWins + ' 대 ' + rightRoundWins + '"><strong>' + leftRoundWins + '</strong><i>:</i><strong>' + rightRoundWins + '</strong></div><div class="blind-live-team' + rightActive + '"><strong>' + esc(rightDisplayTeam) + '</strong></div></div></div>';
            const liveBodyHtml = scoreHtml;
            const chipClass = 'live-round-chip';
            const chipText = isFinalTotals ? 'FINAL' : 'LIVE';
            const roundText = isFinalTotals ? 'TOTAL AUCTION' : (isChamp ? '대장전' : (detectedRound > 0 ? detectedRound + ' ROUND' : 'STANDBY'));
            const renderKey = [displayRound, displayGroup, displayAuctionRound, leftRoundWins, rightRoundWins, leftAuctionTotal, rightAuctionTotal, activeSide, isFinalTotals, mot?.eventKey || '', mot?.phase || ''].join('|');
            if (tree.dataset.liveRenderKey !== renderKey) {
                tree.dataset.liveRenderKey = renderKey;
                tree.innerHTML = '<section class="live-round-board"><header class="live-round-header"><span class="' + chipClass + '">' + chipText + '</span><strong>' + scaleLabel + '</strong><span class="live-round-number">' + roundText + '</span></header>' + liveBodyHtml + '</section>';
            }
        }

        let lastActiveItemName = '';
        let lastActiveItemStatus = '';
        
        async function refreshBattleOverlayState(prefetchedMap, prefetchedItems) {
            try {
                // 1. 설정 및 개체 목록 가져오기
                const map = prefetchedMap || await getBroadcastConfigCached(false);
                if (!map) return;
                window.latestConfigMap = map;
                if (isCdcupBlindTotalsMode(map)) {
                    const ann = document.getElementById('battle-announcement-overlay');
                    if (ann) ann.style.setProperty('display', 'none', 'important');
                    const matchupCard = document.getElementById('battle-matchup-card');
                    if (matchupCard) matchupCard.style.setProperty('display', 'none', 'important');
                    return;
                }
                
                const active = map.active_tournament || 'none';
                if (active === 'none') {
                    document.getElementById('battle-announcement-overlay').style.display = 'none';
                    const matchupCard = document.getElementById('battle-matchup-card');
                    if (matchupCard) matchupCard.style.display = 'none';
                    return;
                }
                
                const scale = parseInt(active, 10);
                const bracketKey = 'tournament_bracket_' + scale;
                if (!map[bracketKey]) return;
                
                let bracket = { matches: {} };
                try { bracket = JSON.parse(map[bracketKey]); } catch(e){}
                
                // 2. 1라운드 매치들의 슬롯에 배정된 실제 업체명에 알파벳 팀명 매핑 부여 (가장 큰 대진표 기준)
                const teamToLetter = {};
                const letterToTeam = {};
                
                function hasAnyMatches(br) {
                    if (!br || !br.matches) return false;
                    return Object.values(br.matches).some(m => (m.left && m.left.trim()) || (m.right && m.right.trim()));
                }

                let baseBracket = null;
                let baseScale = 0;
                const activeScale = Number.parseInt(map.active_tournament || '', 10);
                if ([16, 8, 4, 2].includes(activeScale) && map['tournament_bracket_' + activeScale]) {
                    try {
                        const parsed = JSON.parse(map['tournament_bracket_' + activeScale]);
                        if (hasAnyMatches(parsed)) {
                            baseBracket = parsed;
                            baseScale = activeScale;
                        }
                    } catch(e){}
                }
                [16, 8, 4, 2].forEach(candidateScale => {
                    if (baseBracket || !map['tournament_bracket_' + candidateScale]) return;
                    try {
                        const parsed = JSON.parse(map['tournament_bracket_' + candidateScale]);
                        if (hasAnyMatches(parsed)) {
                            baseBracket = parsed;
                            baseScale = candidateScale;
                        }
                    } catch(e){}
                });
                if (!baseBracket) {
                    baseBracket = bracket;
                    baseScale = scale;
                }
                const baseMatchCount = tournamentStageMatchCount(baseScale);
                for (let i = 1; i <= baseMatchCount; i++) {
                    const matchKey = baseScale + '_' + i;
                    const match = baseBracket.matches[matchKey] || { left: '', right: '', winner: '' };
                    const leftLetter = String.fromCharCode(65 + (i - 1) * 2);      // A, C, E...
                    const rightLetter = String.fromCharCode(65 + (i - 1) * 2 + 1);  // B, D, F...
                    if (match.left) {
                        teamToLetter[match.left.trim()] = leftLetter;
                        letterToTeam[leftLetter] = match.left.trim();
                    }
                    if (match.right) {
                        teamToLetter[match.right.trim()] = rightLetter;
                        letterToTeam[rightLetter] = match.right.trim();
                    }
                }
                
                // 3. 전체 개체 목록 가져오기
                const rawItems = Array.isArray(prefetchedItems)
                    ? prefetchedItems
                    : await getBattleItemsCached();
                const items = scopeTournamentItems(rawItems, scale);
                if (!items || items.length === 0) return;

                // Sync bracket overlay visibility & positioning on all pages (items 포함)
                applyBracketPageMap(map, rawItems);
                
                // 현재 진행 중인 개체(status가 '진행', '진행중' 또는 'active'인 개체) 찾기
                const activeItem = items.find(i => isAuctionActiveItem(i));
                
                const ann = document.getElementById('battle-announcement-overlay');
                if (ann) {
                    ann.style.setProperty('display', 'none', 'important');
                }
                
                if (!activeItem) {
                    const curMatchKey = map.battle_current_match || '';
                    if (curMatchKey && map.battle_state === 'final_reveal') {
                        showFinalRevealUI(scale, curMatchKey, bracket, map, items);
                    } else {
                        if (ann) ann.style.setProperty('display', 'none', 'important');
                    }
                    const matchupCard = document.getElementById('battle-matchup-card');
                    if (matchupCard) matchupCard.style.setProperty('display', 'none', 'important');
                    return;
                }
                
                const itemName = getCleanCode(activeItem) || (activeItem.name || '').trim().toUpperCase(); // 예: 'A1', 'B2'
                if (!itemName || itemName.length < 2) return;
                
                const teamLetter = itemName.charAt(0); // 'A', 'B' 등
                const roundNum = parseInt(itemName.substring(1), 10); // 1, 2, 3, 4
                const teamMatchIndex = Math.floor((teamLetter.charCodeAt(0) - 65) / 2) + 1;
                const roundsPerMatch = getTournamentMatchRoundCount(
                    items,
                    teamMatchIndex,
                    tournamentRoundsPerMatch(map, scale, teamMatchIndex),
                );
                if (isNaN(roundNum) || roundNum < 1 || roundNum > roundsPerMatch) return;
                
                // 현재 팀 알파벳에 매핑된 실제 업체명 찾기
                const realCompany = letterToTeam[teamLetter];
                if (!realCompany) return;
                
                // 이 팀이 속한 토너먼트 매치 및 상대방 찾기
                let targetMatchKey = null;
                let opponentLetter = null;
                let opponentCompany = null;
                let slotType = null; // 'left' or 'right'
                
                for (let i = 1; i <= matchCount; i++) {
                    const matchKey = scale + '_' + i;
                    const match = bracket.matches[matchKey] || { left: '', right: '', winner: '' };
                    
                    const leftL = String.fromCharCode(65 + (i - 1) * 2);
                    const rightL = String.fromCharCode(65 + (i - 1) * 2 + 1);
                    
                    if (leftL === teamLetter) {
                        targetMatchKey = matchKey;
                        opponentLetter = rightL;
                        opponentCompany = match.right;
                        slotType = 'left';
                        break;
                    } else if (rightL === teamLetter) {
                        targetMatchKey = matchKey;
                        opponentLetter = leftL;
                        opponentCompany = match.left;
                        slotType = 'right';
                        break;
                    }
                }
                
                if (!targetMatchKey) return;
                
                // 상대방 팀 정보 구성
                const leftTeamName = slotType === 'left' ? realCompany : opponentCompany;
                const rightTeamName = slotType === 'left' ? opponentCompany : realCompany;
                const leftLetter = slotType === 'left' ? teamLetter : opponentLetter;
                const rightLetter = slotType === 'left' ? opponentLetter : teamLetter;
                
                // 4. 이 매치에 참여하는 두 팀의 라운드별 개체를 가져온다.
                const leftItems = {};
                const rightItems = {};
                for (let r = 1; r <= roundsPerMatch; r++) {
                    leftItems[r] = findItemByCode(items, leftLetter + r);
                    rightItems[r] = findItemByCode(items, rightLetter + r);
                }
                
                // 5. 각 라운드별 점수 연산
                let leftScore = 0;
                let rightScore = 0;
                const roundWinners = {};
                for (let r = 1; r <= roundsPerMatch; r++) {
                    const lIt = leftItems[r];
                    const rIt = rightItems[r];
                    if (lIt && rIt && (lIt.status === '완료' || lIt.status === 'sold' || lIt.status === '낙찰' || lIt.status === '유찰') && (rIt.status === '완료' || rIt.status === 'sold' || rIt.status === '낙찰' || rIt.status === '유찰')) {
                        const lPrice = parseFloat(lIt.sold_price || lIt.soldPrice || 0);
                        const rPrice = parseFloat(rIt.sold_price || rIt.soldPrice || 0);
                        if (lPrice > rPrice) {
                            leftScore++;
                            roundWinners[r] = 'left';
                        } else if (rPrice > lPrice) {
                            rightScore++;
                            roundWinners[r] = 'right';
                        } else {
                            roundWinners[r] = 'tie';
                        }
                    }
                }
                
                // 6. 현재 상태 판단 및 연출 구성
                const parts = targetMatchKey.split('_');
                const roundIdx = parts[1];
                const titleText = tournamentMatchTitle(scale, Number(roundIdx));
                
                document.getElementById('battle-ann-title').textContent = titleText + ' 실시간 중계';
                
                let displayContent = '';
                let displaySub = '';
                
                if (roundNum === roundsPerMatch) {
                    displayContent = `대장전(${roundsPerMatch}라운드) 진행 중!`;
                    displaySub = `${leftLetter}팀 VS ${rightLetter}팀<br>운명의 최종 승부 (현재 스코어 ${leftScore} : ${rightScore})`;
                } else {
                    displayContent = `${roundNum}라운드 진행 중: <span style="color:#60a5fa;">${teamLetter}팀</span>`;
                    displaySub = `${leftLetter}팀 VS ${rightLetter}팀 대결 (현재 스코어 ${leftScore} : ${rightScore})`;
                    
                    const oppItem = slotType === 'left' ? rightItems[roundNum] : leftItems[roundNum];
                    if (oppItem && (oppItem.status === '완료' || oppItem.status === 'sold' || oppItem.status === '낙찰' || oppItem.status === '유찰')) {
                        displayContent = `${roundNum}라운드 후공 진행 중: <span style="color:#f87171;">${teamLetter}팀</span>`;
                        displaySub = `선공 ${opponentLetter}팀의 기록에 도전 중! (현재 스코어 ${leftScore} : ${rightScore})`;
                    }
                }
                
                document.getElementById('battle-ann-content').innerHTML = displayContent;
                const subEl = document.getElementById('battle-ann-sub');
                subEl.innerHTML = displaySub;
                subEl.style.display = 'block';
                if (ann) {
                    ann.style.setProperty('display', 'none', 'important');
                }
                
                // 우측 매치업 카드 실시간 업데이트 (page 2 등 일반 오버레이용) - 2page 대진 정보 표시 제거
                const matchupCard = document.getElementById('battle-matchup-card');
                if (matchupCard) {
                    matchupCard.style.setProperty('display', 'none', 'important');
                }
                
                const currentMatchKey = scale + '_' + targetMatchKey;
                if (map.battle_current_match !== currentMatchKey) {
                    await updateConfigs({ battle_current_match: currentMatchKey });
                }
                
            } catch (err) {
                console.log('auto battle error', err);
            }
        }
        
        function showFinalRevealUI(scale, curMatchKey, bracket, map, items) {
            const ann = document.getElementById('battle-announcement-overlay');
            const matchKey = curMatchKey.split('_')[1] + '_' + curMatchKey.split('_')[2];
            const match = bracket.matches[matchKey] || { left: '', right: '', winner: '' };
            
            const matchIdx = curMatchKey.split('_')[2];
            const round = parseInt(curMatchKey.split('_')[1], 10);
            const titleText = tournamentMatchTitle(round, Number(matchIdx));
            
            const teamToLetter = {};
            const matchCount = tournamentStageMatchCount(scale);
            for (let i = 1; i <= matchCount; i++) {
                const matchKey = scale + '_' + i;
                const m = bracket.matches[matchKey] || { left: '', right: '' };
                const leftLetter = String.fromCharCode(65 + (i - 1) * 2);
                const rightLetter = String.fromCharCode(65 + (i - 1) * 2 + 1);
                if (m.left) teamToLetter[m.left.trim()] = leftLetter;
                if (m.right) teamToLetter[m.right.trim()] = rightLetter;
            }

            const leftL = teamToLetter[match.left?.trim()] || 'A';
            const rightL = teamToLetter[match.right?.trim()] || 'B';
            const doneStatuses = new Set(['완료', 'sold', '낙찰', '유찰']);
            let leftTotal = 0;
            let rightTotal = 0;
            const roundsPerMatch = getTournamentMatchRoundCount(
                items,
                Number(matchIdx),
                tournamentRoundsPerMatch(map, scale, Number(matchIdx)),
            );
            for (let r = 1; r <= roundsPerMatch; r++) {
                const leftItem = findItemByCode(items, leftL + r);
                const rightItem = findItemByCode(items, rightL + r);
                if (leftItem && doneStatuses.has(leftItem.status)) leftTotal += Number.parseFloat(leftItem.sold_price || leftItem.soldPrice || 0) || 0;
                if (rightItem && doneStatuses.has(rightItem.status)) rightTotal += Number.parseFloat(rightItem.sold_price || rightItem.soldPrice || 0) || 0;
            }
            const winnerText = leftTotal > rightTotal ? `${leftL}팀` : (rightTotal > leftTotal ? `${rightL}팀` : '무승부');

            document.getElementById('battle-ann-title').textContent = titleText + ' 최종 결과';
            document.getElementById('battle-ann-content').innerHTML = `최종 승리: <span style="color:#f59e0b;">${winnerText}</span> (${leftTotal} : ${rightTotal}만원)`;
            const subEl = document.getElementById('battle-ann-sub');
            subEl.textContent = `대단히 축하드립니다! (${leftL}팀 vs ${rightL}팀)`;
            subEl.style.display = 'block';
            if (ann) {
                ann.style.setProperty('display', 'none', 'important');
            }
        }

        function esc(s) {
            if (s === null || s === undefined) return '';
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
