<!DOCTYPE html>
<html>

<head>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            alert("[BROADCAST RUNTIME ERROR]\nMessage: " + message + "\nSource: " + source + "\nLine: " + lineno + "\nCol: " + colno + "\nStack: " + (error ? error.stack : 'no stack'));
            return false;
        };

        (function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('direct') === '1' || window.self !== window.top) return;

            const page = params.get('page') || '1';
            const eventId = params.get('event') || params.get('module') || 'cdcup';
            const routerParams = new URLSearchParams(window.location.search);
            routerParams.set('event', eventId);
            routerParams.set('page', page);
            window.location.replace('broadcast-router.html?' + routerParams.toString());
        })();
    </script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="supabase-bridge.js?v=20260720-quota-fallback-v2"></script>
    <script src="event-modules.js?v=20260710-crebti3"></script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            --broadcast-safe-x: clamp(32px, 5.5vw, 80px);
            --broadcast-safe-y: clamp(16px, 3vh, 36px);
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            width: 100%;
            max-width: 100vw;
            height: 100%;
            font-family: 'Pretendard Variable', 'Pretendard', sans-serif;
            overflow: hidden;
            color: #FFFFFF;
        }

        .empty {
            position: absolute;
            top: 20px;
            right: 24px;
            left: auto;
            z-index: 20;
            transform: none;
            padding: 5px 9px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 999px;
            background: rgba(7, 12, 22, 0.28);
            color: rgba(255, 255, 255, 0.48);
            font-size: 11px;
            font-weight: 650;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        .broadcast {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ── 스코어보드 스타일 상단 바 (2P 개체용) ── */
        @keyframes scoreboardSlideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 스코어보드 래퍼 (라벨 + 바를 묶는 컨테이너) */
        .scoreboard-wrap {
            position: absolute;
            top: 20px;
            right: 24px;
            left: auto;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: max-content;
            max-width: calc(100% - 48px);
            animation: scoreboardSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .auction-progress {
            position: absolute;
            top: 18px;
            left: 24px;
            z-index: 21;
            color: #60a5fa;
            font-size: var(--sb-label-size, 24px);
            font-weight: 950;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.06em;
            line-height: 1;
            text-shadow: 0 4px 18px rgba(0,0,0,0.55);
        }
        body.host-mode .auction-progress,
        body.bracket-page .auction-progress { display: none !important; }

        /* 대회명 라벨 (바 위에 표시) */
        .scoreboard-wrap .top-bar-label {
            font-size: var(--sb-label-size, 14px);
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 168, 0, 0.85);
            padding: 0 8px 4px 0;
        }

        .top-bar {
            display: flex;
            align-items: stretch;
            gap: 0;
            width: max-content;
            max-width: 100%;
            overflow: hidden;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        /* 우측 주황색 악센트 스트라이프 */
        .top-bar .accent-bar {
            width: 5px;
            flex-shrink: 0;
            background: linear-gradient(180deg, #FF6B00, #FFA800);
            order: 99; /* 맨 우측으로 이동 */
        }

        /* 이름 영역 (어두운 배경) */
        .top-bar .name-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            padding: 10px 14px;
            flex: 0 0 auto;
            background: rgba(10, 15, 28, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .top-bar .name {
            font-size: var(--sb-name-size, 30px);
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -0.01em;
            white-space: nowrap;
            max-width: 58vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 구분선 */
        .top-bar .sep {
            width: 1px;
            background: rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
        }

        /* 특성 필 영역 (약간 밝은 배경) */
        .top-bar .traits {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            gap: 4px;
            background: rgba(20, 28, 46, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            flex-wrap: nowrap;
            flex: 0 0 auto;
        }

        .top-bar .traits-track {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        /* pill 배지 스타일 */
        .top-bar .pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: var(--sb-pill-size, 17px);
            font-weight: 600;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.08);
            color: #CBD5E1;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .top-bar .pill.pill-accent {
            background: rgba(255, 107, 0, 0.15);
            color: #FFA800;
            border-color: rgba(255, 107, 0, 0.2);
        }

        .top-bar .pill.pill-info {
            background: rgba(56, 189, 248, 0.12);
            color: #7DD3FC;
            border-color: rgba(56, 189, 248, 0.15);
        }

        .top-bar .pill.pill-quiz {
            max-width: 64vw;
            white-space: normal;
            word-break: keep-all;
            font-size: max(var(--sb-pill-size, 17px), 20px);
            font-weight: 850;
            line-height: 1.25;
            background: rgba(195, 154, 74, 0.18);
            color: #f5f1e8;
            border-color: rgba(220, 193, 127, 0.42);
        }

        /* 판매 방식별 중앙 안내 레이어. 새 방식은 같은 컨테이너와 렌더러를 재사용한다. */
        .sale-mode-overlay {
            position: absolute;
            inset: 0;
            z-index: 80;
            display: none;
            align-items: center;
            justify-content: center;
            padding: clamp(72px, 11vh, 130px) clamp(36px, 8vw, 140px);
            pointer-events: none;
        }
        .sale-mode-overlay.visible { display: flex; }
        .sale-mode-card {
            position: relative;
            isolation: isolate;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: min(920px, 76vw);
            min-height: min(430px, 52vh);
            padding: clamp(34px, 5vh, 66px) clamp(38px, 5vw, 78px);
            overflow: hidden;
            border: 1px solid rgba(229, 204, 145, 0.5);
            border-radius: 22px;
            background:
                radial-gradient(circle at 50% 0%, rgba(209, 174, 91, 0.2), transparent 44%),
                linear-gradient(145deg, rgba(6, 10, 18, 0.94), rgba(17, 24, 39, 0.92));
            box-shadow: 0 32px 90px rgba(0, 0, 0, 0.58), inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            text-align: center;
            animation: saleModeCardIn 0.45s cubic-bezier(.16,1,.3,1) both;
        }
        .sale-mode-card::before {
            content: '';
            position: absolute;
            z-index: -1;
            inset: 10px;
            border: 1px solid rgba(229, 204, 145, 0.12);
            border-radius: 15px;
        }
        .sale-mode-kicker {
            color: #d9b05c;
            font-size: clamp(14px, 1.5vw, 20px);
            font-weight: 900;
            letter-spacing: .24em;
        }
        .sale-mode-title {
            margin-top: clamp(20px, 3vh, 34px);
            color: #ffffff;
            font-size: clamp(34px, 5.2vw, 72px);
            font-weight: 950;
            line-height: 1.18;
            letter-spacing: -.045em;
            word-break: keep-all;
            text-wrap: balance;
            text-shadow: 0 8px 30px rgba(0,0,0,.48);
        }
        .sale-mode-subtitle {
            margin-top: clamp(22px, 3vh, 34px);
            color: #cbd5e1;
            font-size: clamp(18px, 2vw, 28px);
            font-weight: 760;
            line-height: 1.35;
            word-break: keep-all;
        }
        .sale-mode-overlay.has-result .sale-mode-kicker { color: #6ee7b7; }
        .sale-mode-overlay.has-result .sale-mode-title { color: #fff7df; }
        .sale-mode-overlay.has-result .sale-mode-subtitle {
            color: #ffffff;
            font-size: clamp(22px, 2.8vw, 38px);
            font-weight: 900;
        }
        body.host-mode .sale-mode-overlay,
        body.bracket-page .sale-mode-overlay { display: none !important; }
        @keyframes saleModeCardIn {
            from { opacity: 0; transform: translateY(24px) scale(.96); }
            to { opacity: 1; transform: none; }
        }

        /* 업체명과 현재 진행 유형 */
        .top-bar .sub {
            display: block;
            max-width: 58vw;
            margin-top: 3px;
            overflow: hidden;
            color: rgba(245, 241, 232, 0.72);
            font-size: clamp(13px, 1.45vw, 18px);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── 우측 사진 스택 ── */
        @keyframes photoSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px) translateX(var(--page2-photo-peek));
            }
            to {
                opacity: 1;
                transform: translateY(0) translateX(var(--page2-photo-peek));
            }
        }

        @keyframes photoSlideUpNoPeek {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photo-stack {
            --page2-photo-max-height: 60vh;
            --page2-photo-max-width: 34vw;
            --page2-photo-two-max-height: 44vh;
            --page2-photo-two-max-width: 41vw;
            --page2-photo-three-max-height: 30vh;
            --page2-photo-three-max-width: 38vw;
            --page2-photo-peek: 0;
            position: absolute;
            left: 3%;
            right: auto;
            bottom: 5%;
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-end;
            gap: 16px;
            z-index: 10;
        }

        .photo-stack.config-pending .sub-photo {
            visibility: hidden;
        }

        .sub-photo {
            position: relative;
            display: none;
            width: var(--page2-photo-max-width);
            height: var(--page2-photo-max-height);
            flex: 0 0 auto;
            transform: translateX(var(--page2-photo-peek));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }

        .sub-photo.visible {
            display: block;
            animation: photoSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .sub-photo img {
            display: block;
            width: 100%;
            height: 100%;
            max-height: 100%;
            max-width: 100%;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            object-fit: cover;
            object-position: center center;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.75);
            transition: width 0.3s, height 0.3s;
        }

        /* 2개일 때 80% 축소 */
        .photo-stack.two-photos {
            left: 2%;
            right: 2%;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
        }

        .photo-stack.two-photos .sub-photo {
            transform: none;
        }

        .photo-stack.two-photos .sub-photo.visible {
            animation: photoSlideUpNoPeek 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .photo-stack.two-photos .sub-photo.slot-primary {
            transform: translateX(var(--page2-photo-peek));
            z-index: 2;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary {
            transform: translateX(calc(-1 * var(--page2-photo-peek)));
            z-index: 1;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary img {
            border-radius: 32px;
        }

        .photo-stack.two-photos .sub-photo.slot-secondary .label {
            left: auto !important;
            right: 16px !important;
        }

        /* 사진 라벨 */
        .sub-photo .label {
            position: absolute;
            left: 16px !important;
            right: auto !important;
            bottom: 16px !important;
            top: auto !important;
            display: inline-flex;
            align-items: center;
            width: auto;
            max-width: calc(100% - 32px);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #F8FAFC;
            font-size: 36px;
            font-weight: 800;
            padding: 8px 16px;
            border-radius: 12px;
            line-height: 1.15;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        /* 일반/단독 경매에서 동배 칸을 단일 소개 사진으로 쓸 때는 사진만 표시 */
        .sub-photo.photo-only .label {
            display: none;
        }
        .sub-photo.photo-only img {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 26px;
            object-fit: contain;
            background: rgba(5, 8, 14, 0.72);
            box-shadow:
                0 28px 70px -18px rgba(0, 0, 0, 0.86),
                0 10px 26px rgba(0, 0, 0, 0.34),
                0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .photo-stack.photo-disabled {
            display: none !important;
        }

        .photo-stack.two-photos .sub-photo .label {
            font-size: 34px;
        }

        .photo-stack.three-photos .sub-photo .label {
            font-size: 32px;
        }

        /* 사진 토글 버튼 */
        .photo-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            opacity: 0.15;
            transition: opacity 0.3s;
        }

        .photo-toggle:hover {
            opacity: 1;
        }

        /* ── 호스트 모드 (page=1) 전용 ── */
        .host-mode .scoreboard-wrap,
        .host-mode .top-bar,
        .host-mode .photo-stack {
            display: none !important;
        }

        .host-mode .empty {
            display: none !important;
        }

        /* 진행자 네임택 (page 1 전용) — 개별 위치 지정 */
        .host-nametag {
            display: none;
            position: absolute;
            z-index: 60;
        }
        .host-mode .host-nametag {
            /* shown via JS based on config */
        }
        .host-nametag .nt-inner {
            display: flex;
            align-items: stretch;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeInUp 0.5s ease-out;
        }
        .host-nametag .nt-accent {
            width: 5px;
            flex-shrink: 0;
            background: linear-gradient(180deg, #FF6B00, #FFA800);
        }
        .host-nametag .nt-body {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px 10px 14px;
            background: rgba(10, 15, 28, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .host-nametag .nt-name {
            font-size: var(--nt-font-size, 22px);
            font-weight: 800;
            color: #FFFFFF;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }
        .host-nametag .nt-role {
            font-size: var(--nt-role-font-size, 12px);
            font-weight: 600;
            color: #FFA800;
            background: rgba(255, 168, 0, 0.12);
            padding: 3px 10px;
            border-radius: 4px;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 개별 룰 필 스택 (우측 하단) */
        .hc-rules-stack {
            display: none;
            position: absolute;
            bottom: 12%;
            right: 1%;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            z-index: 50;
        }

        .host-mode .hc-rules-stack {
            display: none !important;
        }

        .hc-rules-stack.hc-rules-top {
            bottom: auto;
            top: 30%;
        }

        /* 이미지 배너 (우하단 플로팅) */
        .hc-banner-float {
            display: none;
            position: absolute;
            z-index: 10005;
            place-items: center center;
        }

        .hc-banner-float.banner-active {
            display: grid;
        }

        /* ── 이미지 배너 래퍼 및 블러 레이어 ── */
        .hc-banner-float .banner-item-wrap {
            grid-area: 1 / 1;
            width: var(--banner-w, 42vw);
            height: var(--banner-h, 50vh);
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: scale(0.92);
            filter: blur(8px);
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                filter 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .hc-banner-float .banner-item-wrap.show {
            opacity: var(--banner-opacity, 0.93);
            transform: scale(1);
            filter: blur(0);
        }

        .hc-banner-float .banner-item-wrap.exit {
            opacity: 0;
            transform: scale(1.04);
            filter: blur(6px);
        }

        /* 여백을 채우는 백그라운드 블러 이미지 */
        .hc-banner-float .banner-bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(28px) brightness(0.6);
            transform: scale(1.15);
            z-index: 1;
            opacity: 0.85;
        }

        /* 전면에 표시되는 선명한 원본 이미지 */
        .hc-banner-float .banner-img-main {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
        }

        .hc-rules-card {
            background: rgba(10, 10, 12, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            min-width: 280px;
        }

        .hc-rule-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 24px;
            font-size: 38px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
        }

        .hc-rule-row+.hc-rule-row {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hc-rule-label {
            color: #FF6B00;
            font-weight: 800;
            flex-shrink: 0;
            min-width: 3.5em;
        }

        .hc-rule-value {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        /* 헤더: 화면 상단 우측 */
        .hc-header {
            display: none;
            position: absolute;
            top: 3%;
            right: 1%;
            align-items: center;
            z-index: 50;
            background: rgba(10, 10, 12, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 26px 38px 26px 120px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.7);
        }

        .live-round-board {

        .live-round-chip {

            color: #fff;

            font-weight: 950;
            letter-spacing: 0.1em;

        .live-round-chip::before {
            content: '';

            height: 6px;
            border-radius: 50%;
            background: #fff;
            animation: sports-live-pulse 1.3s ease-in-out infinite;
        }
        .live-round-chip.is-standby {
            background: #334155;
        }
        .live-round-chip.is-standby::before {
            animation: none;
            opacity: 0.75;
        }
        .live-round-number {
            color: #93c5fd;
            font-weight: 950;
            letter-spacing: 0.12em;
        }
        .live-round-match {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto 44px auto minmax(0, 1fr);
            align-items: center;
            gap: 14px;
            min-height: 80px;
            padding: 8px 28px 10px;

        .live-round-team { min-width: 0; }
        .live-round-team--left { text-align: right; }
        .live-round-team--right { text-align: left; }
        .live-round-team-code {
            display: block;
            margin-bottom: 2px;

        .live-round-team-name {

            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .live-round-result {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 58px;
            height: 50px;
            border: 1px solid rgba(148,163,184,0.28);
            border-radius: 6px;
            background: rgba(148,163,184,0.08);
            color: #94a3b8;
            font-size: 29px;
            font-weight: 950;
            line-height: 1;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);

        .live-round-result.is-win {

        .blind-live-match {
            display: grid;
            grid-template-columns: auto auto auto;
            align-items: center;
            gap: 22px;
            min-height: 76px;
            padding: 3px 42px 8px;
        }
        .blind-live-team {
            position: relative;

            font-weight: 950;
            letter-spacing: -0.045em;
            line-height: 1;
            opacity: 0.8;
            transition: color 0.22s ease, opacity 0.22s ease;
        }
        .blind-live-team.is-active {
            color: #60a5fa;
            opacity: 1;
        }
        .blind-live-team strong {
            position: relative;
            display: inline-block;
            padding-bottom: 7px;
            font: inherit;
        }
        .blind-live-team strong::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, #2563eb, #60a5fa);

        .blind-live-team:first-child { text-align: right; }
        .blind-live-team:first-child strong::after { transform-origin: right; }
        .blind-live-team:last-child { text-align: left; }
        .blind-live-team:last-child strong::after { transform-origin: left; }
        .blind-live-team.is-active strong::after {

        .auction-motion-overlay {
            position: fixed;
            inset: 0;
            z-index: 30000;
            overflow: hidden;
            display: flex;

        }

            content: '';

            width: min(74vw, 960px);

        }
        .auction-sold-content {
            position: relative;

            display: grid;
            grid-template-columns: minmax(120px,1fr) minmax(360px,auto) minmax(120px,1fr);

        .auction-result-content {
            display: grid;

        .auction-result-amount {

        @keyframes auction-fullscreen-in {
            from { opacity: 0; }

    <script>
        let lastJson = null;
        let hiddenPhotos = [];
        let lastRenderedItem = null;
        let page2PhotoConfigReady = false;
        const GRADE = { "1": "낮음", "2": "보통", "3": "양호", "4": "우수", "5": "최상" };

        window._baseScoreboardLabel = "CRE WORLD CUP";
        window._totalItemsCount = 0;
        window._completedItemsCount = 0;
        window._lastCountFetchTime = 0;
        window.activeItem = null;

        function updateProgressText() {
            const labelEl = document.getElementById("auction-progress");
            if (!labelEl) return;
            labelEl.style.setProperty('color', 'var(--event-broadcast-accent, #e4c887)', 'important');
            labelEl.style.setProperty('font-family', "'Pretendard', sans-serif", 'important');
            labelEl.style.setProperty('font-weight', '780', 'important');
            labelEl.style.setProperty('letter-spacing', '-0.025em', 'important');
            labelEl.style.setProperty('text-shadow', 'none', 'important');
            if (window._totalItemsCount > 0) {
                const currentOrder = Math.min(window._completedItemsCount + 1, window._totalItemsCount);
                labelEl.textContent = `${currentOrder}/${window._totalItemsCount}`;
            } else {
                labelEl.textContent = '';
            }
        }

        function processItemsList(items) {
            const activeScale = 0;
            const progressItems = activeScale ? scopeTournamentItems(items, activeScale) : items;
            window._totalItemsCount = progressItems.length;
            window._lastCountFetchTime = Date.now();
            
            let completed = 0;
            progressItems.forEach(it => {
                const status = (it.status || '').trim();
                if (status.indexOf('낙찰') >= 0 || status.indexOf('유찰') >= 0) {
                    completed++;
                }
            });
            window._completedItemsCount = completed;
            
            updateProgressText();
        }

        function tournamentStageMatchCount(scale) {
            return Number(scale) === 2 ? 2 : Number(scale) / 2;
        }

        function tournamentMatchTitle(round, index) {
            if (Number(round) === 2) return Number(index) === 2 ? '3·4위전' : '결승전';
            if (Number(round) === 4) return '준결승 ' + index + '조';
            return round + '강 ' + index + '조';
        }

        function tournamentMatchShortLabel(round, index) {
            if (Number(round) === 2) return Number(index) === 2 ? '3·4위전' : '결승';
            return round + '강 ' + index + '조';
        }

        function tournamentRoundsPerMatch(map, scale, matchIndex) {
            if (matchIndex) {
                try {
                    const overrides = JSON.parse(map?.['tournament_match_rounds_' + scale] || '{}');
                    const matchKey = scale + '_' + matchIndex;
                    const override = Number.parseInt(overrides?.[matchKey] ?? overrides?.[matchIndex], 10);
                    if (Number.isInteger(override) && override > 0) return override;
                } catch (error) {}
            }
            const stageCount = Number.parseInt(map?.['tournament_items_per_team_' + scale], 10);
            if (Number.isInteger(stageCount) && stageCount > 0) return stageCount;
            const fallback = Number.parseInt(map?.battle_rounds_per_match, 10);
            return Number.isInteger(fallback) && fallback > 0 ? fallback : 4;
        }

        function getCleanCode(item) {
            if (!item) return '';
            const meta = getItemAuctionMeta(item);
            const metaCode = String(item.tournamentCode || meta.tournamentCode || '').trim().toUpperCase();
            // 라운드가 바뀌면 같은 업체의 팀 문자가 달라질 수 있다.
            // 저장된 과거 코드보다 현재 활성 대진표의 업체→팀 매핑을 우선한다.
            const activeTeamLetter = meta.auctionType === AUCTION_TYPES.TOURNAMENT
                ? getActiveBracketTeamLetter(item.company)
                : '';
            const storedRound = (metaCode.match(/(\d+)$/) || [])[1];
            if (activeTeamLetter && storedRound) return activeTeamLetter + storedRound;
            if (/^[A-P][1-9]\d*$/.test(metaCode)) return metaCode;
            const numStr = String(item.num || '').trim().toUpperCase();
            if (numStr.match(/^[A-Z]\d+$/)) {
                return numStr;
            }
            const nameUpper = (item.name || '').trim().toUpperCase();
            const match = nameUpper.match(/^([A-Z]\d+)/);
            if (match) return match[1];

            // '1 릴잔틱'과 같이 숫자로 개체를 구분하는 경우 대응
            const numMatch = nameUpper.match(/^([1-9]\d*)/);
            if (numMatch && item.company) {
                const teamLetter = getActiveBracketTeamLetter(item.company)
                    || (window._teamToLetterMap ? window._teamToLetterMap[String(item.company).trim()] : '');
                if (teamLetter) {
                    return teamLetter + numMatch[1]; // 예: 'A' + '1' = 'A1'
                }
            }
            return '';
        }

        function getActiveBracketTeamLetter(company) {
            const companyName = String(company || '').trim();
            const map = window.latestConfigMap || {};
            const activeScale = Number.parseInt(map.active_tournament || '', 10);
            if (!companyName || ![16, 8, 4, 2].includes(activeScale)) return '';
            try {
                const bracket = JSON.parse(map['tournament_bracket_' + activeScale] || '{"matches":{}}');
                const matchCount = tournamentStageMatchCount(activeScale);
                for (let i = 1; i <= matchCount; i++) {
                    const match = bracket.matches?.[activeScale + '_' + i] || {};
                    if (String(match.left || '').trim() === companyName) return String.fromCharCode(65 + (i - 1) * 2);
                    if (String(match.right || '').trim() === companyName) return String.fromCharCode(65 + (i - 1) * 2 + 1);
                }
            } catch(e) {}
            return '';
        }

        function getAuctionItemDisplayLabel(item) {
            if (!item) return '';
            const meta = getItemAuctionMeta(item);
            // publicName은 팀 코드(A1/C2 등)를 제거한 이름이므로 우선 사용한다.
            const rawName = String(meta.publicName || item.displayName || item.name || '').trim();
            return rawName || String(meta.publicNumber || item.num || '').trim();
        }

        function getCurrentTournamentItemLabel(item) {
            if (!item) return '';
            const meta = getItemAuctionMeta(item);
            if (meta.auctionType !== AUCTION_TYPES.TOURNAMENT) return auctionItemLabel(item);
            const code = getCleanCode(item);
            const name = getAuctionItemDisplayLabel(item);
            return [code, name].filter(Boolean).join(' · ');
        }

        function findItemByCode(items, code) {
            if (!items || !code) return null;
            const target = code.trim().toUpperCase();
            return items.find(i => {
                if (getCleanCode(i) === target) return true;
                const numStr = String(i.num || '').trim().toUpperCase();
                if (numStr === target) return true;
                const nameUpper = (i.name || '').trim().toUpperCase();
                const match = nameUpper.match(/^([A-Z]\d+)/);
                if (match && match[1] === target) return true;
                if (nameUpper === target) return true;
                return false;
            });
        }

        function getConfiguredTeamLogo(map, teamName) {
            const target = String(teamName || '').trim();
            if (!target) return '';
            let partial = '';
            for (let i = 1; i <= 20; i++) {
                try {
                    const value = JSON.parse(map?.['team_logo' + i] || '{}');
                    const name = String(value.name || '').trim();
                    if (!name || !value.url) continue;
                    if (name === target) return value.url;
                    if (!partial && (name.includes(target) || target.includes(name))) partial = value.url;
                } catch (_) {}
            }
            return partial;
        }

        function scopeTournamentItems(items, scale) {
            const tournament = (items || []).filter(isTournamentAuctionItem);
            const staged = tournament.filter(item => Number(getItemAuctionMeta(item).tournamentStage) === Number(scale));
            return staged.length ? staged : tournament.filter(item => !getItemAuctionMeta(item).tournamentStage);
        }

        // URL 파라미터 확인 후 host-mode 적용
        const urlParams = new URLSearchParams(window.location.search);
        const isHostMode = urlParams.get('mode') === 'host' || urlParams.get('page') === '1';
        const _pgValTemp = (urlParams.get('page') || '').toLowerCase();
        const isBracketPageTemp = _pgValTemp === 'bracket' || _pgValTemp === '3' || _pgValTemp === '3p';

        // DOM 파싱 완료 후 데이터 로드 시작
        window.addEventListener('DOMContentLoaded', () => {
            if (isHostMode) {
                document.body.classList.add('host-mode');
            }
            if (isBracketPageTemp) {
                document.body.classList.add('bracket-page');
            }
            if (isHostMode) {
                maybeRefreshHostConfig(true);
            } else {
                loadHostConfig();
            }
        });

        // [키워드] → 기본 강조색(cyan), [키워드:red] → 지정 색상
        function renderColorMarkup(text) {
            return text.replace(/\[([^\]]+?)(?::([^\]]+))?\]/g, function (_, word, color) {
                const c = color || '#FF6B00';
                return '<span style="color:' + c + ';font-weight:800;">' + word + '</span>';
            });
        }

        function splitTickerMessages(raw) {
            const text = String(raw || '').replace(/\r/g, '').trim();
            if (!text) return [];

            const newlineParts = text.split(/\n+/).map(v => v.trim()).filter(Boolean);
            if (newlineParts.length > 1) return newlineParts;

            const pipeParts = text.split('||').map(v => v.trim()).filter(Boolean);
            if (pipeParts.length > 1) return pipeParts;

            return [text];
        }

        function resetTickerMotion() {
            if (window._tickerRaf) {
                cancelAnimationFrame(window._tickerRaf);
                window._tickerRaf = null;
            }
            if (window._tickerRotateTimer) {

        function normalizeCssLength(value) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';

            const compact = raw.replace(/\s+/g, '');
            if (/^-?(?:\d+|\d*\.\d+)$/.test(compact)) {
                return compact === '0' || compact === '-0' ? '0' : compact + 'px';
            }

            if (/^-?(?:\d+|\d*\.\d+)(px|%|vw|vh|vmin|vmax|rem|em|svw|svh|lvw|lvh|dvw|dvh)$/i.test(compact)) {
                return compact;
            }

            if (/^(auto|initial|inherit|unset)$/i.test(compact)) {
                return compact.toLowerCase();
            }

            if (/^(calc|min|max|clamp)\(.+\)$/i.test(compact)) {
                return compact;
            }

            return raw;
        }

        function normalizeViewportSize(value, viewportUnit) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';

            const compact = raw.replace(/\s+/g, '');
            if (/^-?(?:\d+|\d*\.\d+)$/.test(compact)) {
                if (compact === '0' || compact === '-0') return '0';
                const numeric = parseFloat(compact);
                if (Math.abs(numeric) <= 100) return compact + viewportUnit;
                return compact + 'px';
            }

            return normalizeCssLength(raw);
        }

        function ensureViewportUnit(value, defaultUnit) {
            const raw = String(value == null ? '' : value).trim();
            if (!raw) return '';
            if (raw.endsWith('%')) {
                return parseFloat(raw) + defaultUnit;
            }
            return normalizeViewportSize(raw, defaultUnit);
        }

        function hasPlacementValue(value) {
            return Boolean(value && value !== 'auto' && value !== 'initial' && value !== 'unset');
        }

        function safeEdgeCss(value, axis) {
            const fallback = axis === 'x' ? 'var(--broadcast-safe-x)' : 'var(--broadcast-safe-y)';
            const normalized = normalizeCssLength(value);
            if (!hasPlacementValue(normalized) || normalized === '0') return fallback;
            return `max(${normalized}, ${fallback})`;
        }

        function normalizeOpacity(value, fallback) {
            const raw = String(value == null ? '' : value).trim();
            const fallbackValue = typeof fallback === 'number' ? fallback : 0.93;
            if (!raw) return String(fallbackValue);

            let numeric = NaN;
            if (/^-?(?:\d+|\d*\.\d+)%$/.test(raw)) {
                numeric = parseFloat(raw) / 100;
            } else if (/^-?(?:\d+|\d*\.\d+)$/.test(raw)) {
                numeric = parseFloat(raw);
                if (numeric > 1 && numeric <= 100) numeric = numeric / 100;
            }

            if (!Number.isFinite(numeric)) return String(fallbackValue);
            if (numeric < 0) numeric = 0;
            if (numeric > 1) numeric = 1;
            return String(numeric);
        }

        function renderImageBannersLegacy(cfg) {
            const container = document.getElementById('hc-banner-float');

            // 이미지 배너 URL 수집 (banner1 ~ banner10)

            container.style.top = 'auto';
            container.style.bottom = 'auto';

            if (right) {
                container.style.right = safeEdgeCss(right, 'x');
            } else if (left) {
                container.style.left = safeEdgeCss(left, 'x');
            } else {
                container.style.right = 'var(--broadcast-safe-x)';
            }

            if (bottom) {
                container.style.bottom = safeEdgeCss(bottom, 'y');
            } else if (top) {
                container.style.top = safeEdgeCss(top, 'y');
            } else {
                container.style.bottom = 'var(--broadcast-safe-y)';
            }

            const maxW = normalizeCssLength(cfg.banner_maxwidth) || '42vw';
            const maxH = normalizeCssLength(cfg.banner_maxheight) || '50vh';

                    const prevIdx = currentIdx;

        function applyBannerPlacement(container, layout) {

            if (hasPlacementValue(layout.right)) {

                container.style.left = safeEdgeCss(layout.left, 'x');
            } else {
                container.style.right = 'var(--broadcast-safe-x)';
            }

            if (hasPlacementValue(layout.bottom)) {
                container.style.bottom = safeEdgeCss(layout.bottom, 'y');
            } else if (hasPlacementValue(layout.top)) {
                container.style.top = safeEdgeCss(layout.top, 'y');

                container.style.bottom = 'var(--broadcast-safe-y)';
            }

        function startBannerRotation(wraps, interval) {
            if (window._bannerRotateTimer) {
                clearInterval(window._bannerRotateTimer);
                window._bannerRotateTimer = null;
            }

            if (!wraps.length) {
                window._bannerCurrentIdx = 0;
                return;
            }

            const currentIdx = typeof window._bannerCurrentIdx === 'number' ? window._bannerCurrentIdx : 0;
            window._bannerCurrentIdx = Math.max(0, Math.min(currentIdx, wraps.length - 1));

            wraps.forEach(function (wrap, idx) {
                wrap.classList.toggle('show', idx === window._bannerCurrentIdx && wrap.style.display !== 'none');
            });

            if (wraps.length <= 1) return;

            window._bannerRotateTimer = setInterval(function () {
                const prevIdx = window._bannerCurrentIdx;
                let nextIdx = (prevIdx + 1) % wraps.length;
                let guard = 0;
                while (wraps[nextIdx].style.display === 'none' && guard < wraps.length) {
                    nextIdx = (nextIdx + 1) % wraps.length;
                    guard += 1;
                }
                wraps[prevIdx].classList.remove('show');
                wraps[prevIdx].classList.add('exit');
                setTimeout(() => wraps[prevIdx].classList.remove('exit'), 800);
                wraps[nextIdx].classList.add('show');
                window._bannerCurrentIdx = nextIdx;
            }, interval);
        }

        renderImageBanners = function (cfg) {
            const container = document.getElementById('hc-banner-float');
            if (!container) return;

            const urls = [];
            for (let i = 1; i <= 10; i++) {

            const interval = Math.max(parseInt(cfg.banner_interval, 10) || 5000, 2000);
            // 페이지별 독립 배너 위치 키 (page2는 p2_ 접두사)
            const bp = isHostMode ? '' : 'p2_';
            const layout = {
                left: normalizeCssLength(cfg[bp + 'banner_left']),
                right: normalizeCssLength(cfg[bp + 'banner_right']),
                top: normalizeCssLength(cfg[bp + 'banner_top']),
                bottom: normalizeCssLength(cfg[bp + 'banner_bottom'])
            };
            const maxW = ensureViewportUnit(cfg[bp + 'banner_width'], 'vw') || ensureViewportUnit(cfg.banner_maxwidth, 'vw') || '42vw';
            const maxH = ensureViewportUnit(cfg[bp + 'banner_height'], 'vh') || ensureViewportUnit(cfg.banner_maxheight, 'vh') || '50vh';
            const bannerHidden = ['1', 'true', 'yes', 'on'].indexOf(String(cfg.banner_hidden || '').trim().toLowerCase()) >= 0;
            const bannerOpacity = normalizeOpacity(cfg.banner_opacity, 0.93);

            const _bp2 = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase();
            const isBracketPage = _bp2 === 'bracket' || _bp2 === '3' || _bp2 === '3p';
            applyBannerPlacement(container, layout);
            container.style.setProperty('--banner-opacity', bannerOpacity);
            const bannerShowOff = cfg[bp + 'banner_show'] === '0' || container.dataset.bannerHiddenByToggle === '1' || isBracketPage;
            if (bannerHidden || bannerShowOff || !urls.length) {
                if (window._bannerRotateTimer) {
                    clearInterval(window._bannerRotateTimer);
                    window._bannerRotateTimer = null;
                }
                container.innerHTML = '';
                container.classList.remove('banner-active');
                window._bannerRenderState = null;
                window._bannerCurrentIdx = 0;
                return;
            }
            container.classList.add('banner-active');

            const imageKey = JSON.stringify({ urls: urls, maxW: maxW, maxH: maxH });
            const state = window._bannerRenderState || {};
            const wraps = Array.from(container.querySelectorAll('.banner-item-wrap'));

            if (state.imageKey === imageKey && wraps.length === urls.length) {
                wraps.forEach(function (wrap) {
                    wrap.style.setProperty('--banner-w', maxW);
                    wrap.style.setProperty('--banner-h', maxH);
                });

                if (state.interval !== interval) {
                    startBannerRotation(wraps, interval);
                }

                window._bannerRenderState = {
                    imageKey: imageKey,
                    interval: interval
                };
                return;
            }

            if (window._bannerRotateTimer) {
                clearInterval(window._bannerRotateTimer);
                window._bannerRotateTimer = null;
            }
            container.innerHTML = '';
            window._bannerCurrentIdx = 0;

            const nextWraps = [];
            urls.forEach(function (url, i) {

                wrap.className = 'banner-item-wrap';
                wrap.style.setProperty('--banner-w', maxW);

                wrap.appendChild(blurBg);

                mainImg.onload = function () {
                    if (i === 0 && window._bannerCurrentIdx === 0) wrap.classList.add('show');
                };
                mainImg.onerror = function () { wrap.style.display = 'none'; };
                container.appendChild(wrap);
                nextWraps.push(wrap);
            });

            if (nextWraps.length > 0) {
                requestAnimationFrame(() => nextWraps[0].classList.add('show'));
            }

            startBannerRotation(nextWraps, interval);
            window._bannerRenderState = {
                imageKey: imageKey,
                interval: interval
            };
        };

        }

        function applyPage2InfoPlacement(cfg) {
            if (isHostMode || isBracketPageTemp) return;
            const info = document.getElementById('scoreboard-wrap');
            if (!info) return;
            const left = normalizeCssLength(cfg.p2_info_left);
            const right = normalizeCssLength(cfg.p2_info_right);
            const top = normalizeCssLength(cfg.p2_info_top);
            const bottom = normalizeCssLength(cfg.p2_info_bottom);

            info.style.left = 'auto';
            info.style.right = 'auto';
            info.style.top = 'auto';
            info.style.bottom = 'auto';
            if (hasPlacementValue(right)) info.style.right = safeEdgeCss(right, 'x');
            else if (hasPlacementValue(left)) info.style.left = safeEdgeCss(left, 'x');
            else info.style.right = 'var(--broadcast-safe-x)';
            if (hasPlacementValue(bottom)) info.style.bottom = safeEdgeCss(bottom, 'y');
            else if (hasPlacementValue(top)) info.style.top = safeEdgeCss(top, 'y');
            else info.style.top = 'var(--broadcast-safe-y)';
        }

        function applyLoadedHostConfig(cfg) {
            if (!cfg) return;
            window.latestConfigMap = cfg;
            const eventModule = applyAuctionEventModule(cfg);
            const hadPage2PhotoConfig = page2PhotoConfigReady;
            applyPage2PhotoConfig(cfg);
            page2PhotoConfigReady = true;
            const photoStack = document.getElementById('photo-stack');
            if (photoStack) photoStack.classList.remove('config-pending');
            if (!document.body.classList.contains('host-mode') && !hadPage2PhotoConfig && lastRenderedItem) {
                lastJson = null;
                render(lastRenderedItem);
            }

            // 스코어보드 폰트 크기, 투명도, 대회명 적용
            const sbWrap = document.getElementById('scoreboard-wrap');
            if (sbWrap) {
                if (cfg.scoreboard_name_fontsize) sbWrap.style.setProperty('--sb-name-size', cfg.scoreboard_name_fontsize + 'px');
                if (cfg.scoreboard_pill_fontsize) sbWrap.style.setProperty('--sb-pill-size', cfg.scoreboard_pill_fontsize + 'px');
                // 대회명 라벨 폰트 크기 (직접 스타일)
                const labelEl = document.getElementById('auction-progress');
                if (labelEl) {
                    if (cfg.scoreboard_label_fontsize) labelEl.style.fontSize = cfg.scoreboard_label_fontsize + 'px';
                    window._baseScoreboardLabel = cfg.scoreboard_label || eventModule.scoreboardLabel || window._baseScoreboardLabel;
                    updateProgressText();
                }
                // 박스 투명도 (직접 background 스타일)
                if (cfg.scoreboard_opacity) {
                    const op = parseFloat(cfg.scoreboard_opacity);
                    if (!isNaN(op)) {
                        const nameSection = sbWrap.querySelector('.name-section');
                        const traitsSection = sbWrap.querySelector('.traits');
                        if (nameSection) nameSection.style.background = 'rgba(10, 15, 28, ' + op + ')';
                        if (traitsSection) traitsSection.style.background = 'rgba(20, 28, 46, ' + op + ')';
                    }
                }
            }
            
            // 페이지별 독립 배너/티커 위치 키 접두사
            applyPage2InfoPlacement(cfg);

            const lp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase() === 'bracket' ? 'p3_' : (document.body.classList.contains('host-mode') ? '' : 'p2_');

            // 티커(자막 바) 위치 적용
            const bottomBar = document.querySelector('.hc-bottom-bar');
            if (bottomBar) {
                if (cfg[lp + 'ticker_show'] === '0' || lp === 'p3_') {
                    bottomBar.style.setProperty('display', 'none', 'important');
                } else {
                    bottomBar.style.removeProperty('display');
                    
                    // 티커 위치 적용 (auto 값 필터링)
                    const tIsVal = (v) => v && v !== 'auto' && v !== 'initial' && v !== 'unset';
                    const tTop = cfg[lp + 'ticker_top'];
                    const tBottom = cfg[lp + 'ticker_bottom'];
                    if (tIsVal(tBottom)) {
                        bottomBar.style.bottom = tBottom;
                        bottomBar.style.top = 'auto';
                        bottomBar.style.removeProperty('top');
                    } else if (tIsVal(tTop)) {
                        bottomBar.style.top = tTop;
                        bottomBar.style.bottom = 'auto';
                        bottomBar.style.removeProperty('bottom');
                    } else {
                        bottomBar.style.bottom = '0';
                        bottomBar.style.top = 'auto';
                        bottomBar.style.removeProperty('top');
                    }
                    // 티커는 항상 좌우 풀사이즈
                    bottomBar.style.left = '0';
                    bottomBar.style.right = '0';
                    // 티커 높이 적용
                    const tH = ensureViewportUnit(cfg[lp + 'ticker_height'], 'vh');
                    if (tH && tH !== 'auto') {
                        bottomBar.style.height = tH;
                    }
                }
            }

            const bannerContainer = document.querySelector('.hc-banner-float');
            if (bannerContainer) {
                if (cfg[lp + 'banner_show'] === '0') {
                    bannerContainer.classList.remove('banner-active');
                    bannerContainer.dataset.bannerHiddenByToggle = '1';
                } else {
                    delete bannerContainer.dataset.bannerHiddenByToggle;
                    bannerContainer.style.removeProperty('display');
                }
            }

            // 티커 카드 및 이미지 배너 렌더링 (page 1, 2 공통)
            renderTickerCards(cfg);

            if (!document.body.classList.contains('host-mode')) return;

            // 진행자 네임택 개별 위치 적용 (nametag1_*, nametag2_*)
            function applyNTPos(el, prefix, defaultLeft, defaultBottom, defaultRight = 'auto') {
                if (!el) return;
                el.style.removeProperty('left');
                el.style.removeProperty('right');
                el.style.removeProperty('top');
                el.style.removeProperty('bottom');
                const ntLeft = cfg[prefix+'left'];
                const ntRight = cfg[prefix+'right'];
                const ntWidth = cfg['nametag_width'] || cfg[prefix+'width'];
                const ntHeight = cfg['nametag_height'] || cfg[prefix+'height'];
                const ntTop = cfg['nametag_top'] || cfg[prefix+'top'];
                const ntBottom = cfg['nametag_bottom'] || cfg[prefix+'bottom'];

                if (hasPlacementValue(ntRight)) el.style.right = safeEdgeCss(ntRight, 'x');
                else if (hasPlacementValue(ntLeft)) el.style.left = safeEdgeCss(ntLeft, 'x');
                else {
                    if (defaultRight !== 'auto') el.style.right = safeEdgeCss(defaultRight, 'x');
                    else el.style.left = safeEdgeCss(defaultLeft, 'x');
                }
                
                if (hasPlacementValue(ntBottom)) el.style.bottom = safeEdgeCss(ntBottom, 'y');
                else if (hasPlacementValue(ntTop)) el.style.top = safeEdgeCss(ntTop, 'y');
                else el.style.bottom = safeEdgeCss(defaultBottom, 'y');
                
                if (cfg[prefix+'show'] === '0') {
                    el.style.setProperty('display','none','important');
                } else {
                    el.style.removeProperty('display');
                }
                // 네임택 크기 적용
                const ntW = ensureViewportUnit(ntWidth, 'vw');
                const ntH = ensureViewportUnit(ntHeight, 'vh');
                if (ntW && ntW !== 'auto') el.style.width = ntW;
                if (ntH && ntH !== 'auto') el.style.height = ntH;
            }
            applyNTPos(document.getElementById('host-nametag-1'), 'nametag1_', '3%', '6%');
            applyNTPos(document.getElementById('host-nametag-2'), 'nametag2_', 'auto', '6%', '3%');

            // Apply nametag font size
            const ntFontSize = parseInt(cfg.nametag_font_size, 10) || 22;
            document.querySelectorAll('.host-nametag').forEach(el => {
                el.style.setProperty('--nt-font-size', ntFontSize + 'px');
                el.style.setProperty('--nt-role-font-size', Math.round(ntFontSize * 0.55) + 'px');
            });
            // 룰 → 개별 필 박스 생성 (라벨 없이 값만) — host mode 전용
            const stackEl = document.getElementById('hc-rules-stack');
            if (stackEl) {
                stackEl.innerHTML = '';
                // rules_position 설정: 'top'이면 헤더 바로 아래에서 아래로 깔림
                if (cfg.rules_position === 'top') {
                    stackEl.classList.add('hc-rules-top');
                } else {
                    stackEl.classList.remove('hc-rules-top');
                }
                // 룰 → 단일 카드 안에 행으로 구성
                const rules = [];
                for (let i = 1; i <= 10; i++) {
                    const value = cfg['rule' + i] || cfg['rule' + i + '_value'];
                    if (value) rules.push(value);
                }
                if (rules.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'hc-rules-card';
                    rules.forEach(text => {
                        const row = document.createElement('div');
                        row.className = 'hc-rule-row';
                        // [라벨] 나머지 → 라벨 + 값 분리
                        const m = text.match(/^\[([^\]]+?)(?::([^\]]+))?\]\s*(.*)$/);
                        if (m) {
                            const labelSpan = document.createElement('span');
                            labelSpan.className = 'hc-rule-label';
                            labelSpan.textContent = m[1];
                            if (m[2]) labelSpan.style.color = m[2];
                            const valueSpan = document.createElement('span');
                            valueSpan.className = 'hc-rule-value';
                            valueSpan.textContent = m[3];
                            row.appendChild(labelSpan);
                            row.appendChild(valueSpan);
                        } else {
                            row.innerHTML = renderColorMarkup(text);
                        }
                        card.appendChild(row);
                    });
                    stackEl.appendChild(card);
                }
                stackEl.style.display = rules.length > 0 ? 'flex' : 'none';
            }

            // 진행자 네임택 렌더링 (show 상태 존중)
            for (let i = 1; i <= 2; i++) {
                const name = (cfg['host_name' + i] || '').trim();
                const role = (cfg['host_role' + i] || '').trim();
                const tag = document.getElementById('host-nametag-' + i);
                const nameEl = document.getElementById('nt-name-' + i);
                const roleEl = document.getElementById('nt-role-' + i);
                if (tag) {
                    if (name && cfg['nametag' + i + '_show'] !== '0') {
                        nameEl.textContent = name;
                        roleEl.textContent = role;
                        roleEl.style.display = role ? '' : 'none';
                        tag.style.display = 'flex';
                    } else {
                        tag.style.display = 'none';
                    }
                }
            }
            syncNametagWidths(cfg);
        }

        async function loadHostConfig() {
            try {
                const cfg = await getRuntimeConfigMap(false);
                applyLoadedHostConfig(cfg || {});
            } catch (err) {
                console.error('loadHostConfig error', err);
                applyLoadedHostConfig(window.latestConfigMap || {});
            }
        }

        function maybeRefreshHostConfig(force) {
            const now = Date.now();
            const lastSyncAt = window._lastHostConfigSyncAt || 0;
            const minInterval = hasActive ? 1500 : 3000;
            if (!force && now - lastSyncAt < minInterval) return;
            window._lastHostConfigSyncAt = now;
            loadHostConfig();
        }


        function render(item) {
            const _bp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase();
            const isBracketPage = _bp === 'bracket' || _bp === '3' || _bp === '3p';
            if (isBracketPage) {
                const empty = document.getElementById("empty");
                const bc = document.getElementById("broadcast");
                if (empty) empty.style.display = "none";
                if (bc) bc.style.display = "none";
                return;
            }
            window.activeItem = item;
            updateProgressText();
            let configPart = '';
            if (item && window.latestConfigMap) {
                const active = window.latestConfigMap.active_tournament;
                if (active && active !== 'none') {
                    configPart = '|' + active + '|' + (window.latestConfigMap['tournament_bracket_' + active] || '');
                }
            }
            const json = item ? (JSON.stringify(item) + configPart) : '';
            if (json === lastJson) return;
            lastJson = json;

            const empty = document.getElementById("empty");
            const bc = document.getElementById("broadcast");
            const topBar = document.getElementById("top-bar");
            const photoStack = document.getElementById("photo-stack");
            const isHost = document.body.classList.contains('host-mode');

            if (!item) {
                if (topBar) topBar.style.removeProperty("display");
                if (photoStack) photoStack.style.removeProperty("display");
                if (isHost) {
                    empty.style.display = "none";
                    bc.style.display = "block";
                    document.getElementById("hc-name").textContent = "";
                    document.getElementById("hc-sub").textContent = "";
                    const hcPhoto = document.getElementById("hc-photo");
                    hcPhoto.removeAttribute("src");
                    hcPhoto.style.display = "none";
                    const hcHeader = document.getElementById("hc-header-float");
                    if (hcHeader) hcHeader.style.paddingLeft = '32px';
                    const hcTraitsEl = document.getElementById("hc-traits-container");
                    if (hcTraitsEl) hcTraitsEl.classList.remove("has-items");
                } else {
                    empty.style.display = "";
                    bc.style.display = "block";
                    const scoreboardWrap = document.getElementById("scoreboard-wrap");
                    if (scoreboardWrap) scoreboardWrap.style.display = "none";
                    if (photoStack) photoStack.style.display = "none";
                }
                return;
            }

            empty.style.display = "none";
            bc.style.display = "block";
            const scoreboardWrap = document.getElementById("scoreboard-wrap");
            if (scoreboardWrap) {
                scoreboardWrap.style.removeProperty("display");
            }
            if (topBar) {
                if (isHost) topBar.style.removeProperty("display");
                else topBar.style.display = "flex";
            }
            if (photoStack) {
                if (isHost) photoStack.style.removeProperty("display");
                else photoStack.style.display = "flex";
                photoStack.classList.toggle('config-pending', !isHost && !page2PhotoConfigReady);
            }

            const origName = item.displayName || item.name || "";
            let displayName = origName;
            
            // Check for tournament team mapping to find company name
            if (window.latestConfigMap && window.latestConfigMap.active_tournament && window.latestConfigMap.active_tournament !== 'none') {
                const activeScale = window.latestConfigMap.active_tournament;
                const matchObj = origName.trim().match(/^([A-Pa-p])\s*[-_]?\s*([1-9]\d*)$/i);
                if (matchObj) {
                    const letter = matchObj[1].toUpperCase();
                    const idx = letter.charCodeAt(0) - 65;
                    const scaleNum = parseInt(activeScale);
                    if (idx >= 0 && idx < tournamentStageMatchCount(scaleNum) * 2) {
                        const matchIdx = Math.floor(idx / 2) + 1;
                        const slot = (idx % 2 === 0) ? 'left' : 'right';
                        const bracketKey = 'tournament_bracket_' + activeScale;
                        let company = '';
                        if (window.latestConfigMap[bracketKey]) {
                            try {
                                const bracket = JSON.parse(window.latestConfigMap[bracketKey]);
                                if (bracket && bracket.matches && bracket.matches[activeScale + '_' + matchIdx]) {
                                    company = bracket.matches[activeScale + '_' + matchIdx][slot] || '';
                                }
                            } catch(e){}
                        }
                        if (company) {
                            item.company = company;
                        }
                    }
                }
            }

            // 공개 화면에는 업체를 특정할 수 있는 팀 코드(A1/C2 등)를 노출하지 않는다.
            let cleanInfoName = getAuctionItemDisplayLabel(item) || origName;
            const publicCompanyName = String(item.company || '').trim();
            const presentation = getBroadcastPresentation(item, window.latestConfigMap || {});
            const showCompanyInline = presentation.showCompany && Boolean(publicCompanyName);
            if (publicCompanyName) {
                const escapedCompany = publicCompanyName.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(escapedCompany, 'gi');
                const withoutCompany = cleanInfoName
                    .replace(regex, '')
                    .replace(/^\s*[-·:]\s*/, '')
                    .replace(/\s*[-·:]\s*$/, '')
                    .replace(/\s+/g, ' ')
                    .trim();
                if (withoutCompany) cleanInfoName = withoutCompany;
            }
            // 공개 화면은 팀 슬롯과 분리된 숫자 라벨만 사용한다.
            const publicAuctionName = [cleanInfoName, publicCompanyName].filter(Boolean).join(' · ');
            document.getElementById("info-name").textContent = showCompanyInline ? publicAuctionName : cleanInfoName;
            document.getElementById("info-sub").textContent = presentation.label;

            // 호스트 카드 데이터 렌더링
            document.getElementById("hc-name").textContent = showCompanyInline
                ? publicAuctionName
                : getCurrentTournamentItemLabel(item);
            document.getElementById("hc-sub").textContent = '';

            // 서버에서 받은 개별 사진 숨김 플래그
            if (Array.isArray(item.hiddenPhotos)) hiddenPhotos = item.hiddenPhotos;

            const hcPhoto = document.getElementById("hc-photo");
            const hcHeader = document.getElementById("hc-header-float");
            const itemPhotoHidden = hiddenPhotos.indexOf('item') >= 0;
            if (item.photoItem && !itemPhotoHidden) {
                hcPhoto.src = item.photoItem;
                hcPhoto.style.display = "block";
                if (hcHeader) hcHeader.style.paddingLeft = '120px';
            } else {
                hcPhoto.removeAttribute("src");
                hcPhoto.style.display = "none";
                if (hcHeader) hcHeader.style.paddingLeft = '32px';
            }

            // 사진 — hiddenPhotos에 포함된 키는 숨김
            const subs = { sire: "photoSire", dam: "photoDam", sibling: "photoSibling" };
            const subLabels = {
                sire: item.sireName ? ("부 · " + item.sireName) : "부",
                dam: item.damName ? ("모 · " + item.damName) : "모",
                sibling: item.siblingName ? ("동배 · " + item.siblingName) : "동배"
            };
            const photoOnlySibling = ['solo', 'extra', 'event'].includes(
                String(getItemAuctionMeta(item).auctionType || '').toLowerCase()
            );
            const visibleSubKeys = [];
            for (const [key, field] of Object.entries(subs)) {
                const isHidden = hiddenPhotos.indexOf(key) >= 0;
                if (item[field] && !isHidden) visibleSubKeys.push(key);
            }
            const activeSubKeys = visibleSubKeys.slice(0, 2);
            for (const [key, field] of Object.entries(subs)) {
                const slot = document.getElementById("slot-" + key);
                const img = document.getElementById("img-" + key);
                const label = slot.querySelector(".label");
                const visibleIndex = activeSubKeys.indexOf(key);
                slot.classList.remove("visible", "slot-primary", "slot-secondary");
                slot.classList.toggle("photo-only", key === "sibling" && photoOnlySibling);
                if (visibleIndex >= 0) {
                    img.src = item[field];
                    if (label) label.textContent = subLabels[key];
                    slot.classList.add("visible");
                    slot.classList.add(visibleIndex === 0 ? "slot-primary" : "slot-secondary");
                } else {
                    img.removeAttribute("src");
                }
            }
            // 사진 수에 따라 축소 클래스 적용
            const visCount = activeSubKeys.length;
            const stack = document.getElementById('photo-stack');
            stack.classList.remove('two-photos', 'three-photos');
            if (visCount === 2) stack.classList.add('two-photos');

            // 특성 — checklist/note가 바뀔 때만 pill 배지 재구성
            const traitsKey = (item.checklist || "") + "|" + (item.note || "");
            if (traitsKey !== window._lastTraitsKey) {
                window._lastTraitsKey = traitsKey;

                const track = document.getElementById("traits-track");
                track.innerHTML = "";
                if (window._marqueeRaf) { cancelAnimationFrame(window._marqueeRaf); window._marqueeRaf = null; }

                const cl = parseChecklist(item.checklist || "");
                const gm = { M: "수컷", F: "암컷", U: "미구분" };
                const yn = { O: "O", X: "X" };

                // pill 배지 생성 함수 (type: 'accent' | 'info' | '' )
                function addPill(container, text, type) {
                    const el = document.createElement("span");
                    el.className = 'pill' + (type ? ' pill-' + type : '');
                    el.textContent = text;
                    container.appendChild(el);
                }

                const isCleanNote = (txt) => {
                    if (!txt) return false;
                    const clean = String(txt).trim().toLowerCase();
                    return clean !== '' && clean !== 'none' && clean !== 'null' && clean !== 'undefined';
                };
                const quizMeta = getQuizItemMeta(item);
                if (quizMeta.isQuiz) {
                    addPill(track, 'EVENT QUIZ', 'quiz');
                } else {
                    // 기본 정보 (악센트 컬러)
                    if (cl.gender) addPill(track, gm[cl.gender] || cl.gender, 'accent');
                    if (cl.weight) addPill(track, cl.weight + 'g', 'accent');
                    // 출생일 (info 컬러)
                    if (cl.birth) addPill(track, cl.birth, 'info');
                    // 체크 항목들 (기본 컬러)
                    if (cl.spot) addPill(track, '점:' + (yn[cl.spot] || cl.spot), '');
                    if (cl.pin) addPill(track, '풀핀:' + (yn[cl.pin] || cl.pin), '');
                    if (cl.size) addPill(track, '도살:' + (GRADE[cl.size] || cl.size), '');
                    if (cl.wall) addPill(track, '월높이:' + (GRADE[cl.wall] || cl.wall), '');
                    if (cl.color) addPill(track, '색감:' + (GRADE[cl.color] || cl.color), '');
                    if (cl.activity) addPill(track, '활동성:' + (GRADE[cl.activity] || cl.activity), '');
                    if (cl.feed) addPill(track, '먹이:' + (GRADE[cl.feed] || cl.feed), '');
                    if (cl.structure) addPill(track, '체형:' + (GRADE[cl.structure] || cl.structure), '');
                    if (isCleanNote(cl.memo)) addPill(track, cl.memo, '');
                    if (isCleanNote(item.note) && item.note !== cl.memo) {
                        addPill(track, item.note, '');
                    }
                }

                // 호스트 모드 특성 트랙 (page 1 용) — 비워두기
                const hcTrack = document.getElementById("hc-traits-track");
                if (hcTrack) {
                    hcTrack.innerHTML = "";
                    hcTrack.classList.remove("scroll");
                    const hcTraitsEl = hcTrack.closest('.hc-traits');
                    if (hcTraitsEl) hcTraitsEl.classList.remove('has-items');
                }
            }
        }

        function parseChecklist(str) {
            const cl = {};
            if (!str) return cl;
            str.split("|").forEach(pair => {
                const idx = pair.indexOf(":");
                if (idx > 0) cl[pair.substring(0, idx).trim()] = pair.substring(idx + 1).trim();
            });
            return cl;
        }

        let hasActive = false;
        function isAuctionActiveStatus(status) {
            const value = String(status || '').trim().toLowerCase();
            return value === 'active' || value.includes('진행') || value.includes('경매');
        }

        function isAuctionActiveItem(item) {
            return isAuctionActiveStatus(item?.status);
        }

        async function smartRefresh(prefetchedItems) {
            if (document.hidden) return;
            maybeRefreshHostConfig(false);
            try {
                const items = Array.isArray(prefetchedItems)
                    ? prefetchedItems
                    : await getBroadcastItemsCached(false, 15000);
                processItemsList(items);
                const active = items.find(candidate => isAuctionActiveItem(candidate));
                const item = active ? await enrichBroadcastItem(active) : null;
                hasActive = !!item;
                render(item);
            } catch (err) {
                console.error("smartRefresh error", err);
                throw err;
            }
        }
        const _origRender = render;
        render = function (item) {
            hasActive = !!item;
            lastRenderedItem = item ? JSON.parse(JSON.stringify(item)) : null;
            _origRender(item);
            renderSaleModeOverlay(item);
        };

        // 경매 변경 감지 기반 경량 폴링
        // - 0.35초마다 id/status/updated_at 한 행만 확인한다.
        // - 실제 변경 시에만 사진을 제외한 경량 목록을 다시 받는다.
        // - 사진은 현재 개체가 바뀔 때 한 번만 받고 페이지 안에서 캐시한다.
        // - 숨김 탭은 네트워크 조회를 멈추고 다시 보일 때 즉시 동기화한다.
        const AUCTION_HOT_WINDOW_MS = 10 * 60 * 1000;
        const AUCTION_HOT_POLL_MS = 350;
        const AUCTION_FULL_SYNC_MS = 15000;
        const AUCTION_VIEW_SYNC_MS = 1500;
        const AUCTION_MAX_BACKOFF_MS = 8000;
        let _auctionPollTimer = null;
        let _auctionPollRunning = false;
        let _auctionPollStarted = false;
        let _auctionHotUntil = 0;
        let _auctionLastDataAt = 0;
        let _auctionLastActivityAt = 0;
        let _auctionPollErrors = 0;
        let _auctionLastPulseKey = '';
        let _auctionLastViewSyncAt = 0;
        let _auctionItemsCache = [];
        let _auctionItemsLoaded = false;

        function _publishAuctionPollState() {
            const now = Date.now();
            window.__auctionPollState = {
                mode: now < _auctionHotUntil ? 'hot' : 'idle',
                hotUntil: _auctionHotUntil,
                lastDataAt: _auctionLastDataAt,
                lastActivityAt: _auctionLastActivityAt,
                errors: _auctionPollErrors,
                intervalMs: Math.min(
                    AUCTION_MAX_BACKOFF_MS,
                    AUCTION_HOT_POLL_MS * Math.pow(2, _auctionPollErrors)
                )
            };
            document.body.dataset.auctionPollMode = window.__auctionPollState.mode;
            document.body.dataset.auctionPollInterval = String(window.__auctionPollState.intervalMs);
            document.body.dataset.auctionLastDataAt = String(_auctionLastDataAt || 0);
        }

        function _latestItemActivityAt(items) {
            let latest = 0;
            (items || []).forEach(item => {
                const parsed = Date.parse(item?.updated_at || item?.updatedAt || '');
                if (Number.isFinite(parsed) && parsed > latest) latest = parsed;
            });
            return latest;
        }

        function _applyAuctionActivity(activityAt, items) {
            const now = Date.now();
            const safeActivityAt = Math.min(Number(activityAt) || 0, now);
            const hasLiveItem = Array.isArray(items) && items.some(item =>
                isAuctionActiveItem(item)
            );
            if (safeActivityAt > _auctionLastActivityAt) {
                _auctionLastActivityAt = safeActivityAt;
            }
            if (safeActivityAt && now - safeActivityAt < AUCTION_HOT_WINDOW_MS) {
                _auctionHotUntil = Math.max(_auctionHotUntil, safeActivityAt + AUCTION_HOT_WINDOW_MS);
            }
            if (hasLiveItem) {
                _auctionHotUntil = Math.max(_auctionHotUntil, now + AUCTION_HOT_WINDOW_MS);
            }
        }

        async function _refreshBroadcastFromItems(items) {
            if (isBracketPageTemp) {
                await refreshBracketPage(items);
            } else {
                await smartRefresh(items);
                await refreshBattleOverlayState(window.latestConfigMap || null, items);
            }
        }

        function _scheduleAuctionPoll(delay) {
            if (_auctionPollTimer) clearTimeout(_auctionPollTimer);
            _auctionPollTimer = setTimeout(_adaptiveAuctionPollTick, delay);
        }

        async function _adaptiveAuctionPollTick(forceData = false) {
            if (_auctionPollRunning) return;
            if (document.hidden) {
                _scheduleAuctionPoll(1500);
                return;
            }
            _auctionPollRunning = true;
            let retryAfterMs = 0;
            try {
                maybeRefreshHostConfig(false);
                const now = Date.now();
                const pulse = await getAuctionPulse();
                const pulseKey = [pulse?.id ?? '', pulse?.status || '', pulse?.updatedAt || ''].join('|');
                const pulseChanged = Boolean(_auctionLastPulseKey && pulseKey !== _auctionLastPulseKey);
                _auctionLastPulseKey = pulseKey;
                const activityAt = Date.parse(pulse?.updatedAt || '');
                _applyAuctionActivity(activityAt, null);
                const needsData = forceData
                    || !_auctionItemsLoaded
                    || pulseChanged
                    || now - _auctionLastDataAt >= AUCTION_FULL_SYNC_MS;

                if (needsData) {
                    const items = await getBroadcastItemsLite();
                    _auctionItemsCache = items || [];
                    _auctionItemsLoaded = true;
                    _applyAuctionActivity(_latestItemActivityAt(items), items);
                    _auctionLastDataAt = Date.now();
                    _auctionLastViewSyncAt = Date.now();
                    await _refreshBroadcastFromItems(items);
                } else if (now - _auctionLastViewSyncAt >= AUCTION_VIEW_SYNC_MS) {
                    _auctionLastViewSyncAt = Date.now();
                    await _refreshBroadcastFromItems(_auctionItemsCache);
                }
                _auctionPollErrors = 0;
            } catch (err) {
                _auctionPollErrors = Math.min(_auctionPollErrors + 1, 4);
                retryAfterMs = Number(err?.retryAfterMs) || 0;
                if (err?.code !== 'SUPABASE_QUOTA_COOLDOWN') {
                    console.error('adaptive auction poll error', err);
                }
