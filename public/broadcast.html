                if (!_auctionItemsLoaded) {
                    _auctionItemsLoaded = true;
                    _auctionItemsCache = [];
                    await _refreshBroadcastFromItems([]);
                }
            } finally {
                _auctionPollRunning = false;
                _publishAuctionPollState();
                const backoff = Math.min(
                    AUCTION_MAX_BACKOFF_MS,
                    AUCTION_HOT_POLL_MS * Math.pow(2, _auctionPollErrors)
                );
                _scheduleAuctionPoll(retryAfterMs || backoff);
            }
        }

        function startAuctionAdaptivePolling() {
            if (_auctionPollStarted) return;
            _auctionPollStarted = true;
            _publishAuctionPollState();
            _adaptiveAuctionPollTick(true);
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden) _adaptiveAuctionPollTick(true);
            });
        }

        // 브라우저 내 즉시 동기 (웹 → 방송)
        try {
            const bc = new BroadcastChannel('auction-photos');
            bc.onmessage = function (e) {
                if (e.data && e.data.type === 'hiddenPhotos') {
                    hiddenPhotos = e.data.hidden || [];
                    lastJson = null;
                    if (lastRenderedItem) {
                        render(Object.assign({}, lastRenderedItem, { hiddenPhotos: hiddenPhotos.slice() }));
                    } else {
                        smartRefresh();
                    }
                }
            };
        } catch (e) { }

        // ── PostMessage 수신: 설정/프리뷰에서 실시간 반영 ──
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;

            if (e.data.type === 'configUpdate') {
                // 전체 config 맵 갱신 → 티커/배너/룰 즉시 반영
                const cfg = Object.assign({}, window.latestConfigMap || {}, e.data.config || {});
                window.latestConfigMap = cfg;
                applyAuctionEventModule(cfg);
                if (document.body.classList.contains('bracket-page')) {
                    applyBracketPageMap(cfg, window.latestItemsList || []);
                }
                const bottomBar = document.querySelector('.hc-bottom-bar');
                const bannerContainer = document.querySelector('.hc-banner-float');
                const lp = (new URLSearchParams(window.location.search).get('page') || '').toLowerCase() === 'bracket' ? 'p3_' : (document.body.classList.contains('host-mode') ? '' : 'p2_');

                // 티커 show/hide 및 위치
                if (bottomBar) {
                    if (cfg[lp + 'ticker_show'] === '0' || lp === 'p3_') {
                        bottomBar.style.setProperty('display', 'none', 'important');
                    } else {
                        bottomBar.style.removeProperty('display');
                        const tIsV2 = (v) => v && v !== 'auto' && v !== 'initial' && v !== 'unset';
                        const tT2 = cfg[lp + 'ticker_top'];
                        const tB2 = cfg[lp + 'ticker_bottom'];
                        if (tIsV2(tB2)) {
                            bottomBar.style.bottom = tB2;
                            bottomBar.style.top = 'auto';
                        } else if (tIsV2(tT2)) {
                            bottomBar.style.top = tT2;
                            bottomBar.style.bottom = 'auto';
                        } else {
                            bottomBar.style.bottom = '0';
                            bottomBar.style.top = 'auto';
                        }
                        bottomBar.style.left = '0';
                        bottomBar.style.right = '0';
                        const tH2 = ensureViewportUnit(cfg[lp + 'ticker_height'], 'vh');
                        if (tH2 && tH2 !== 'auto') bottomBar.style.height = tH2;
                    }
                }

                // 배너 show/hide 및 실시간 위치/크기 반영
                if (bannerContainer) {
                    if (cfg[lp + 'banner_show'] === '0' || lp === 'p3_') {
                        bannerContainer.classList.remove('banner-active');
                        bannerContainer.dataset.bannerHiddenByToggle = '1';
                    } else {
                        delete bannerContainer.dataset.bannerHiddenByToggle;
                        // 실시간 위치 적용
                        const layout = {
                            left: normalizeCssLength(cfg[lp + 'banner_left']),
                            right: normalizeCssLength(cfg[lp + 'banner_right']),
                            top: normalizeCssLength(cfg[lp + 'banner_top']),
                            bottom: normalizeCssLength(cfg[lp + 'banner_bottom'])
                        };
                        applyBannerPlacement(bannerContainer, layout);
                        // 실시간 크기 적용
                        const maxW = ensureViewportUnit(cfg[lp + 'banner_width'], 'vw') || ensureViewportUnit(cfg.banner_maxwidth, 'vw') || '42vw';
                        const maxH = ensureViewportUnit(cfg[lp + 'banner_height'], 'vh') || ensureViewportUnit(cfg.banner_maxheight, 'vh') || '50vh';
                        const wraps = Array.from(bannerContainer.querySelectorAll('.banner-item-wrap'));
                        wraps.forEach(function (wrap) {
                            wrap.style.setProperty('--banner-w', maxW);
                            wrap.style.setProperty('--banner-h', maxH);
                        });
                    }
                }

                // 스코어보드 폰트 크기, 투명도, 대회명 실시간 반영
                const sbWrap = document.getElementById('scoreboard-wrap');
                if (sbWrap) {
                    if (cfg.scoreboard_name_fontsize) sbWrap.style.setProperty('--sb-name-size', cfg.scoreboard_name_fontsize + 'px');
                    if (cfg.scoreboard_pill_fontsize) sbWrap.style.setProperty('--sb-pill-size', cfg.scoreboard_pill_fontsize + 'px');
                    const labelEl = document.getElementById('auction-progress');
                    if (labelEl) {
                        if (cfg.scoreboard_label_fontsize) labelEl.style.fontSize = cfg.scoreboard_label_fontsize + 'px';
                        if (cfg.scoreboard_label !== undefined && cfg.scoreboard_label !== '') {
                            window._baseScoreboardLabel = cfg.scoreboard_label;
                            updateProgressText();
                        }
                    }
                    if (cfg.scoreboard_opacity) {
                        const op = parseFloat(cfg.scoreboard_opacity);
                        if (!isNaN(op)) {
                            const nameSection = sbWrap.querySelector('.name-section');
                            const traitsSection = sbWrap.querySelector('.traits');
                            if (nameSection) nameSection.style.background = 'rgba(10, 15, 28, ' + op + ')';
                            if (traitsSection) traitsSection.style.background = 'rgba(20, 28, 46, ' + op + ')';
                        }
                    }
                }

                // 티커 카드 및 배너 렌더링
                applyPage2InfoPlacement(cfg);
                renderTickerCards(cfg);

                // 호스트 모드 전용: 네임택 개별 위치 적용
                if (document.body.classList.contains('host-mode')) {
                    function applyNTPos2(el, prefix, defaultLeft, defaultBottom, defaultRight = 'auto') {
                        if (!el) return;
                        el.style.removeProperty('left');
                        el.style.removeProperty('right');
                        el.style.removeProperty('top');
                        el.style.removeProperty('bottom');
                        const ntLeft = cfg[prefix+'left'];
                        const ntRight = cfg[prefix+'right'];
                        const ntWidth = cfg['nametag_width'] || cfg[prefix+'width'];
                        const ntHeight = cfg['nametag_height'] || cfg[prefix+'height'];
                        const ntTop = cfg['nametag_top'] || cfg[prefix+'top'];
                        const ntBottom = cfg['nametag_bottom'] || cfg[prefix+'bottom'];

                        if (hasPlacementValue(ntRight)) el.style.right = safeEdgeCss(ntRight, 'x');
                        else if (hasPlacementValue(ntLeft)) el.style.left = safeEdgeCss(ntLeft, 'x');
                        else {
                            if (defaultRight !== 'auto') el.style.right = safeEdgeCss(defaultRight, 'x');
                            else el.style.left = safeEdgeCss(defaultLeft, 'x');
                        }
                        
                        if (hasPlacementValue(ntBottom)) el.style.bottom = safeEdgeCss(ntBottom, 'y');
                        else if (hasPlacementValue(ntTop)) el.style.top = safeEdgeCss(ntTop, 'y');
                        else el.style.bottom = safeEdgeCss(defaultBottom, 'y');
                        
                        if (cfg[prefix+'show'] === '0') {
                            el.style.setProperty('display','none','important');
                        } else {
                            el.style.removeProperty('display');
                        }
                        // 실시간 크기 적용
                        if (ntWidth && ntWidth !== 'auto') el.style.width = ntWidth;
                        if (ntHeight && ntHeight !== 'auto') el.style.height = ntHeight;
                    }
                    applyNTPos2(document.getElementById('host-nametag-1'), 'nametag1_', '3%', '6%');
                    applyNTPos2(document.getElementById('host-nametag-2'), 'nametag2_', 'auto', '6%', '3%');

                    // 진행자 네임택 실시간 텍스트 및 폰트 크기 적용
                    const ntFontSize = parseInt(cfg.nametag_font_size, 10) || 22;
                    document.querySelectorAll('.host-nametag').forEach(el => {
                        el.style.setProperty('--nt-font-size', ntFontSize + 'px');
                        el.style.setProperty('--nt-role-font-size', Math.round(ntFontSize * 0.55) + 'px');
                    });

                    for (let i = 1; i <= 2; i++) {
                        const name = (cfg['host_name' + i] || '').trim();
                        const role = (cfg['host_role' + i] || '').trim();
                        const tag = document.getElementById('host-nametag-' + i);
                        const nameEl = document.getElementById('nt-name-' + i);
                        const roleEl = document.getElementById('nt-role-' + i);
                        if (tag) {
                            if (name && cfg['nametag' + i + '_show'] !== '0') {
                                nameEl.textContent = name;
                                roleEl.textContent = role;
                                roleEl.style.display = role ? '' : 'none';
                                tag.style.display = 'flex';
                            } else {
                                tag.style.display = 'none';
                            }
                        }
                    }
                    syncNametagWidths(cfg);
                }

                // 호스트 모드 전용: 룰 카드 렌더
                if (document.body.classList.contains('host-mode')) {
                    const stackEl = document.getElementById('hc-rules-stack');
                    if (stackEl) {
                        stackEl.innerHTML = '';
                        if (cfg.rules_position === 'top') {
                            stackEl.classList.add('hc-rules-top');
                        } else {
                            stackEl.classList.remove('hc-rules-top');
                        }
                        const rules = [];
                        for (let i = 1; i <= 10; i++) {
                            const value = cfg['rule' + i] || cfg['rule' + i + '_value'];
                            if (value) rules.push(value);
                        }
                        if (rules.length > 0) {
                            const card = document.createElement('div');
                            card.className = 'hc-rules-card';
                            rules.forEach(text => {
                                const row = document.createElement('div');
                                row.className = 'hc-rule-row';
                                const m = text.match(/^\[([^\]]+?)(?::([^\]]+))?\]\s*(.*)$/);
                                if (m) {
                                    const labelSpan = document.createElement('span');
                                    labelSpan.className = 'hc-rule-label';
                                    labelSpan.textContent = m[1];
                                    if (m[2]) labelSpan.style.color = m[2];
                                    const valueSpan = document.createElement('span');
                                    valueSpan.className = 'hc-rule-value';
                                    valueSpan.textContent = m[3];
                                    row.appendChild(labelSpan);
                                    row.appendChild(valueSpan);
                                } else {
                                    row.innerHTML = renderColorMarkup(text);
                                }
                                card.appendChild(row);
                            });
                            stackEl.appendChild(card);
                        }
                        stackEl.style.display = rules.length > 0 ? 'flex' : 'none';
                    }
                }
            }

            if (e.data.type === 'forceRefresh') {
                loadHostConfig();
                smartRefresh();
            }

            if (e.data.type === 'bracketVisibility') {
                const key = e.data.key;
                if (key !== 'bracket_full' && key !== 'bracket_live') return;
                const map = Object.assign({}, window.latestConfigMap || {});
                map[key + '_show'] = String(e.data.show) === '1' ? '1' : '0';
                window.latestConfigMap = map;
                applyBracketPageMap(map);
            }

            if (e.data.type === 'bracketLiveOpacity') {
                const treeLive = document.getElementById('bracket-page-tree-live');
                const value = Math.max(35, Math.min(100, Number(e.data.value) || 94)) / 100;
                if (treeLive) treeLive.style.setProperty('--live-panel-opacity', String(value));
            }
        });

        // ══════════════════════════════════════
        //  배틀 & 토너먼트 오버레이 연출 (자바스크립트)
        // ══════════════════════════════════════
        const params = new URLSearchParams(window.location.search);
        const _pgVal = (params.get('page') || '').toLowerCase();
        const isBracketPage = _pgVal === 'bracket' || _pgVal === '3' || _pgVal === '3p';
        
        if (isBracketPage) {
            // 일반 경매 카드 숨기고 대진표 전체화면 노출
            document.getElementById('empty').style.display = 'none';
            document.getElementById('broadcast').style.display = 'none';
            // document.getElementById('bracket-page-container').style.display = 'block';
        }
        startAuctionAdaptivePolling();

        // 전역 개체 캐시 fallback 확보
        window.latestItemsList = window.latestItemsList || [];

        function isCdcupBlindTotalsMode(map) {
            const moduleId = getActiveAuctionEventModule(map || {}).id;
            return isBracketPage && moduleId === 'cdcup' && String(map?.blind_totals_mode ?? '1') !== '0';
        }

        function readSoldAmount(item) {
            const raw = String(item?.sold_price ?? item?.soldPrice ?? '').trim();
            const numeric = Number(raw.replace(/[^0-9.-]/g, ''));
            return Number.isFinite(numeric) ? numeric : 0;
        }

        function normalizeTotalBidAmount(value) {
            const numeric = Number(String(value ?? 0).replace(/[^0-9.]/g, '')) || 0;
            return numeric >= 1000 ? numeric / 10000 : numeric;
        }

        function readTopBidAmount(item) {
            if (!item || !item.bid_log) return 0;
            try {
                const rows = JSON.parse(item.bid_log);
                if (!Array.isArray(rows)) return 0;
                return rows.reduce((max, bid) => {
                    const amount = normalizeTotalBidAmount(bid?.amount !== undefined && bid?.amount !== null ? bid.amount : bid?.price);
                    return Math.max(max, amount);
                }, 0);
            } catch (e) {
                return 0;
            }
        }

        function readLiveTotalAmount(item) {
            const sold = readSoldAmount(item);
            return isActiveForTotals(item) ? Math.max(sold, readTopBidAmount(item)) : sold;
        }

        function isSoldForTotals(item) {
            const status = String(item?.status || '').trim();
            return status.includes('낙찰')
                || ['완료', 'sold'].includes(status)
                || (readSoldAmount(item) > 0 && String(item?.winner || '').trim());
        }

        function isActiveForTotals(item) {
            return isAuctionActiveItem(item);
        }

        function formatBlindTotalAmount(value) {
            const amount = Number(value) || 0;
            return amount.toLocaleString('ko-KR');
        }

        function normalizeBlindTeamKey(value) {
            return String(value || '').trim().toLocaleLowerCase();
        }

        function makeBlindBracketTeamIndex(map) {
            const byScale = {};
            const anyScale = {};
            [16, 8, 4, 2].forEach(scale => {
                let bracket = { matches: {} };
                try { bracket = JSON.parse(map?.['tournament_bracket_' + scale] || '{"matches":{}}'); } catch (_) {}
                const scaleIndex = {};
                const matchCount = tournamentStageMatchCount(scale);
                for (let i = 1; i <= matchCount; i++) {
                    const match = bracket?.matches?.[scale + '_' + i] || {};
                    [
                        { company: match.left, letter: String.fromCharCode(65 + (i - 1) * 2) },
                        { company: match.right, letter: String.fromCharCode(65 + (i - 1) * 2 + 1) }
                    ].forEach(entry => {
                        const key = normalizeBlindTeamKey(entry.company);
                        if (!key) return;
                        scaleIndex[key] = entry.letter;
                        if (!anyScale[key]) anyScale[key] = entry.letter;
                    });
                }
                byScale[scale] = scaleIndex;
            });
            return { byScale, anyScale };
        }

        function getBlindPreferredScale(items, map) {
            const active = Number.parseInt(map?.active_tournament || '', 10);
            if ([16, 8, 4, 2].includes(active)) return active;
            const configured = Number.parseInt(map?.blind_totals_stage || '', 10);
            if ([16, 8, 4, 2].includes(configured)) return configured;

            const counts = {};
            (items || []).forEach(item => {
                const stage = Number(getItemAuctionMeta(item).tournamentStage) || 0;
                if ([16, 8, 4, 2].includes(stage)) counts[stage] = (counts[stage] || 0) + 1;
            });
            const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
            return best ? Number(best[0]) : 0;
        }

        function getBracketTeamLetterForItem(item, teamIndex, preferredScale) {
            const companyKey = normalizeBlindTeamKey(item.company);
            if (!companyKey) return '';
            const meta = getItemAuctionMeta(item);
            const currentScale = Number(preferredScale) || 0;
            if (currentScale && teamIndex.byScale?.[currentScale]?.[companyKey]) return teamIndex.byScale[currentScale][companyKey];
            const storedScale = Number(meta.tournamentStage) || 0;
            if (storedScale && teamIndex.byScale?.[storedScale]?.[companyKey]) return teamIndex.byScale[storedScale][companyKey];
            return teamIndex.anyScale?.[companyKey] || '';
        }

        function resolveBlindTeamLetter(item, teamIndex, fallbackByCompany, preferredScale) {
            const meta = getItemAuctionMeta(item);
            // 현재 라운드의 대진표 매핑이 있으면 과거 _team/_slot보다 우선한다.
            const bracketTeam = getBracketTeamLetterForItem(item, teamIndex, preferredScale);
            if (bracketTeam) return bracketTeam;
            const metaTeam = String(meta.teamCode || '').trim().toUpperCase();
            if (/^[A-Z]$/.test(metaTeam)) return metaTeam;
            const codeTeam = String(meta.tournamentCode || '').trim().toUpperCase().charAt(0);
            if (/^[A-Z]$/.test(codeTeam)) return codeTeam;

            const companyKey = normalizeBlindTeamKey(item.company);
            if (!fallbackByCompany[companyKey]) {
                fallbackByCompany[companyKey] = String.fromCharCode(65 + Object.keys(fallbackByCompany).length);
            }
            return fallbackByCompany[companyKey];
        }

        function getMedalTotalsTeamFilter(items) {
            const medalItems = (items || []).filter(item => {
                const meta = getItemAuctionMeta(item);
                return meta.auctionType === AUCTION_TYPES.TOURNAMENT
                    && Number(meta.tournamentStage) === 2;
            });
            if (!medalItems.length) return null;

            const activeItem = medalItems.find(item => isAuctionActiveItem(item));
            const activeTeam = String(getItemAuctionMeta(activeItem).teamCode || '').toUpperCase();
            if (activeTeam === 'A' || activeTeam === 'B') return new Set(['A', 'B']);
            if (activeTeam === 'C' || activeTeam === 'D') return new Set(['C', 'D']);

            const hasThirdPlaceItems = medalItems.some(item => {
                const team = String(getItemAuctionMeta(item).teamCode || '').toUpperCase();
                return team === 'C' || team === 'D';
            });
            const finalStarted = medalItems.some(item => {
                const team = String(getItemAuctionMeta(item).teamCode || '').toUpperCase();
                return (team === 'A' || team === 'B')
                    && (isAuctionActiveItem(item) || isSoldForTotals(item));
            });
            if (finalStarted || !hasThirdPlaceItems) return new Set(['A', 'B']);
            return new Set(['C', 'D']);
        }

        function getBlindTotalRows(items, map) {
            const teamIndex = makeBlindBracketTeamIndex(map || {});
            const preferredScale = getBlindPreferredScale(items, map || {});
            const fallbackByCompany = {};
            // 현재 라운드 개체만 합산한다. 과거 라운드의 같은 팀 문자가 현재 팀에 합쳐지면 안 된다.
            const scopedItems = preferredScale ? scopeTournamentItems(items, preferredScale) : (items || []);
            const tournamentItems = scopedItems
                .filter(item => {
                    const meta = getItemAuctionMeta(item);
                    return meta.auctionType === AUCTION_TYPES.TOURNAMENT
                        || Boolean(getBracketTeamLetterForItem(item, teamIndex, preferredScale));
                })
                .sort((a, b) => Number(a.num || 0) - Number(b.num || 0));
            const medalTeamFilter = Number(preferredScale) === 2
                ? getMedalTotalsTeamFilter(tournamentItems)
                : null;
            const groups = [];
            const byTeam = {};
            tournamentItems.forEach(item => {
                const company = String(item.company || '').trim() || '미지정';
                const team = resolveBlindTeamLetter(item, teamIndex, fallbackByCompany, preferredScale);
                if (medalTeamFilter && !medalTeamFilter.has(team)) return;
                if (!byTeam[team]) {
                    byTeam[team] = {
                        company,
                        team,
                        total: 0,
                        soldCount: 0,
                        itemCount: 0,
                        active: false
                    };
                    groups.push(byTeam[team]);
                }
                const group = byTeam[team];
                group.itemCount += 1;
                group.total += readLiveTotalAmount(item);
                if (isSoldForTotals(item)) group.soldCount += 1;
                if (isActiveForTotals(item)) group.active = true;
            });
            return groups.sort((a, b) => a.team.localeCompare(b.team, 'en'));
        }

        // ── 이벤트 매치 업체별 합산 ──
        function getEventMatchRows(items) {
            const sourceItems = items || [];
            const taggedEventItems = sourceItems.filter(item => {
                const meta = getItemAuctionMeta(item);
                return meta.auctionType === AUCTION_TYPES.EVENT;
            });
            if (taggedEventItems.length === 0) return [];

            const eventCompanies = new Set(taggedEventItems.map(item => String(item.company || '').trim()).filter(Boolean));
            const eventNums = taggedEventItems
                .map(item => Number(getItemAuctionMeta(item).publicNumber || item.num || 0))
                .filter(num => Number.isFinite(num) && num > 0);
            const minEventNum = Math.min(...eventNums);
            const maxEventNum = Math.max(...eventNums);
            const eventNumBuffer = Math.max(eventCompanies.size, 1);
            const hasEventNumSpan = Number.isFinite(minEventNum) && Number.isFinite(maxEventNum) && minEventNum <= maxEventNum;
            const eventItems = sourceItems.filter(item => {
                const meta = getItemAuctionMeta(item);
                if (meta.auctionType === AUCTION_TYPES.EVENT) return true;
                const company = String(item.company || '').trim();
                const num = Number(meta.publicNumber || item.num || 0);
                return hasEventNumSpan
                    && eventCompanies.has(company)
                    && Number.isFinite(num)
                    && num >= minEventNum - eventNumBuffer
                    && num <= maxEventNum + eventNumBuffer;
            });
            if (eventItems.length === 0) return [];
            const groups = [];
            const byCompany = {};
            eventItems.forEach(item => {
                const company = String(item.company || '').trim() || '미지정';
                if (!byCompany[company]) {
                    byCompany[company] = { company, total: 0, soldCount: 0, itemCount: 0, active: false };
                    groups.push(byCompany[company]);
                }
                const group = byCompany[company];
                group.itemCount += 1;
                group.total += readLiveTotalAmount(item);
                if (isSoldForTotals(item)) group.soldCount += 1;
                if (isActiveForTotals(item)) group.active = true;
            });
            return groups.sort((a, b) => b.total - a.total);
        }

        const LEADERBOARD_VISIBLE_LIMIT = 3;

        let _eventMatchPrevTotals = {};
        let _eventMatchPrevOrder = [];

        function renderEventMatchSection(panel, items, map) {
            let section = panel.querySelector('.event-match-section');
            const showEvent = String(map?.event_match_show ?? '0') === '1';
            if (!showEvent) {
                if (section) section.remove();
                _eventMatchPrevOrder = [];
                return;
            }

            const allRows = getEventMatchRows(items);
            const rows = allRows.slice(0, LEADERBOARD_VISIBLE_LIMIT);
            if (allRows.length < 2) {
                if (section) section.remove();
                _eventMatchPrevOrder = [];
                return; // 2팀 이상일 때만 표시
            }

            if (!section) {
                section = document.createElement('div');
                section.className = 'event-match-section';

                const sep = document.createElement('hr');
                sep.className = 'event-match-separator';
                section.appendChild(sep);

                const header = document.createElement('div');
                header.className = 'event-match-header';
                header.innerHTML = '<span class="event-match-kicker"></span><strong class="event-match-title">이벤트 매치</strong>';
                section.appendChild(header);

                panel.appendChild(section);
            }

            const nextOrder = rows.map(row => row.company);
            const hasPrev = _eventMatchPrevOrder.length > 0;
            const orderChanged = hasPrev && JSON.stringify(nextOrder) !== JSON.stringify(_eventMatchPrevOrder);
            const valueIncreased = hasPrev && rows.some(row => Number(row.total) > Number(_eventMatchPrevTotals[row.company] || 0));
            const shouldAnimate = panel.classList.contains('active') && (orderChanged || valueIncreased);
            const beforePositions = shouldAnimate ? captureLeaderboardPositions(section, '.event-match-row[data-company-key]') : new Map();

            const existingRows = Object.create(null);
            section.querySelectorAll('.event-match-row[data-company-key]').forEach(el => {
                existingRows[el.dataset.companyKey] = el;
            });

            rows.forEach((row, idx) => {
                const rank = idx + 1;
                const key = row.company;
                let el = existingRows[key];
                if (!el) {
                    el = document.createElement('div');
                    el.dataset.companyKey = key;
                }

                el.className = 'event-match-row' + (idx === 0 && row.total > 0 ? ' is-leader' : '');
                el.dataset.rank = String(rank);

                const formatted = row.total > 0 ? Number(row.total).toLocaleString() : '-';
                const cacheKey = `${row.company}|${row.soldCount}/${row.itemCount}|${formatted}|${rank}`;
                if (el.dataset.lastCache !== cacheKey) {
                    el.dataset.lastCache = cacheKey;
                    el.innerHTML = `
                        <span class="event-match-rank">${rank}</span>
                        <div class="event-match-main">
                            <strong class="event-match-company">${esc(row.company)}</strong>
                            <span class="event-match-count">${row.soldCount}/${row.itemCount}</span>
                        </div>
                        <strong class="event-match-amount">${formatted}</strong>
                    `;
                }

                const previousTotal = Number(_eventMatchPrevTotals[key] || 0);
                const delta = Number(row.total) - previousTotal;
                if (shouldAnimate && delta > 0) {
                    showLeaderboardDelta(el, formatLeaderboardDelta(delta));
                }

                section.appendChild(el);
                delete existingRows[key];
            });

            Object.values(existingRows).forEach(el => el.remove());

            if (shouldAnimate) {
                animateLeaderboardRows(section, beforePositions, '.event-match-row[data-company-key]');
            }

            allRows.forEach(row => { _eventMatchPrevTotals[row.company] = row.total; });
            _eventMatchPrevOrder = nextOrder;
        }

        // ── 낙찰 알림 상태 (블라인드 팀 합산 패널용) ──
        const _blindSoldState = {
            initialized: false,
            itemStatus: new Map(),
            currentAlert: null,
            timer: null
        };

        function detectBlindSoldItem(items) {
            const state = _blindSoldState;
            let newestSold = null;
            if (!state.initialized) {
                (items || []).forEach(item => {
                    const key = String(item?.row || item?.name || '').trim();
                    if (key) state.itemStatus.set(key, item.status || '');
                });
                state.initialized = true;
            } else {
                (items || []).forEach(item => {
                    const key = String(item?.row || item?.name || '').trim();
                    if (!key) return;
                    const prev = state.itemStatus.get(key) || '';
                    const cur = item.status || '';
                    if (cur === '낙찰' && prev !== '낙찰') newestSold = item;
                    state.itemStatus.set(key, cur);
                });
            }
            return newestSold;
        }

        function resolveBlindSoldTeamLabel(item, map) {
            const teamIndex = makeBlindBracketTeamIndex(map || {});
            const preferredScale = getBlindPreferredScale([], map || {});
            const fallback = {};
            const letter = resolveBlindTeamLetter(item, teamIndex, fallback, preferredScale);
            const isBlind = getBroadcastPresentation(item, map).visibility === 'blind';
            if (isBlind) return letter + '팀';
            const companyName = String(item?.company || '').trim();
            return companyName || (letter + '팀');
        }

        function showBlindSoldAlert(item, map) {
            const state = _blindSoldState;
            if (state.timer) { clearTimeout(state.timer); state.timer = null; }
            // 기존 팝업 제거
            const old = document.querySelector('.blind-sold-popup-overlay');
            if (old) old.remove();

            const winner = cleanBidderName(String(item?.winner || '').trim());
            const rawPrice = Number(String(item?.sold_price ?? item?.soldPrice ?? 0).replace(/[^0-9.-]/g, '')) || 0;
            const price = rawPrice.toLocaleString('ko-KR');
            const teamLabel = resolveBlindSoldTeamLabel(item, map);

            const overlay = document.createElement('div');
            overlay.className = 'blind-sold-popup-overlay';
            overlay.innerHTML = `
                <div class="blind-sold-popup-card">
                    <span class="blind-sold-popup-mark" aria-hidden="true">✓</span>
                    <span class="blind-sold-popup-eyebrow">HAMMER DOWN</span>
                    <div class="blind-sold-popup-winner">${esc(winner)}<small>님 낙찰</small></div>
                    <div class="blind-sold-popup-price"><strong>${price}</strong><small>만원</small></div>
                    <span class="blind-sold-popup-team">${esc(teamLabel)}</span>
                </div>
            `;
            document.body.appendChild(overlay);

            state.currentAlert = overlay;
            state.timer = setTimeout(() => {
                overlay.classList.add('fade-out');
                setTimeout(() => { overlay.remove(); state.currentAlert = null; }, 500);
                state.timer = null;
            }, 3500);
        }

        // ── 리더보드 상태 관리 ──
        const _blindRankState = {
            prevOrder: [],
            prevTotals: {},     // team → 이전 총합
            frozen: false,      // 팝업 표시 중 리더보드 동결
            pendingData: null,  // 동결 중 대기 데이터
            pendingMap: null
        };

        function getLeaderboardElementKey(el) {
            return el?.dataset?.team || el?.dataset?.bidderKey || el?.dataset?.companyKey || '';
        }

        function captureLeaderboardPositions(container, selector) {
            const positions = new Map();
            if (!container) return positions;
            container.querySelectorAll(selector).forEach(el => {
                const key = getLeaderboardElementKey(el);
                if (key) positions.set(key, el.getBoundingClientRect().top);
            });
            return positions;
        }

        function animateLeaderboardRows(container, beforePositions, selector) {
            if (!container || !beforePositions || beforePositions.size === 0) return;
            container.querySelectorAll(selector).forEach(el => {
                const key = getLeaderboardElementKey(el);
                if (!key) return;
                const previousTop = beforePositions.get(key);
                if (previousTop === undefined) {
                    el.classList.remove('row-entering');
                    void el.offsetWidth;
                    el.classList.add('row-entering');
                    setTimeout(() => el.classList.remove('row-entering'), 480);
                    return;
                }

                const nextTop = el.getBoundingClientRect().top;
                const deltaY = previousTop - nextTop;
                if (Math.abs(deltaY) < 1) return;

                el.classList.add('rank-changed');
                el.style.transition = 'none';
                el.style.transform = `translateY(${deltaY}px)`;
                void el.offsetWidth;

                requestAnimationFrame(() => {
                    el.style.transition = '';
                    el.style.transform = '';
                });

                setTimeout(() => {
                    el.classList.remove('rank-changed');
                    el.style.transition = '';
                    el.style.transform = '';
                }, 640);
            });
        }

        function formatLeaderboardDelta(value) {
            const numeric = Number(value) || 0;
            if (numeric <= 0) return '';
            return '+' + numeric.toLocaleString('ko-KR', { maximumFractionDigits: 1 });
        }

        function showLeaderboardDelta(rowEl, text) {
            if (!rowEl || !text) return;
            rowEl.querySelectorAll('.blind-total-delta').forEach(el => el.remove());
            const deltaEl = document.createElement('span');
            deltaEl.className = 'blind-total-delta';
            deltaEl.textContent = text;
            rowEl.appendChild(deltaEl);
            setTimeout(() => deltaEl.remove(), 1650);
        }

        function teamRankTextOpacity(rank) {
            if (rank <= 1) return '1';
            if (rank === 2) return '0.78';
            if (rank === 3) return '0.56';
            return String(Math.max(0.34, 0.56 - ((rank - 3) * 0.12)));
        }

        // 팀 리더보드 DOM 업데이트 (전체 팀 및 FLIP 이동 애니메이션)
        function applyLeaderboardUpdate(panel, sorted, map, animate) {
            let listEl = panel.querySelector('.blind-total-list');
            if (!listEl) {
                listEl = document.createElement('div');
                listEl.className = 'blind-total-list';
                panel.appendChild(listEl);
            }

            const visibleRows = sorted;
            if (!visibleRows.length) {
                listEl.innerHTML = '<div class="blind-total-empty">토너먼트 개체 대기 중</div>';
                return;
            }

            const beforePositions = animate ? captureLeaderboardPositions(listEl, '.blind-total-row[data-team]') : new Map();

            // 기존 행 DOM 맵
            const existingRows = Object.create(null);
            listEl.querySelectorAll('.blind-total-row[data-team]').forEach(el => {
                existingRows[el.dataset.team] = el;
            });

            // empty 제거
            const emptyEl = listEl.querySelector('.blind-total-empty');
            if (emptyEl) emptyEl.remove();

            // 행 업데이트/생성 + DOM 순서 정렬
            visibleRows.forEach((row, idx) => {
                const rank = idx + 1;
                let rowEl = existingRows[row.team];
                if (!rowEl) {
                    rowEl = document.createElement('div');
                    rowEl.className = 'blind-total-row team-totals-row';
                    rowEl.dataset.team = row.team;
                }

                rowEl.dataset.rank = String(rank);
                rowEl.style.setProperty('--rank-text-opacity', teamRankTextOpacity(rank));

                const formattedAmount = formatBlindTotalAmount(row.total);
                const cacheKey = `${row.team}|${row.company}|${row.soldCount}/${row.itemCount}|${formattedAmount}|${rank}`;
                if (rowEl.dataset.lastCache === cacheKey) {
                    // 스킵
                } else {
                    rowEl.dataset.lastCache = cacheKey;
                    rowEl.innerHTML = `
                        <span class="blind-total-rank${rank === 1 ? ' rank-1' : ''}">${rank}</span>
                        <div class="blind-total-main">
                            <strong class="blind-total-team">${esc(row.company)}</strong>
                            <span class="blind-total-count">${row.soldCount}/${row.itemCount}</span>
                        </div>
                        <strong class="blind-total-amount">${formattedAmount}</strong>
                    `;
                }
                rowEl.classList.remove('row-entering', 'is-new-leader', 'rank-changed', 'is-active');

                const previousTotal = Number(_blindRankState.prevTotals[row.team] || 0);
                const delta = Number(row.total) - previousTotal;
                if (animate && delta > 0) {
                    showLeaderboardDelta(rowEl, formatLeaderboardDelta(delta));
                }

                listEl.appendChild(rowEl);
                delete existingRows[row.team];
            });

            // 제거된 팀 삭제
            Object.values(existingRows).forEach(el => el.remove());

            if (animate) {
                animateLeaderboardRows(listEl, beforePositions, '.blind-total-row[data-team]');
            }

            // 이전 총합 업데이트
            sorted.forEach(row => { _blindRankState.prevTotals[row.team] = row.total; });

            // 순서 기록
            _blindRankState.prevOrder = visibleRows.map(r => r.team);
        }


        function renderBlindTeamTotals(map, items) {
            const panel = document.getElementById('blind-team-total-overlay');
            if (!panel) return;
            const show = String(map?.blind_totals_show ?? '1') !== '0';
            if (!show) {
                panel.classList.remove('visible');
                return;
            }

            // 팝업 중이면 데이터만 저장하고 DOM 업데이트 스킵
            if (_blindRankState.frozen) {
                _blindRankState.pendingData = items;
                _blindRankState.pendingMap = map;
                return;
            }

            ['top', 'left', 'right', 'bottom', 'width', 'height', 'min-height'].forEach(prop => {
                panel.style.removeProperty(prop);
            });

            const rows = getBlindTotalRows(items, map);
            const totalDone = rows.reduce((sum, row) => sum + row.soldCount, 0);
            const totalItems = rows.reduce((sum, row) => sum + row.itemCount, 0);
            const sorted = [...rows].sort((a, b) => b.total - a.total);

            // 낙찰 감지
            const soldItem = detectBlindSoldItem(items);

            const updateTeamHeader = () => ensureP3PanelHeader(panel, '팀 실시간 내역', '');
            updateTeamHeader();

            panel.classList.add('visible');

            if (soldItem) {
                // ── 낙찰 발생: 리더보드 동결 → 팝업 → 해제 후 애니메이션 ──
                _blindRankState.frozen = true;
                _blindRankState.pendingData = items;
                _blindRankState.pendingMap = map;

                showBlindSoldAlert(soldItem, map);

                // 팝업 끝난 후 (3.5s 표시 + 0.5s 페이드 + 0.3s 여유)
                setTimeout(() => {
                    _blindRankState.frozen = false;
                    const latestItems = _blindRankState.pendingData || items;
                    const latestMap = _blindRankState.pendingMap || map;
                    const latestRows = getBlindTotalRows(latestItems, latestMap);
                    const latestSorted = [...latestRows].sort((a, b) => b.total - a.total);

                    // 카운터도 최신으로
                    const latestDone = latestRows.reduce((s, r) => s + r.soldCount, 0);
                    const latestTotal = latestRows.reduce((s, r) => s + r.itemCount, 0);
                    updateTeamHeader();

                    applyLeaderboardUpdate(panel, latestSorted, latestMap, true);
                    renderEventMatchSection(panel, latestItems, latestMap);
                    _blindRankState.pendingData = null;
                    _blindRankState.pendingMap = null;
                }, 4300);
            } else {
                // 일반 업데이트 (낙찰 없음)
                const hasPrev = _blindRankState.prevOrder.length > 0;
                const visibleSorted = sorted;
                const orderChanged = hasPrev && JSON.stringify(visibleSorted.map(r => r.team)) !== JSON.stringify(_blindRankState.prevOrder);
                const valueIncreased = hasPrev && visibleSorted.some(row => Number(row.total) > Number(_blindRankState.prevTotals[row.team] || 0));
                const biddersConfigured = String(map?.live_bidders_show ?? '0') === '1';
                const activeAuctionItem = getActiveAuctionItem(items);
                const liveBidRows = biddersConfigured ? buildLiveBidRows(map, activeAuctionItem) : [];
                const biddersShow = biddersConfigured && liveBidRows.length > 0;
                const isPanelActive = _p3ActiveCard === 'totals' || !biddersShow;

                applyLeaderboardUpdate(panel, sorted, map, isPanelActive && (orderChanged || valueIncreased));
                renderEventMatchSection(panel, items, map);
            }
        }


        // P3 실시간 패널 상태 변수
        let _p3SwitchTimer = null;
        let _p3SwitchEffectTimer = null;
        let _p3ActiveCard = 'totals'; // 'totals' 또는 'bidders'
        const _liveBiddersRankState = {
            prevOrder: [],
            prevAmounts: {},
            prevSignature: '',
            initialized: false
        };

        function ensureP3PanelHeader(panel, title, metaHtml) {
            if (!panel) return;
            let head = panel.querySelector('.blind-total-head');
            if (!head) {
                head = document.createElement('div');
                head.className = 'blind-total-head';
                panel.prepend(head);
            }
            const cleanMeta = metaHtml || '';
            if (head.dataset.lastTitle === title && head.dataset.lastMeta === cleanMeta) {
                return;
            }
            head.dataset.lastTitle = title;
            head.dataset.lastMeta = cleanMeta;
            head.innerHTML = `
                <span class="blind-total-kicker">LIVE</span>
                <strong class="blind-total-title">${esc(title)}</strong>
                <span class="blind-total-meta">${cleanMeta}</span>
            `;
        }

        function getActiveAuctionItem(items) {
            return (items || []).find(i => isAuctionActiveItem(i)) || null;
        }

        function decodeChecklistPayload(value) {
            const raw = String(value || '').trim();
            if (!raw) return '';
            try {
                const base64 = raw.replace(/-/g, '+').replace(/_/g, '/') + '='.repeat((4 - raw.length % 4) % 4);
                const bytes = Uint8Array.from(atob(base64), char => char.charCodeAt(0));
                return new TextDecoder('utf-8').decode(bytes);
            } catch (error) {
                return '';
            }
        }

        const SALE_MODE_PRESENTERS = {
            quiz(container, item, meta) {
                const rows = getBidLogRows(item);
                const winner = rows.find(row => row?.entry_type === 'quiz_winner') || rows[0] || null;
                const hasWinner = Boolean(winner?.name || item?.winner);
                const rawWinner = winner?.name || item?.winner || '';
                const identity = parseBidderIdentity(rawWinner, winner?.region || '');

                container.classList.toggle('has-result', hasWinner);
                document.getElementById('sale-mode-kicker').textContent = hasWinner ? 'QUIZ RESULT' : 'EVENT QUIZ';
                document.getElementById('sale-mode-title').textContent = hasWinner
                    ? `정답! ${winner?.answer || meta.config.answer || ''}`
                    : (meta.config.question || '문제 준비 중');
                document.getElementById('sale-mode-subtitle').textContent = hasWinner
                    ? `${identity.name}${identity.region ? ' - ' + identity.region : ''}`
                    : '밴드 채팅으로 정답을 정확히 입력해주세요';
            }
        };

        function decodeSaleConfig(value) {
            const decoded = decodeChecklistPayload(value);
            if (!decoded) return {};
            try {
                const parsed = JSON.parse(decoded);
                return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
            } catch (error) {
                return {};
            }
        }

        function getSaleModeMeta(item) {
            const checklist = parseChecklist(item?.checklist || '');
            const mode = String(checklist.sale_mode || 'auction').trim().toLowerCase();
            const config = decodeSaleConfig(checklist.sale_config_b64);
            if (mode === 'quiz') {
                if (!config.question) config.question = decodeChecklistPayload(checklist.quiz_question_b64);
                if (!config.answer) config.answer = decodeChecklistPayload(checklist.quiz_answer_b64);
                if (config.settlement_amount === undefined || config.settlement_amount === '') {
                    config.settlement_amount = checklist.quiz_price || '';
                }
            }
            return {
                mode: SALE_MODE_PRESENTERS[mode] ? mode : 'auction',
                config,
            };
        }

        function getBroadcastPresentation(item, map = {}) {
            const auctionMeta = getItemAuctionMeta(item || {});
            const saleMeta = getSaleModeMeta(item || {});
            const competition = auctionMeta.auctionType === AUCTION_TYPES.TOURNAMENT
                ? 'tournament'
                : 'single';
            const explicitVisibility = String(auctionMeta.visibilityMode || '').toLowerCase();
            const isMedalOpenTournament = competition === 'tournament'
                && Number(auctionMeta.tournamentStage) === 2;
            const visibility = isMedalOpenTournament
                ? 'public'
                : (['public', 'blind'].includes(explicitVisibility)
                    ? explicitVisibility
                    : (competition === 'tournament' ? 'blind' : 'public'));
            const isQuiz = saleMeta.mode === 'quiz';
            let label = '';
            if (competition === 'tournament') {
                label = visibility === 'blind' ? '블라인드 토너먼트' : '공개 토너먼트';
            } else if (isQuiz) {
                label = visibility === 'blind' ? '블라인드 퀴즈' : '퀴즈 이벤트';
            } else {
                label = visibility === 'blind' ? '블라인드 경매' : '공개 경매';
            }
            return {
                saleMode: saleMeta.mode,
                competition,
                visibility,
                label,
                showCompany: visibility === 'public',
            };
        }

        function getQuizItemMeta(item) {
            const meta = getSaleModeMeta(item);
            return {
                isQuiz: meta.mode === 'quiz',
                question: String(meta.config.question || ''),
                answer: String(meta.config.answer || ''),
                settlementAmount: meta.config.settlement_amount || '',
            };
        }

        const _saleModeOverlayState = {
            activeKey: '',
            resultUntil: 0,
        };

        function saleModeItemKey(item) {
            return String(item?.row || item?.id || item?.num || item?.name || '').trim();
        }

        function hideSaleModeOverlay() {
            const container = document.getElementById('sale-mode-overlay');
            if (!container) return;
            container.classList.remove('visible', 'has-result');
        }

        function renderSaleModeOverlay(item) {
            const container = document.getElementById('sale-mode-overlay');
            if (!container || document.body.classList.contains('host-mode') || document.body.classList.contains('bracket-page')) {
                hideSaleModeOverlay();
                return;
            }

            let displayItem = item;
            let meta = getSaleModeMeta(displayItem);
            if (displayItem && meta.mode !== 'auction') {
                _saleModeOverlayState.activeKey = saleModeItemKey(displayItem);
                _saleModeOverlayState.resultUntil = 0;
            } else if (displayItem) {
                _saleModeOverlayState.activeKey = '';
                _saleModeOverlayState.resultUntil = 0;
            } else if (!displayItem && _saleModeOverlayState.activeKey) {
                const soldItem = (window.latestItemsList || []).find(candidate =>
                    saleModeItemKey(candidate) === _saleModeOverlayState.activeKey
                    && String(candidate?.winner || '').trim()
                    && ['낙찰', '완료', 'sold'].includes(String(candidate?.status || '').trim())
                );
                if (soldItem) {
                    if (!_saleModeOverlayState.resultUntil) {
                        _saleModeOverlayState.resultUntil = Date.now() + 4500;
                    }
                    if (Date.now() < _saleModeOverlayState.resultUntil) {
                        displayItem = soldItem;
                        meta = getSaleModeMeta(displayItem);
                    }
                }
            }

            const presenter = displayItem ? SALE_MODE_PRESENTERS[meta.mode] : null;
            if (!presenter) {
                if (_saleModeOverlayState.resultUntil && Date.now() >= _saleModeOverlayState.resultUntil) {
                    _saleModeOverlayState.activeKey = '';
                    _saleModeOverlayState.resultUntil = 0;
                }
                hideSaleModeOverlay();
                return;
            }

            presenter(container, displayItem, meta);
            container.classList.add('visible');
        }

        function getBidLogRows(item) {
            if (!item || !item.bid_log) return [];
            try {
                const parsed = JSON.parse(item.bid_log);
                return Array.isArray(parsed) ? parsed : [];
            } catch(e) {
                console.error("Failed to parse bid_log", e);
                return [];
            }
        }

        function normalizeBidAmount(value) {
            const numeric = parseFloat(String(value ?? 0).replace(/[^0-9.]/g, '')) || 0;
            return numeric >= 1000 ? numeric / 10000 : numeric;
        }

        function bidSortTime(bid, index) {
            const candidates = [bid?.time, bid?.timestamp, bid?.created_at, bid?.createdAt, bid?.updated_at, bid?.updatedAt];
            for (const value of candidates) {
                const raw = String(value || '').trim();
                if (!raw) continue;
                const parsed = Date.parse(raw);
                if (Number.isFinite(parsed) && /[-T/]/.test(raw)) return parsed;
                const clock = raw.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
                if (clock) return (Number(clock[1]) * 3600) + (Number(clock[2]) * 60) + Number(clock[3] || 0);
                if (Number.isFinite(parsed)) return parsed;
            }
            return index;
        }

        function cleanBidderName(name) {
            return String(name || '알 수 없음')
                .replace(/\s*[\(\[-]?\s*010[-]?\d{3,4}[-]?\d{4}[\)\]-]?/g, '')
                .replace(/(^|[\s\/／\(\)\[\]-])\d{6,13}(?=$|[\s\/／\(\)\[\]-])/g, '$1')
                .replace(/\s*[\(\[-]\d{2,4}[\)\]-]/g, '')
                .replace(/\s+\d{2,4}$/g, '')
                .replace(/[\/\\／]+/g, ' ')
                .replace(/\s+/g, ' ')
                .trim() || '알 수 없음';
        }

        // BAND 프로필 이름은 "이름/지역/번호", "이름 지역", "(지역)이름" 등으로
        // 제각각이다. 읍·면·동 전체 목록을 하드코딩하지 않고 광역 단위, 실제로
        // 자주 쓰이는 도시 별칭, 행정구역 접미사를 조합해 보수적으로 분리한다.
        const BIDDER_PROVINCE_ALIASES = new Map(Object.entries({
            '서울특별시': '서울', '서울': '서울',
            '부산광역시': '부산', '부산': '부산',
            '대구광역시': '대구', '대구': '대구',
            '인천광역시': '인천', '인천': '인천',
            '광주광역시': '광주', '광주': '광주',
            '대전광역시': '대전', '대전': '대전',
            '울산광역시': '울산', '울산': '울산',
            '세종특별자치시': '세종', '세종': '세종',
            '경기도': '경기', '경기': '경기',
            '강원특별자치도': '강원', '강원도': '강원', '강원': '강원',
            '충청북도': '충북', '충북': '충북',
            '충청남도': '충남', '충남': '충남',
            '전북특별자치도': '전북', '전라북도': '전북', '전북': '전북',
            '전라남도': '전남', '전남': '전남',
            '경상북도': '경북', '경북': '경북',
            '경상남도': '경남', '경남': '경남',
            '제주특별자치도': '제주', '제주도': '제주', '제주': '제주'
        }));
        const BIDDER_PROVINCE_PREFIXES = Array.from(BIDDER_PROVINCE_ALIASES.keys())
            .sort((a, b) => b.length - a.length);
        const BIDDER_LOCAL_REGION_NAMES = new Set(`
            강남 강동 강북 강서 관악 광진 구로 금천 노원 도봉 동대문 동작 마포
            서대문 서초 성동 성북 송파 양천 영등포 용산 은평 종로 중랑 부평
            수원 성남 고양 용인 부천 안산 안양 남양주 화성 평택 의정부 시흥
            파주 김포 광명 군포 이천 오산 하남 양주 구리 안성 포천 의왕 여주 광주
            춘천 원주 강릉 속초 동해 삼척 청주 충주 제천 천안 공주 보령 아산
            서산 논산 계룡 당진 전주 군산 익산 정읍 남원 김제 목포 여수 순천
            나주 광양 포항 경주 김천 안동 구미 영주 영천 상주 문경 경산 창원
            진주 통영 사천 김해 밀양 거제 양산 제주 서귀포 분당 일산 동탄 병점
            과천 동두천 영광 진천 홍성 남지 양평 오남 완도 잠실 수지 진해 광혜원 하단
            전라광주 브뤼셀
        `.trim().split(/\s+/));

        function stripBidderRegionSuffix(value) {
            return String(value || '').replace(/(?:특별자치시|특별자치도|특별시|광역시|자치시|자치도|시|군|구|읍|면|동)$/u, '');
        }

        function normalizeBidderRegionPart(value) {
            const original = String(value || '').normalize('NFKC').trim();
            const compact = original
                .replace(/[\(\)\[\]{}（）]/g, '')
                .replace(/\s+/g, '')
                .trim();
            if (!compact) return '';
            if (BIDDER_PROVINCE_ALIASES.has(compact)) {
                return BIDDER_PROVINCE_ALIASES.get(compact);
            }

            for (const prefix of BIDDER_PROVINCE_PREFIXES) {
                if (!compact.startsWith(prefix) || compact.length <= prefix.length) continue;
                const localRaw = compact.slice(prefix.length);
                const local = stripBidderRegionSuffix(localRaw);
                const isKnownLocal = BIDDER_LOCAL_REGION_NAMES.has(local);
                const hasAdminSuffix = /^[가-힣]{1,8}(?:시|군|구|읍|면|동)$/u.test(localRaw);
                if (isKnownLocal || hasAdminSuffix) {
                    return `${BIDDER_PROVINCE_ALIASES.get(prefix)} · ${local || localRaw}`;
                }
            }

            // 안동·강동처럼 이름 자체가 "동"으로 끝나는 실제 지역명은 접미사를
            // 제거하기 전에 먼저 확인한다.
            if (BIDDER_LOCAL_REGION_NAMES.has(compact)) return compact;
            const local = stripBidderRegionSuffix(compact);
            if (BIDDER_LOCAL_REGION_NAMES.has(local)) return local;
            // "아이동" 같은 이름을 행정동으로 오인하지 않도록 단독 토큰에서는
            // 시·군·구까지만 일반 규칙으로 인정한다. 읍·면·동은 상위 지역과
            // 함께 입력됐을 때 위의 prefix 분기에서만 세부 지역으로 처리한다.
            if (!/\s/u.test(original) && /^[가-힣]{3,8}(?:시|군|구)$/u.test(compact)) return local || compact;
            return '';
        }

        function isBidderNoisePart(value) {
            const raw = String(value || '').trim();
            if (!raw) return true;
            if (!/^[+\d공영일이삼사오육칠팔구\s().-]+$/u.test(raw)) return false;
            const arabicDigits = (raw.match(/\d/g) || []).length;
            const koreanDigits = (raw.match(/[공영일이삼사오육칠팔구]/g) || []).length;
            if (koreanDigits) {
                const totalDigits = arabicDigits + koreanDigits;
                return arabicDigits >= 4 && totalDigits >= 7 && totalDigits <= 15;
            }
            return arabicDigits >= 1 && arabicDigits <= 13;
        }

        function splitAttachedProvince(value) {
            const raw = String(value || '').trim();
            if (!/^[가-힣A-Za-z&]+$/u.test(raw)) return null;
            for (const alias of BIDDER_PROVINCE_PREFIXES) {
                const region = BIDDER_PROVINCE_ALIASES.get(alias);
                if (raw.endsWith(alias) && raw.length - alias.length >= 2) {
                    return { name: raw.slice(0, -alias.length), region };
                }
                if (raw.startsWith(alias) && raw.length - alias.length >= 2) {
                    return { name: raw.slice(alias.length), region };
                }
            }
            return null;
        }

        function parseBidderIdentity(rawName, explicitRegion = '') {
            const raw = String(rawName || '').normalize('NFKC').replace(/[\u200B-\u200D\uFEFF]/g, '').trim();
            const regions = [];
            const names = [];
            const addRegion = value => {
                const normalized = normalizeBidderRegionPart(value) || cleanBidderName(value);
                if (normalized && normalized !== '알 수 없음' && !regions.includes(normalized)) regions.push(normalized);
            };
            if (explicitRegion) addRegion(explicitRegion);

            let working = raw.replace(/[\(\[（]\s*([^\)\]）]+)\s*[\)\]）]/g, (all, inner) => {
                const region = normalizeBidderRegionPart(inner);
                if (region) {
                    addRegion(region);
                    return ' ';
                }
                return ` ${inner} `;
            });

            // 일부 BAND 프로필은 "이름.지역.전화번호" 또는 역슬래시를 구분자로 쓴다.
            // 점은 전화번호가 함께 있는 구조형 프로필에서만 구분자로 취급해 상호의
            // 일반적인 점 표기를 최대한 보존한다.
            const hasStructuredNumber = /(?:\d[.\s-]?){6,}/u.test(raw);
            if (hasStructuredNumber) working = working.replace(/\./g, '/');
            const segments = working.split(/[\/\\／|｜,，·]+/).map(part => part.trim()).filter(Boolean);
            segments.forEach(segment => {
                if (isBidderNoisePart(segment)) return;
                const wholeRegion = normalizeBidderRegionPart(segment);
                if (wholeRegion) {
                    addRegion(wholeRegion);
                    return;
                }

                let tokens = segment.split(/\s+/).filter(token => token && !isBidderNoisePart(token));
                const trailingRegions = [];
                while (tokens.length > 1) {
                    const firstRegion = normalizeBidderRegionPart(tokens[0]);
                    if (firstRegion) {
                        addRegion(firstRegion);
                        tokens.shift();
                        continue;
                    }
                    const lastRegion = normalizeBidderRegionPart(tokens[tokens.length - 1]);
                    if (lastRegion) {
                        trailingRegions.unshift(lastRegion);
                        tokens.pop();
                        continue;
                    }
                    break;
                }
                trailingRegions.forEach(addRegion);

                if (tokens.length === 1) {
                    const remainingRegion = normalizeBidderRegionPart(tokens[0]);
                    if (remainingRegion) {
                        addRegion(remainingRegion);
                        tokens = [];
                    } else {
                        const attached = splitAttachedProvince(tokens[0]);
                        if (attached) {
                            tokens[0] = attached.name;
                            addRegion(attached.region);
                        }
                    }
                }

                const namePart = cleanBidderName(tokens.join(' '));
                if (namePart !== '알 수 없음' && /[0-9A-Za-z가-힣]/u.test(namePart)) names.push(namePart);
            });

            const fallback = cleanBidderName(raw);
            const name = names.join(' · ') || (/[0-9A-Za-z가-힣]/u.test(fallback) ? fallback : '알 수 없음');
            return {
                name,
                region: names.length ? regions.join(' · ') : '',
                raw
            };
        }

        function formatLiveBidAmount(amount) {
            const value = Number(amount) || 0;
            return value.toLocaleString('ko-KR', { maximumFractionDigits: 1 });
        }

        function buildLiveBidRows(map, activeItem) {
            const bids = getBidLogRows(activeItem);
            const mode = map?.live_bidders_mode || 'top';
            const isQuiz = getQuizItemMeta(activeItem).isQuiz;
            if (!activeItem || bids.length === 0) return [];

            if (mode === 'top') {
                const topBidsMap = new Map();
                bids.forEach((bid, index) => {
                    const rawName = bid.name || '알 수 없음';
                    const key = String(bid.bidder_key || bid.key || rawName || index).trim();
                    const amount = normalizeBidAmount(bid.amount !== undefined && bid.amount !== null ? bid.amount : bid.price);
                    const sortTime = bidSortTime(bid, index);
                    const current = topBidsMap.get(key);
                    if (!current || amount > current.amount || (amount === current.amount && sortTime >= current.sortTime)) {
                        topBidsMap.set(key, {
                            key,
                            name: rawName,
                            region: bid.region || bid.location || bid.area || '',
                            amount,
                            isQuiz,
                            sortTime,
                            index
                        });
                    }
                });
                return Array.from(topBidsMap.values()).sort((a, b) =>
                    (b.amount - a.amount)
                    || (b.sortTime - a.sortTime)
                    || (b.index - a.index)
                    || String(a.name).localeCompare(String(b.name), 'ko')
                );
            }

            return bids.map((bid, index) => {
                const rawName = bid.name || '알 수 없음';
                return {
                    key: String(bid.bidder_key || bid.key || rawName || 'bidder') + '|' + index,
                    name: rawName,
                    region: bid.region || bid.location || bid.area || '',
                    amount: normalizeBidAmount(bid.amount !== undefined && bid.amount !== null ? bid.amount : bid.price),
                    isQuiz,
                    sortTime: bidSortTime(bid, index),
                    index
                };
            }).sort((a, b) => (b.sortTime - a.sortTime) || (b.index - a.index));
        }

        function clearP3PanelEffects(totalsPanel, biddersPanel) {
            [totalsPanel, biddersPanel].forEach(panel => {
                if (!panel) return;
                panel.classList.remove('p3-wipe-out', 'p3-wipe-in');
            });
            if (_p3SwitchEffectTimer) {
                clearTimeout(_p3SwitchEffectTimer);
                _p3SwitchEffectTimer = null;
            }
        }

        function setP3ActivePanel(totalsPanel, biddersPanel, nextCard, animate) {
            const panels = { totals: totalsPanel, bidders: biddersPanel };
            const nextPanel = panels[nextCard];
            if (!nextPanel) return;

            clearP3PanelEffects(totalsPanel, biddersPanel);

            Object.keys(panels).forEach(key => {
                if (!panels[key]) return;
                panels[key].classList.remove('p3-wipe-out', 'p3-wipe-in');
                panels[key].classList.toggle('active', key === nextCard);
            });
            _p3ActiveCard = nextCard;
        }

        function applyBidderLeaderboardUpdate(panel, rows, animate) {
            let listEl = panel.querySelector('.blind-total-list');
            if (!listEl) {
                listEl = document.createElement('div');
                listEl.className = 'blind-total-list';
                panel.appendChild(listEl);
            }

            if (!rows.length) {
                listEl.innerHTML = '<div class="blind-total-empty">입찰 대기 중</div>';
                _liveBiddersRankState.prevOrder = [];
                _liveBiddersRankState.prevAmounts = {};
                return;
            }

            const beforePositions = animate ? captureLeaderboardPositions(listEl, '.blind-total-row[data-bidder-key]') : new Map();
            const existingRows = Object.create(null);
            listEl.querySelectorAll('.blind-total-row[data-bidder-key]').forEach(el => {
                existingRows[el.dataset.bidderKey] = el;
            });

            const emptyEl = listEl.querySelector('.blind-total-empty');
            if (emptyEl) emptyEl.remove();

            const visibleRows = rows.slice(0, LEADERBOARD_VISIBLE_LIMIT);
            visibleRows.forEach((bid, idx) => {
                const rank = idx + 1;
                let rowEl = existingRows[bid.key];
                if (!rowEl) {
                    rowEl = document.createElement('div');
                    rowEl.className = 'blind-total-row bidders-row';
                    rowEl.dataset.bidderKey = bid.key;
                }
                rowEl.dataset.rank = String(rank);

                const identity = parseBidderIdentity(bid.name, bid.region);
                const formattedAmount = bid.isQuiz ? '정답!' : formatLiveBidAmount(bid.amount);
                const cacheKey = `${identity.name}|${identity.region}|${formattedAmount}|${rank}|${bid.isQuiz ? 'quiz' : 'bid'}`;
                if (rowEl.dataset.lastCache === cacheKey) {
                    // 스킵
                } else {
                    rowEl.dataset.lastCache = cacheKey;
                    rowEl.innerHTML = `
                        <span class="blind-total-rank${rank === 1 ? ' rank-1' : ''}">${rank}</span>
                        <div class="blind-total-main">
                            <strong class="blind-total-team">${esc(identity.name)}</strong>
                            ${identity.region ? `<span class="blind-bidder-region">${esc(identity.region)}</span>` : ''}
                        </div>
                        <strong class="blind-total-amount">${formattedAmount}</strong>
                    `;
                }

                rowEl.classList.remove('row-entering', 'is-new-leader', 'rank-changed');

                const previousAmount = Number(_liveBiddersRankState.prevAmounts[bid.key] || 0);
                const delta = Number(bid.amount) - previousAmount;
                if (animate && !bid.isQuiz && delta > 0) {
                    showLeaderboardDelta(rowEl, formatLeaderboardDelta(delta));
                }

                listEl.appendChild(rowEl);
                delete existingRows[bid.key];
            });

            Object.values(existingRows).forEach(el => el.remove());

            if (animate) {
                animateLeaderboardRows(listEl, beforePositions, '.blind-total-row[data-bidder-key]');
            }

            _liveBiddersRankState.prevOrder = visibleRows.map(row => row.key);
            _liveBiddersRankState.prevAmounts = rows.reduce((acc, row) => {
                acc[row.key] = row.amount;
                return acc;
            }, {});
        }

        function renderLiveBidders(map, items, prebuiltRows) {
            const panel = document.getElementById('live-bidders-overlay');
            if (!panel) return;

            const activeItem = getActiveAuctionItem(items);
            const bidRows = Array.isArray(prebuiltRows) ? prebuiltRows : buildLiveBidRows(map, activeItem);
            const isQuiz = getQuizItemMeta(activeItem).isQuiz;
            const signature = bidRows.map(row => [row.key, row.amount, row.sortTime, row.isQuiz ? 'quiz' : 'bid'].join(':')).join('|');
            const hasBidUpdate = _liveBiddersRankState.initialized && signature && signature !== _liveBiddersRankState.prevSignature;
            _liveBiddersRankState.initialized = true;
            _liveBiddersRankState.prevSignature = signature;
            ensureP3PanelHeader(panel, isQuiz ? '정답!' : '실시간 입찰 내역', `
                <span class="blind-total-counter">
                    <span class="blind-total-counter-num">${bidRows.length}</span>
                    <span class="blind-total-counter-sep">명</span>
                </span>
            `);

            const isPanelActive = _p3ActiveCard === 'bidders';
            applyBidderLeaderboardUpdate(panel, bidRows, isPanelActive && _liveBiddersRankState.prevOrder.length > 0);
            return hasBidUpdate;
        }

        function updateP3SwitchingLogic(map, items) {
            const container = document.getElementById('p3-switching-container');
            const totalsPanel = document.getElementById('blind-team-total-overlay');
            const biddersPanel = document.getElementById('live-bidders-overlay');

                const ann = document.getElementById('battle-announcement-overlay');
                if (ann) ann.style.setProperty('display', 'none', 'important');
                const matchupCard = document.getElementById('battle-matchup-card');
                if (matchupCard) matchupCard.style.setProperty('display', 'none', 'important');

                            <div style="font-size:14px;color:#64748b;font-weight:600;">3P 대진용 배치기에서 토너먼트를 활성화해주세요.</div>
                            <div style="font-size:12px;color:#475569;margin-top:8px;">preview.html?page=3 → 방송 송출 → 16강/8강/4강 선택</div>
