<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
    <title>CREO 통합 송출</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
        :root{--primary:#243b68;--secondary:#d6b25e;--background:#070b12;--surface:#111827;--text:#f8fafc}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent}body{color:var(--text);font-family:Pretendard Variable,Pretendard,sans-serif;letter-spacing:-.025em}.stage{position:absolute;inset:0;overflow:hidden;background:radial-gradient(circle at 15% 10%,color-mix(in srgb,var(--primary) 34%,transparent),transparent 40%),radial-gradient(circle at 87% 82%,color-mix(in srgb,var(--secondary) 16%,transparent),transparent 35%),var(--background)}.stage:before{content:"";position:absolute;inset:0;background:linear-gradient(115deg,rgba(255,255,255,.035),transparent 22%,transparent 78%,rgba(255,255,255,.025));pointer-events:none}.top{position:absolute;top:6.5%;right:6.2%;left:6.2%;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:16px}.mark{display:grid;place-items:center;width:58px;height:58px;border:1px solid color-mix(in srgb,var(--secondary) 65%,transparent);border-radius:50%;color:var(--secondary);font-family:Georgia,serif;font-size:30px;box-shadow:0 0 40px color-mix(in srgb,var(--secondary) 12%,transparent)}.brand small,.page{color:color-mix(in srgb,var(--text) 58%,transparent);font-size:12px;font-weight:760;letter-spacing:.16em}.brand b{display:block;margin-top:4px;font-size:24px;letter-spacing:.025em}.live-pill{display:flex;align-items:center;gap:8px;padding:9px 13px;border:1px solid rgba(255,255,255,.13);border-radius:999px;background:rgba(0,0,0,.16);font-size:12px;font-weight:800}.live-pill i{width:8px;height:8px;border-radius:50%;background:#ff4d57;box-shadow:0 0 0 5px rgba(255,77,87,.12);animation:pulse 1.5s infinite}@keyframes pulse{50%{opacity:.45}}.content{position:absolute;inset:22% 6.2% 9%;display:grid;grid-template-columns:minmax(0,1.15fr) minmax(360px,.85fr);gap:4.5%;align-items:center}.visual{position:relative;overflow:hidden;height:100%;max-height:650px;border:1px solid rgba(255,255,255,.1);border-radius:28px;background:color-mix(in srgb,var(--surface) 90%,#000);box-shadow:0 34px 100px rgba(0,0,0,.36)}.visual img{width:100%;height:100%;object-fit:cover}.placeholder{display:grid;width:100%;height:100%;place-items:center;color:color-mix(in srgb,var(--text) 22%,transparent);font-family:Georgia,serif;font-size:12vw}.lot{position:absolute;top:22px;left:22px;padding:9px 12px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(5,8,13,.7);font-size:15px;font-weight:850;backdrop-filter:blur(8px)}.copy{min-width:0}.kicker{color:var(--secondary);font-size:13px;font-weight:850;letter-spacing:.18em;text-transform:uppercase}.copy h1{margin:16px 0 0;font-size:clamp(48px,5.3vw,82px);line-height:.98;letter-spacing:-.065em}.vendor{margin-top:16px;color:color-mix(in srgb,var(--text) 65%,transparent);font-size:19px}.note{max-width:580px;margin-top:29px;padding-top:24px;border-top:1px solid rgba(255,255,255,.11);color:color-mix(in srgb,var(--text) 70%,transparent);font-size:16px;line-height:1.65}.price{margin-top:36px}.price span{display:block;color:color-mix(in srgb,var(--text) 46%,transparent);font-size:11px;font-weight:800;letter-spacing:.11em}.price b{display:block;margin-top:5px;color:var(--secondary);font-size:clamp(42px,4.3vw,67px);letter-spacing:-.07em;font-variant-numeric:tabular-nums}.price small{margin-left:8px;font-size:18px}.standby{position:absolute;inset:0;display:grid;place-items:center;text-align:center}.standby .mark{width:100px;height:100px;margin:auto;font-size:50px}.standby h1{margin:30px 0 8px;font-size:clamp(50px,7vw,104px);letter-spacing:-.06em}.standby p{color:color-mix(in srgb,var(--text) 55%,transparent);font-size:18px}.upcoming{display:grid;gap:12px}.upcoming-row{display:grid;grid-template-columns:80px 1fr auto;align-items:center;gap:18px;padding:18px 20px;border:1px solid rgba(255,255,255,.1);border-radius:15px;background:color-mix(in srgb,var(--surface) 78%,transparent)}.upcoming-row strong{font-size:20px}.upcoming-row b{font-size:20px}.upcoming-row span{color:color-mix(in srgb,var(--text) 55%,transparent)}.error{position:absolute;right:20px;bottom:20px;padding:10px 12px;background:#8b1f2bcc;color:#fff;font-size:12px}.animate{animation:enter .42s cubic-bezier(.16,1,.3,1)}@keyframes enter{from{opacity:0;transform:translateY(18px) scale(.99)}}
        body[data-template="tournament"] .stage{background:linear-gradient(90deg,transparent 49.8%,color-mix(in srgb,var(--secondary) 24%,transparent) 50%,transparent 50.2%),repeating-linear-gradient(135deg,rgba(255,255,255,.025) 0 1px,transparent 1px 24px),radial-gradient(circle at 10% 0,color-mix(in srgb,var(--primary) 58%,transparent),transparent 48%),var(--background)}body[data-template="tournament"] .visual{border-radius:4px;clip-path:polygon(0 0,96% 0,100% 7%,100% 100%,4% 100%,0 93%)}body[data-template="tournament"] .mark{border-radius:0;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}body[data-template="tournament"] .copy h1{font-style:italic;text-transform:uppercase}body[data-template="tournament"] .lot,body[data-template="tournament"] .upcoming-row{border-radius:3px}
        body[data-template="academy"] .stage{background:radial-gradient(ellipse at 50% 110%,color-mix(in srgb,var(--secondary) 18%,transparent),transparent 48%),radial-gradient(circle at 14% 8%,color-mix(in srgb,var(--primary) 45%,transparent),transparent 43%),var(--background)}body[data-template="academy"] .stage:after{content:"";position:absolute;inset:3.2%;border:1px solid color-mix(in srgb,var(--secondary) 28%,transparent);border-radius:40px;pointer-events:none}body[data-template="academy"] .mark{border:2px double color-mix(in srgb,var(--secondary) 70%,transparent);box-shadow:0 0 0 5px color-mix(in srgb,var(--secondary) 10%,transparent),0 0 60px color-mix(in srgb,var(--secondary) 18%,transparent)}body[data-template="academy"] .copy h1,body[data-template="academy"] .standby h1{font-family:Georgia,"Times New Roman",serif;font-weight:500;letter-spacing:-.035em}body[data-template="academy"] .visual{border-color:color-mix(in srgb,var(--secondary) 34%,transparent);border-radius:48% 48% 24px 24px}body[data-template="academy"] .live-pill{border-color:color-mix(in srgb,var(--secondary) 30%,transparent)}
    </style>
</head>
<body><main class="stage" id="stage"><div class="standby"><div><div class="mark">C</div><h1>CREO</h1><p>방송 화면 연결 중</p></div></div></main><div class="error" id="error" hidden></div>
<script>
const params=new URLSearchParams(location.search),channelId=(params.get('channel')||'').replace(/[^a-z0-9-]/g,''),page=Math.max(1,Math.min(3,Number(params.get('page'))||1)),stage=document.getElementById('stage'),error=document.getElementById('error');let lastRevision='';
const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');const money=v=>(Number(v)||0).toLocaleString('ko-KR');
function theme(c){for(const[k,v]of Object.entries(c.theme||{}))document.documentElement.style.setProperty('--'+k,v);document.body.dataset.template=['classic','tournament','academy'].includes(c.broadcastTemplate)?c.broadcastTemplate:'classic'}
function chrome(c,inner){return`<div class="top"><div class="brand"><div class="mark">C</div><div><small>CREO AUCTION</small><b>${esc(c.shortName||c.name)}</b></div></div><div class="live-pill"><i></i> LIVE · ${page}P</div></div>${inner}`}
function standby(c,state){return chrome(c,`<div class="standby animate"><div><div class="mark">C</div><h1>${esc(c.shortName||c.name)}</h1><p>${esc(state.headline||c.description||'경매가 곧 시작됩니다')}</p></div></div>`)}
function primary(c,state,items){const item=items.find(i=>i.id===state.activeItemId)||items.find(i=>i.status==='live')||items[0];if(!item)return standby(c,{headline:'등록된 개체가 없습니다'});const shown=state.mode==='sold'?item.soldPrice:item.startPrice;return chrome(c,`<div class="content animate"><div class="visual">${item.photoUrl?`<img src="${esc(item.photoUrl)}" alt="">`:'<div class="placeholder">C</div>'}<span class="lot">LOT ${String(item.lotNumber).padStart(3,'0')}</span></div><div class="copy"><div class="kicker">${state.mode==='sold'?'SOLD':'NOW AUCTION'}</div><h1>${esc(item.name)}</h1><div class="vendor">${esc(item.vendorName||'')}</div>${item.note?`<div class="note">${esc(item.note)}</div>`:''}<div class="price"><span>${state.mode==='sold'?'낙찰가':'시작가'}</span><b>${money(shown)}<small>원</small></b></div></div></div>`)}
function list(c,state,items){const rows=items.slice().sort((a,b)=>a.lotNumber-b.lotNumber).slice(0,7);return chrome(c,`<div class="content animate" style="grid-template-columns:1fr;inset-top:24%"><div class="copy"><div class="kicker">AUCTION LINE-UP</div><h1 style="font-size:58px;margin-bottom:30px">${esc(state.headline||'출품 목록')}</h1><div class="upcoming">${rows.map(i=>`<div class="upcoming-row"><strong>${String(i.lotNumber).padStart(3,'0')}</strong><b>${esc(i.name)}</b><span>${esc(i.vendorName||'')}</span></div>`).join('')}</div></div></div>`)}
async function refresh(){if(!channelId){error.hidden=false;error.textContent='채널 ID가 없습니다.';return}try{const res=await fetch(`/api/platform/channels/${encodeURIComponent(channelId)}/broadcast`,{cache:'no-store'});if(!res.ok)throw new Error(`연결 오류 ${res.status}`);const data=await res.json(),revision=String(data.state?.revision||data.state?.updatedAt||'0')+':'+page+':'+data.items.length;if(revision!==lastRevision){theme(data.channel);stage.innerHTML=data.state?.mode==='standby'?standby(data.channel,data.state):(page===3||data.state?.mode==='summary'?list(data.channel,data.state,data.items):primary(data.channel,data.state,data.items));lastRevision=revision}error.hidden=true}catch(e){error.hidden=false;error.textContent=e.message}}
refresh();setInterval(refresh,1000);
</script></body></html>
