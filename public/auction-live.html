<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
    <title>CREO 공용 송출</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <style>
        :root{--primary:#093687;--secondary:#c39a4a;--surface:#10182a;--text:#f8fafc;--safe-x:clamp(26px,4.4vw,70px);--safe-y:clamp(18px,3.2vh,40px)}
        *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent}body{color:var(--text);font-family:"Pretendard Variable",Pretendard,sans-serif;letter-spacing:-.025em}.stage{position:absolute;inset:0;overflow:hidden}.layer{position:absolute;inset:0}.glass{border:1px solid rgba(255,255,255,.13);background:color-mix(in srgb,var(--surface) 91%,transparent);box-shadow:0 14px 42px rgba(0,0,0,.34);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px)}
        .event-chip{position:absolute;top:var(--safe-y);left:var(--safe-x);display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:8px;color:#fff;font-size:12px;font-weight:850;letter-spacing:.06em}.event-chip:before{content:"";width:6px;height:22px;border-radius:2px;background:var(--secondary)}.event-chip small{color:rgba(255,255,255,.55);font-size:9px;letter-spacing:.14em}.page-label{position:absolute;top:var(--safe-y);right:var(--safe-x);padding:7px 10px;border-radius:6px;color:rgba(255,255,255,.62);font-size:10px;font-weight:850;letter-spacing:.12em}
        .ticker{position:absolute;right:0;bottom:0;left:0;display:flex;align-items:center;min-height:58px;border-top:1px solid rgba(255,255,255,.11);background:color-mix(in srgb,var(--surface) 94%,transparent);box-shadow:0 -8px 30px rgba(0,0,0,.18);backdrop-filter:blur(14px)}.ticker-badge{align-self:stretch;display:flex;align-items:center;padding:0 clamp(22px,3.8vw,58px);background:var(--primary);color:#fff;font-size:11px;font-weight:950;letter-spacing:.13em}.ticker-text{padding:0 24px;color:rgba(255,255,255,.88);font-size:15px;font-weight:720;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ticker-text b{color:var(--secondary)}
        .host-stack{position:absolute;right:var(--safe-x);bottom:94px;display:flex;align-items:flex-end;gap:12px}.host-card{min-width:210px;padding:13px 17px 13px 20px;border-radius:7px;border-left:5px solid var(--secondary)}.host-card small{display:block;color:rgba(255,255,255,.48);font-size:10px;font-weight:800;letter-spacing:.09em}.host-card strong{display:block;margin-top:3px;font-size:22px;letter-spacing:-.045em}.host-card.muted{opacity:.7}.announcement{position:absolute;top:18%;left:var(--safe-x);max-width:min(680px,66vw);padding:18px 22px;border-radius:8px;border-left:5px solid var(--secondary)}.announcement small{color:var(--secondary);font-size:10px;font-weight:900;letter-spacing:.14em}.announcement h1{margin:7px 0 0;font-size:clamp(24px,3.1vw,48px);line-height:1.14;letter-spacing:-.055em}.announcement p{margin:8px 0 0;color:rgba(255,255,255,.58);font-size:13px}
        .item-head{position:absolute;top:var(--safe-y);right:var(--safe-x);display:flex;max-width:66%;overflow:hidden;border-radius:7px}.item-name{padding:11px 19px;background:color-mix(in srgb,var(--surface) 95%,transparent)}.item-name small{display:block;color:var(--secondary);font-size:9px;font-weight:900;letter-spacing:.13em}.item-name strong{display:block;margin-top:2px;font-size:23px}.item-meta{display:flex;align-items:center;gap:15px;padding:0 18px;border-left:1px solid rgba(255,255,255,.1);background:color-mix(in srgb,var(--surface) 84%,transparent);color:rgba(255,255,255,.68);font-size:12px;font-weight:760}.item-meta b{color:#fff}.item-photo{position:absolute;right:var(--safe-x);bottom:90px;width:min(36vw,520px);height:min(63vh,620px);overflow:hidden;border-radius:9px}.item-photo img{width:100%;height:100%;object-fit:cover}.photo-empty{display:grid;width:100%;height:100%;place-items:center;background:linear-gradient(145deg,color-mix(in srgb,var(--primary) 45%,#09101e),var(--surface));color:rgba(255,255,255,.2);font-family:Georgia,serif;font-size:96px}.item-copy{position:absolute;left:var(--safe-x);bottom:104px;width:min(48vw,700px)}.lot{color:var(--secondary);font-size:12px;font-weight:950;letter-spacing:.18em}.item-copy h1{margin:9px 0 0;font-size:clamp(42px,6.2vw,92px);line-height:.92;letter-spacing:-.075em}.vendor{margin-top:12px;color:rgba(255,255,255,.58);font-size:18px;font-weight:720}.note{max-width:620px;margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.72);font-size:15px;line-height:1.55}.price{margin-top:26px}.price span{display:block;color:rgba(255,255,255,.42);font-size:10px;font-weight:850;letter-spacing:.12em}.price b{display:block;margin-top:1px;color:var(--secondary);font-size:clamp(38px,5vw,72px);font-variant-numeric:tabular-nums;letter-spacing:-.06em}.price small{margin-left:7px;font-size:16px}.sold-flash{animation:sold .7s cubic-bezier(.16,1,.3,1)}@keyframes sold{from{opacity:0;transform:scale(.96)}60%{filter:brightness(1.35)}}
        .board{position:absolute;inset:9% var(--safe-x) 8%;display:grid;grid-template-rows:auto 1fr;gap:20px}.board-head{display:flex;align-items:end;justify-content:space-between}.board-head small{color:var(--secondary);font-size:10px;font-weight:900;letter-spacing:.16em}.board-head h1{margin:5px 0 0;font-size:34px}.board-head span{color:rgba(255,255,255,.48);font-size:12px}.match-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));align-content:center;gap:14px}.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;min-height:95px;padding:14px 20px;border-radius:8px}.team{text-align:center}.team small{display:block;color:rgba(255,255,255,.4);font-size:9px;font-weight:850;letter-spacing:.12em}.team strong{display:block;margin-top:5px;font-size:20px}.team b{display:block;margin-top:3px;color:var(--secondary);font-size:13px}.versus{padding:0 14px;color:rgba(255,255,255,.28);font:italic 900 13px Georgia,serif}.ranking{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;align-content:center}.rank-card{min-height:120px;padding:17px;border-radius:8px;border-top:4px solid var(--secondary)}.rank-card em{color:var(--secondary);font:italic 800 19px Georgia,serif}.rank-card strong{display:block;margin-top:11px;font-size:19px}.rank-card span{display:block;margin-top:5px;color:rgba(255,255,255,.52);font-size:12px}.standby-note{position:absolute;top:var(--safe-y);right:var(--safe-x);padding:8px 11px;border-radius:999px;color:rgba(255,255,255,.46);font-size:10px;font-weight:800}.error{position:absolute;right:18px;bottom:18px;padding:8px 10px;border-radius:6px;background:#8b1f2bd9;color:#fff;font-size:11px}.enter{animation:enter .38s cubic-bezier(.16,1,.3,1)}@keyframes enter{from{opacity:0;transform:translateY(10px)}}
        @media(max-width:800px){.match-grid{grid-template-columns:1fr}.ranking{grid-template-columns:1fr 1fr}.item-photo{width:42vw}.item-copy{width:45vw}.host-card{min-width:170px}.ticker{min-height:48px}.ticker-text{font-size:12px}}
    </style>
</head>
<body><main class="stage" id="stage"></main><div class="error" id="error" hidden></div>
<script>
const params=new URLSearchParams(location.search),channelId=(params.get('channel')||'').replace(/[^a-z0-9-]/g,''),page=Math.max(1,Math.min(3,Number(params.get('page'))||1)),stage=document.getElementById('stage'),error=document.getElementById('error');let lastRevision='';
const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const money=v=>(Number(v)||0).toLocaleString('ko-KR');
function theme(c){for(const[k,v]of Object.entries(c.theme||{}))document.documentElement.style.setProperty('--'+k,v)}
function ticker(c,s){const text=s.ticker||s.headline||c.description||'경매가 곧 시작됩니다';return`<div class="ticker"><span class="ticker-badge">${esc(c.shortName||c.name)}</span><div class="ticker-text">${esc(text)}</div></div>`}
function eventChip(c,label){return`<div class="event-chip glass"><span><small>CREO AUCTION</small><br>${esc(c.shortName||c.name)}</span></div><div class="page-label glass">${label}</div>`}
function pageOne(c,s){const headline=s.headline||c.description||'방송 준비 중';return`<section class="layer enter">${eventChip(c,'1P · HOST')}<div class="announcement glass"><small>LIVE INFORMATION</small><h1>${esc(headline)}</h1><p>${esc(s.subline||'진행자 안내 및 방송 공지')}</p></div><div class="host-stack"><div class="host-card glass"><small>${esc(s.hostRole1||'MAIN HOST')}</small><strong>${esc(s.hostName1||'진행자')}</strong></div>${s.hostName2?`<div class="host-card glass muted"><small>${esc(s.hostRole2||'CO-HOST')}</small><strong>${esc(s.hostName2)}</strong></div>`:''}</div>${ticker(c,s)}</section>`}
function activeItem(s,items){return items.find(i=>i.id===s.activeItemId)||items.find(i=>String(i.status).toLowerCase()==='live')||null}
function pageTwo(c,s,items){const item=activeItem(s,items);if(!item)return`<section class="layer">${eventChip(c,'2P · ITEM')}<div class="standby-note glass">개체 정보 대기 중</div>${ticker(c,s)}</section>`;const sold=s.mode==='sold';return`<section class="layer enter ${sold?'sold-flash':''}"><div class="item-head glass"><div class="item-name"><small>${sold?'SOLD':'NOW AUCTION'}</small><strong>${esc(item.name)}</strong></div><div class="item-meta"><span>LOT <b>${String(item.lotNumber).padStart(3,'0')}</b></span><span>${esc(item.vendorName||'')}</span></div></div><div class="item-copy"><div class="lot">LOT ${String(item.lotNumber).padStart(3,'0')}</div><h1>${esc(item.name)}</h1><div class="vendor">${esc(item.vendorName||'')}</div>${item.note?`<div class="note">${esc(item.note)}</div>`:''}<div class="price"><span>${sold?'낙찰가':'시작가'}</span><b>${money(sold?item.soldPrice:item.startPrice)}<small>원</small></b></div></div><div class="item-photo glass">${item.photoUrl?`<img src="${esc(item.photoUrl)}" alt="">`:'<div class="photo-empty">C</div>'}</div>${ticker(c,s)}</section>`}
function vendorStats(items){const map=new Map;for(const item of items){const name=item.vendorName||'미지정';const row=map.get(name)||{name,count:0,sold:0,total:0};row.count++;if(Number(item.soldPrice)>0){row.sold++;row.total+=Number(item.soldPrice)}map.set(name,row)}return[...map.values()].sort((a,b)=>b.total-a.total||b.sold-a.sold||a.name.localeCompare(b.name,'ko'))}
function pageThree(c,s,items){const rows=vendorStats(items);const title=s.headline||((c.features||{}).tournament?'대진표 · 팀 현황':'경매 현황');let body='';if((c.features||{}).tournament&&rows.length>1){const pairs=[];for(let i=0;i<rows.length;i+=2){const a=rows[i],b=rows[i+1];pairs.push(`<div class="match glass"><div class="team"><small>TEAM ${String.fromCharCode(65+i)}</small><strong>${esc(a.name)}</strong><b>${money(a.total)}원</b></div><div class="versus">VS</div><div class="team"><small>TEAM ${String.fromCharCode(66+i)}</small><strong>${esc(b?.name||'대기')}</strong><b>${b?money(b.total)+'원':'-'}</b></div></div>`)}body=`<div class="match-grid">${pairs.slice(0,8).join('')}</div>`}else{body=`<div class="ranking">${rows.slice(0,8).map((r,i)=>`<div class="rank-card glass"><em>${i+1}</em><strong>${esc(r.name)}</strong><span>낙찰 ${r.sold}/${r.count} · ${money(r.total)}원</span></div>`).join('')||'<div class="standby-note glass">추가 정보 대기 중</div>'}</div>`}return`<section class="layer enter"><div class="board"><div class="board-head"><div><small>TOURNAMENT & EXTRA INFO</small><h1>${esc(title)}</h1></div><span>${esc(c.shortName||c.name)} · 3P</span></div>${body}</div></section>`}
function render(data){theme(data.channel);const state=data.state||{},items=data.items||[];stage.innerHTML=page===1?pageOne(data.channel,state):page===2?pageTwo(data.channel,state,items):pageThree(data.channel,state,items)}
async function refresh(){if(!channelId){error.hidden=false;error.textContent='채널 ID가 없습니다.';return}try{const res=await fetch(`/api/platform/channels/${encodeURIComponent(channelId)}/broadcast`,{cache:'no-store'});if(!res.ok)throw new Error(`연결 오류 ${res.status}`);const data=await res.json(),revision=String(data.state?.revision||data.state?.updatedAt||'0')+':'+page+':'+data.items.map(i=>`${i.id}:${i.status}:${i.soldPrice}`).join('|');if(revision!==lastRevision){render(data);lastRevision=revision}error.hidden=true}catch(e){error.hidden=false;error.textContent=e.message}}
refresh();setInterval(refresh,1000);
</script></body></html>
