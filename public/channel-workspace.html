<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>채널 운영 · CREO</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <script src="platform-client.js?v=20260720-platform-v1"></script>
    <style>
        :root{color-scheme:light;--bg:#f5f6f8;--panel:#fff;--line:#e0e4ea;--text:#14181f;--muted:#737d8b;--accent:#254ac7;--danger:#c83e3e}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Pretendard Variable,Pretendard,sans-serif;letter-spacing:-.018em}button,input,select,textarea{font:inherit}.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:18px;min-height:68px;padding:0 max(20px,calc((100% - 1220px)/2));border-bottom:1px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(14px)}.brand{color:#111827;font-weight:900;letter-spacing:.13em;text-decoration:none}.channel-select{height:40px;min-width:220px;padding:0 34px 0 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-weight:750}.top-links{display:flex;gap:6px;margin-left:auto}.top-links a{padding:9px 11px;border-radius:9px;color:var(--muted);font-size:12px;font-weight:720;text-decoration:none}.top-links a:hover{background:#f0f2f5;color:var(--text)}.shell{width:min(1220px,calc(100% - 34px));margin:auto;padding:36px 0 70px}.heading{display:flex;align-items:end;justify-content:space-between;gap:18px}.heading h1{margin:0;font-size:34px;letter-spacing:-.045em}.heading p{margin:8px 0 0;color:var(--muted)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:28px 0}.summary article{padding:18px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}.summary span{color:var(--muted);font-size:11px;font-weight:750}.summary b{display:block;margin-top:7px;font-size:25px}.tabs{display:flex;gap:5px;margin-top:18px;border-bottom:1px solid var(--line)}.tab{padding:13px 17px;border:0;border-bottom:2px solid transparent;background:none;color:var(--muted);font-weight:760;cursor:pointer}.tab.active{border-color:var(--accent);color:var(--accent)}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:20px 0 12px}.toolbar p{margin:0;color:var(--muted);font-size:12px}.btn{min-height:40px;padding:0 14px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);font-weight:740;cursor:pointer}.btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}.btn.danger{color:var(--danger)}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff}table{width:100%;border-collapse:collapse;white-space:nowrap}th,td{padding:14px 15px;border-bottom:1px solid #edf0f3;text-align:left;font-size:12px}th{background:#fafbfc;color:var(--muted);font-size:10px;letter-spacing:.04em}tbody tr:last-child td{border-bottom:0}.empty{padding:52px 20px;color:var(--muted);text-align:center}.row-actions{display:flex;gap:5px}.row-actions .btn{min-height:32px;padding:0 9px;font-size:11px}.modal{position:fixed;inset:0;z-index:30;display:grid;place-items:center;padding:20px;background:rgba(9,13,20,.54);backdrop-filter:blur(6px)}.modal[hidden]{display:none}.dialog{width:min(680px,100%);max-height:calc(100vh - 40px);overflow:auto;padding:24px;border-radius:18px;background:#fff;box-shadow:0 28px 90px #0004}.dialog-head{display:flex;align-items:center;justify-content:space-between}.dialog h2{margin:0}.close{width:36px;height:36px;border:0;border-radius:50%;background:#f0f2f5;font-size:20px;cursor:pointer}.fields{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:22px}.field.full{grid-column:1/-1}.field label{display:block;margin-bottom:6px;color:var(--muted);font-size:11px;font-weight:720}.field input,.field select,.field textarea{width:100%;min-height:43px;padding:9px 11px;border:1px solid #d7dce3;border-radius:9px;background:#fff;color:var(--text)}.field textarea{min-height:82px;resize:vertical}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:22px}.login{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:20px;background:#10141bdd}.login[hidden]{display:none}.login-box{width:min(410px,100%);padding:26px;border-radius:18px;background:#fff}.login-box h2{margin:0}.login-box p{color:var(--muted);font-size:13px}.login-box form{display:flex;gap:8px;margin-top:18px}.login-box input{flex:1;min-width:0;height:43px;padding:0 11px;border:1px solid var(--line);border-radius:9px}.toast{position:fixed;right:20px;bottom:20px;z-index:70;max-width:360px;padding:13px 16px;border-radius:10px;background:#151b24;color:#fff;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}.pill{display:inline-block;padding:4px 7px;border-radius:999px;background:#edf2ff;color:#3053bb;font-size:10px;font-weight:800}
        @media(max-width:720px){.top{padding:10px 14px;flex-wrap:wrap}.channel-select{order:3;width:100%}.top-links a:first-child{display:none}.shell{width:min(100% - 24px,620px);padding-top:26px}.heading{align-items:start}.summary{grid-template-columns:1fr 1fr 1fr}.summary article{padding:14px}.summary b{font-size:21px}.fields{grid-template-columns:1fr}.field.full{grid-column:auto}.toolbar{align-items:end}}
    </style>
</head>
<body>
<header class="top"><a class="brand" href="/">CREO</a><select class="channel-select" id="channel-select" aria-label="경매 채널"></select><nav class="top-links"><a href="channel-manager.html">채널 설정</a><a id="control-link" href="#">방송 제어</a><a id="live-link" href="#" target="_blank" rel="noopener">송출 화면</a></nav></header>
<main class="shell">
    <div class="heading"><div><h1 id="channel-name">채널 운영</h1><p id="channel-description">업체·개체·배송 정보는 이 채널 안에서만 사용됩니다.</p></div></div>
    <section class="summary"><article><span>참여 업체</span><b id="vendor-count">0</b></article><article><span>등록 개체</span><b id="item-count">0</b></article><article><span>배송 건</span><b id="shipment-count">0</b></article></section>
    <div class="tabs" role="tablist"><button class="tab active" data-tab="vendors">업체</button><button class="tab" data-tab="items">개체</button><button class="tab" data-tab="shipping">배송</button></div>
    <div class="toolbar"><p id="tab-help">이 경매에 참여하는 업체만 등록합니다.</p><button class="btn primary" id="add-record">＋ 업체 추가</button></div>
    <div class="table-wrap" id="table-wrap"></div>
</main>
<div class="modal" id="record-modal" hidden><form class="dialog" id="record-form"><div class="dialog-head"><h2 id="dialog-title">항목 추가</h2><button type="button" class="close" id="close-modal" aria-label="닫기">×</button></div><div class="fields" id="record-fields"></div><div class="dialog-actions"><button type="button" class="btn" id="cancel-modal">취소</button><button class="btn primary">저장</button></div></form></div>
<div class="login" id="login"><div class="login-box"><h2>운영자 확인</h2><p>기존 관리자 비밀번호를 입력해 주세요.</p><form id="login-form"><input type="password" id="password" autocomplete="current-password" required><button class="btn primary">확인</button></form></div></div>
<div class="toast" id="toast" role="status"></div>
<script>
const $=id=>document.getElementById(id),esc=v=>CreoPlatform.escapeHtml(v);let catalog={channels:[]},channelId='',data={vendors:[],items:[],shipments:[]},tab='vendors',editing=null;
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2500)}
function selectedChannel(){return catalog.channels.find(c=>c.id===channelId)}
function endpoint(type,id=''){return`channels/${encodeURIComponent(channelId)}/${type}${id?'/'+encodeURIComponent(id):''}`}
async function loadCatalog(){catalog=await CreoPlatform.api('channels');const requested=new URLSearchParams(location.search).get('channel');channelId=catalog.channels.some(c=>c.id===requested)?requested:(catalog.channels[0]?.id||'');$('channel-select').innerHTML=catalog.channels.map(c=>`<option value="${esc(c.id)}" ${c.id===channelId?'selected':''}>${esc(c.name)}</option>`).join('')}
async function loadWorkspace(){data=await CreoPlatform.api(endpoint('workspace'));const c=selectedChannel();$('channel-name').textContent=c?.name||channelId;$('channel-description').textContent=c?.description||'채널별 운영 공간';$('vendor-count').textContent=data.vendors.length;$('item-count').textContent=data.items.length;$('shipment-count').textContent=data.shipments.length;$('control-link').href=`auction-control.html?channel=${encodeURIComponent(channelId)}`;$('live-link').href=`broadcast-router.html?event=${encodeURIComponent(channelId)}&page=1&live=1`;render()}
function vendorName(id){return data.vendors.find(v=>v.id===id)?.name||'-'}function itemName(id){const i=data.items.find(v=>v.id===id);return i?`${String(i.lotNumber).padStart(3,'0')} · ${i.name}`:'-'}
function actions(type,id){return`<div class="row-actions"><button class="btn" data-edit="${esc(type)}:${esc(id)}">수정</button><button class="btn danger" data-delete="${esc(type)}:${esc(id)}">삭제</button></div>`}
function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));const help={vendors:'이 경매에 참여하는 업체만 등록합니다.',items:'업체와 경매 번호는 현재 채널 안에서만 연결됩니다.',shipping:'낙찰 배송 정보도 다른 경매와 완전히 분리됩니다.'};const labels={vendors:'업체 추가',items:'개체 추가',shipping:'배송 추가'};$('tab-help').textContent=help[tab];$('add-record').textContent='＋ '+labels[tab];let html='';if(tab==='vendors'){html=data.vendors.length?`<table><thead><tr><th>업체</th><th>코드</th><th>담당자</th><th>연락처</th><th>주소</th><th></th></tr></thead><tbody>${data.vendors.map(v=>`<tr><td><b>${esc(v.name)}</b></td><td>${esc(v.code||'-')}</td><td>${esc(v.manager||'-')}</td><td>${esc(v.phone||'-')}</td><td>${esc(v.address||'-')}</td><td>${actions('vendors',v.id)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">이 채널에 등록된 업체가 없습니다.</div>'}else if(tab==='items'){html=data.items.length?`<table><thead><tr><th>번호</th><th>개체</th><th>업체</th><th>시작가</th><th>상태</th><th></th></tr></thead><tbody>${data.items.slice().sort((a,b)=>a.lotNumber-b.lotNumber).map(i=>`<tr><td><b>${String(i.lotNumber).padStart(3,'0')}</b></td><td>${esc(i.name)}</td><td>${esc(vendorName(i.vendorId))}</td><td>${CreoPlatform.money(i.startPrice)}</td><td><span class="pill">${esc(i.status)}</span></td><td>${actions('items',i.id)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">이 채널에 등록된 개체가 없습니다.</div>'}else{html=data.shipments.length?`<table><thead><tr><th>개체</th><th>수령인</th><th>연락처</th><th>방식</th><th>상태</th><th></th></tr></thead><tbody>${data.shipments.map(s=>`<tr><td>${esc(itemName(s.itemId))}</td><td>${esc(s.recipientName||'-')}</td><td>${esc(s.recipientPhone||'-')}</td><td>${esc(s.method||'-')}</td><td><span class="pill">${esc(s.status)}</span></td><td>${actions('shipments',s.id)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">이 채널에 등록된 배송 정보가 없습니다.</div>'}$('table-wrap').innerHTML=html;document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const[t,id]=b.dataset.edit.split(':');openModal(t,data[t].find(r=>r.id===id))});document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=async()=>{const[t,id]=b.dataset.delete.split(':');if(!confirm('이 항목을 삭제할까요?'))return;try{await CreoPlatform.api(endpoint(t,id),{method:'DELETE'});await loadWorkspace();toast('삭제했습니다.')}catch(e){toast(e.message)}})}
function field(name,label,value='',type='text',options=''){if(type==='select')return`<div class="field"><label>${label}</label><select name="${name}">${options}</select></div>`;if(type==='textarea')return`<div class="field full"><label>${label}</label><textarea name="${name}">${esc(value)}</textarea></div>`;return`<div class="field"><label>${label}</label><input name="${name}" type="${type}" value="${esc(value)}"></div>`}
function optionList(rows,current,label){return`<option value="">선택</option>`+rows.map(r=>`<option value="${esc(r.id)}" ${r.id===current?'selected':''}>${esc(label(r))}</option>`).join('')}
function openModal(type,record=null){editing=record?{type,id:record.id}:{type,id:''};let f='';if(type==='vendors'){f+=field('name','업체명',record?.name);f+=field('code','업체 코드',record?.code);f+=field('manager','담당자',record?.manager);f+=field('phone','연락처',record?.phone);f+=field('address','주소',record?.address,'textarea');f+=field('note','메모',record?.note,'textarea')}else if(type==='items'){f+=field('lotNumber','경매 번호',record?.lotNumber,'number');f+=field('name','개체명',record?.name);f+=field('vendorId','참여 업체','select',optionList(data.vendors,record?.vendorId,v=>v.name));f+=field('startPrice','시작가',record?.startPrice,'number');f+=field('status','상태','select',`<option value="waiting" ${record?.status==='waiting'?'selected':''}>대기</option><option value="live" ${record?.status==='live'?'selected':''}>진행 중</option><option value="sold" ${record?.status==='sold'?'selected':''}>낙찰</option><option value="passed" ${record?.status==='passed'?'selected':''}>유찰</option>`);f+=field('photoUrl','대표 이미지 URL',record?.photoUrl);f+=field('note','설명',record?.note,'textarea')}else{f+=field('itemId','개체','select',optionList(data.items,record?.itemId,i=>`${String(i.lotNumber).padStart(3,'0')} · ${i.name}`));f+=field('vendorId','발송 업체','select',optionList(data.vendors,record?.vendorId,v=>v.name));f+=field('recipientName','수령인',record?.recipientName);f+=field('recipientPhone','연락처',record?.recipientPhone);f+=field('method','수령 방식','select',`<option value="delivery" ${record?.method==='delivery'?'selected':''}>배송</option><option value="pickup" ${record?.method==='pickup'?'selected':''}>직접수령</option>`);f+=field('status','처리 상태','select',`<option value="pending" ${record?.status==='pending'?'selected':''}>입력 대기</option><option value="ready" ${record?.status==='ready'?'selected':''}>발송 준비</option><option value="shipped" ${record?.status==='shipped'?'selected':''}>발송 완료</option><option value="complete" ${record?.status==='complete'?'selected':''}>수령 완료</option>`);f+=field('address','배송 주소',record?.address,'textarea');f+=field('carrier','택배/배송 업체',record?.carrier);f+=field('trackingNumber','송장번호',record?.trackingNumber);f+=field('cost','배송비',record?.cost,'number');f+=field('note','메모',record?.note,'textarea')}$('record-fields').innerHTML=f;$('dialog-title').textContent=(record?'수정 · ':'추가 · ')+({vendors:'업체',items:'개체',shipments:'배송'}[type]);$('record-modal').hidden=false}
function closeModal(){$('record-modal').hidden=true;editing=null}$('close-modal').onclick=$('cancel-modal').onclick=closeModal;$('add-record').onclick=()=>openModal(tab);document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;history.replaceState(null,'',`?channel=${encodeURIComponent(channelId)}&tab=${tab}`);render()});
$('record-form').onsubmit=async e=>{e.preventDefault();const form=Object.fromEntries(new FormData(e.currentTarget));['lotNumber','startPrice','cost'].forEach(k=>{if(k in form)form[k]=Number(form[k])||0});try{const path=endpoint(editing.type,editing.id),method=editing.id?'PUT':'POST';await CreoPlatform.api(path,{method,body:JSON.stringify({record:form})});closeModal();await loadWorkspace();toast('저장했습니다.')}catch(err){toast(err.message)}};
$('channel-select').onchange=async e=>{channelId=e.target.value;history.replaceState(null,'',`?channel=${encodeURIComponent(channelId)}&tab=${tab}`);await loadWorkspace()};
$('login-form').onsubmit=async e=>{e.preventDefault();try{CreoPlatform.setAdmin($('password').value);if(!await CreoPlatform.verifyAdmin())throw new Error('비밀번호가 맞지 않습니다.');$('login').hidden=true;await loadCatalog();tab=new URLSearchParams(location.search).get('tab')||'vendors';await loadWorkspace()}catch(err){toast(err.message)}};
(async()=>{if(CreoPlatform.getAdmin()){try{if(await CreoPlatform.verifyAdmin()){$('login').hidden=true;await loadCatalog();tab=new URLSearchParams(location.search).get('tab')||'vendors';await loadWorkspace();return}}catch(_){CreoPlatform.setAdmin('')}}$('login').hidden=false})();
</script></body></html>
