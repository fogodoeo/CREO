<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"><title>경매별 배송 · CREO</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"><script src="platform-client.js?v=20260720-platform-v1"></script><script src="supabase-bridge.js?v=20260720-quota-fallback-v2"></script>
    <style>
        :root{color-scheme:light;--bg:#f4f5f7;--panel:#fff;--line:#dfe3e8;--line2:#edf0f3;--text:#171a1f;--muted:#747d89;--blue:#2456d8;--green:#14835c;--orange:#b86514;--red:#c43f48}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Pretendard Variable",Pretendard,sans-serif;letter-spacing:-.018em}button,input,select,textarea{font:inherit}.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:16px;height:66px;padding:0 max(20px,calc((100% - 1240px)/2));border-bottom:1px solid var(--line);background:rgba(255,255,255,.94);backdrop-filter:blur(12px)}.brand{color:#15181d;font-weight:920;letter-spacing:.14em;text-decoration:none}.channel{height:40px;min-width:230px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:#fff;font-weight:760}.top nav{display:flex;gap:5px;margin-left:auto}.top nav a{padding:9px 11px;border-radius:8px;color:var(--muted);font-size:11px;font-weight:780;text-decoration:none}.top nav a:hover{background:#f0f2f5;color:#111}.shell{width:min(1240px,calc(100% - 32px));margin:auto;padding:34px 0 80px}.heading{display:flex;align-items:end;justify-content:space-between;gap:20px}.eyebrow{color:var(--blue);font-size:10px;font-weight:900;letter-spacing:.14em}.heading h1{margin:7px 0 0;font-size:34px;letter-spacing:-.05em}.heading p{margin:7px 0 0;color:var(--muted);font-size:13px}.add{height:42px;padding:0 15px;border:0;border-radius:8px;background:var(--blue);color:#fff;font-weight:820;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:25px 0}.stat{padding:17px;border:1px solid var(--line);border-radius:11px;background:#fff}.stat span{color:var(--muted);font-size:10px;font-weight:760}.stat b{display:block;margin-top:6px;font-size:25px}.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}.search{flex:1;max-width:390px;height:41px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:#fff}.filter{height:41px;padding:0 11px;border:1px solid var(--line);border-radius:8px;background:#fff}.table{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff}table{width:100%;border-collapse:collapse;white-space:nowrap}th,td{padding:13px 14px;border-bottom:1px solid var(--line2);text-align:left;font-size:12px}th{background:#fafbfc;color:var(--muted);font-size:10px;letter-spacing:.04em}tbody tr:last-child td{border-bottom:0}tbody tr:hover{background:#fafcff}.lot{font-variant-numeric:tabular-nums;font-weight:850}.recipient b{display:block}.recipient span{display:block;margin-top:3px;color:var(--muted);font-size:10px}.pill{display:inline-flex;padding:4px 8px;border-radius:999px;background:#eef2f7;color:#586372;font-size:10px;font-weight:820}.pill.ready{background:#fff4e6;color:var(--orange)}.pill.shipped{background:#eaf2ff;color:var(--blue)}.pill.complete{background:#e9f7f1;color:var(--green)}.actions{display:flex;gap:5px}.actions button{height:30px;padding:0 9px;border:1px solid var(--line);border-radius:7px;background:#fff;color:#505a67;font-size:10px;font-weight:760;cursor:pointer}.empty{padding:70px 20px;color:var(--muted);text-align:center}.modal{position:fixed;inset:0;z-index:30;display:grid;place-items:center;padding:20px;background:rgba(10,13,18,.55);backdrop-filter:blur(6px)}.modal[hidden]{display:none}.dialog{width:min(700px,100%);max-height:calc(100vh - 36px);overflow:auto;padding:24px;border-radius:15px;background:#fff;box-shadow:0 30px 90px #0005}.dialog-head{display:flex;align-items:center;justify-content:space-between}.dialog h2{margin:0;font-size:21px}.close{width:34px;height:34px;border:0;border-radius:50%;background:#f0f2f5;font-size:20px;cursor:pointer}.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}.field.full{grid-column:1/-1}.field label{display:block;margin-bottom:6px;color:var(--muted);font-size:10px;font-weight:760}.field input,.field select,.field textarea{width:100%;min-height:42px;padding:9px 10px;border:1px solid #d7dce2;border-radius:8px;background:#fff}.field textarea{min-height:75px;resize:vertical}.dialog-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:20px}.btn{height:40px;padding:0 14px;border:1px solid var(--line);border-radius:8px;background:#fff;font-weight:760;cursor:pointer}.btn.primary{border-color:var(--blue);background:var(--blue);color:#fff}.login{position:fixed;inset:0;z-index:60;display:grid;place-items:center;background:#15181dcc}.login[hidden]{display:none}.login form{display:flex;gap:8px;width:min(410px,calc(100% - 32px));padding:22px;border-radius:13px;background:#fff}.login input{flex:1;min-width:0;height:42px;padding:0 10px;border:1px solid var(--line);border-radius:8px}.toast{position:fixed;right:18px;bottom:18px;z-index:70;padding:12px 15px;border-radius:8px;background:#17202c;color:#fff;opacity:0;transform:translateY(7px);transition:.2s}.toast.show{opacity:1;transform:none}@media(max-width:760px){.top{height:auto;padding:10px 14px;flex-wrap:wrap}.channel{order:3;width:100%}.shell{width:min(100% - 22px,640px);padding-top:25px}.heading{align-items:start}.stats{grid-template-columns:1fr 1fr}.toolbar{align-items:stretch;flex-direction:column}.search{max-width:none}.fields{grid-template-columns:1fr}.field.full{grid-column:auto}.top nav a:first-child{display:none}}
    </style>
</head>
<body><header class="top"><a class="brand" href="/">CREO</a><select class="channel" id="channel-select" aria-label="경매 채널"></select><nav><a id="manage-link">등록·목록·인쇄·기록</a><a id="control-link">방송 제어</a></nav></header><main class="shell"><header class="heading"><div><span class="eyebrow">CHANNEL SHIPPING</span><h1 id="title">배송 관리</h1><p>현재 경매의 낙찰·배송 정보만 표시됩니다.</p></div><button class="add" id="add">＋ 배송 등록</button></header><section class="stats"><article class="stat"><span>전체 배송</span><b id="total">0</b></article><article class="stat"><span>입력 대기</span><b id="pending">0</b></article><article class="stat"><span>발송 준비·완료</span><b id="moving">0</b></article><article class="stat"><span>수령 완료</span><b id="complete">0</b></article></section><div class="toolbar"><input class="search" id="search" placeholder="개체·수령인·연락처 검색"><select class="filter" id="filter"><option value="all">전체 상태</option><option value="pending">입력 대기</option><option value="ready">발송 준비</option><option value="shipped">발송 완료</option><option value="complete">수령 완료</option></select></div><div class="table" id="table"></div></main>
<div class="modal" id="modal" hidden><form class="dialog" id="form"><div class="dialog-head"><h2 id="dialog-title">배송 등록</h2><button class="close" id="close" type="button">×</button></div><div class="fields"><div class="field full"><label>낙찰 개체</label><select name="itemId" id="item"></select></div><div class="field"><label>수령인</label><input name="recipientName"></div><div class="field"><label>연락처</label><input name="recipientPhone"></div><div class="field"><label>수령 방식</label><select name="method"><option value="delivery">배송</option><option value="pickup">직접수령</option></select></div><div class="field"><label>처리 상태</label><select name="status"><option value="pending">입력 대기</option><option value="ready">발송 준비</option><option value="shipped">발송 완료</option><option value="complete">수령 완료</option></select></div><div class="field full"><label>배송 주소</label><textarea name="address"></textarea></div><div class="field"><label>택배·배송 업체</label><input name="carrier"></div><div class="field"><label>송장번호</label><input name="trackingNumber"></div><div class="field"><label>배송비</label><input name="cost" type="number" min="0"></div><div class="field full"><label>메모</label><textarea name="note"></textarea></div></div><div class="dialog-actions"><button class="btn" id="cancel" type="button">취소</button><button class="btn primary">저장</button></div></form></div>
<div class="login" id="login"><form id="login-form"><input id="password" type="password" autocomplete="current-password" placeholder="관리자 비밀번호" required><button class="btn primary">확인</button></form></div><div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id),esc=v=>CreoPlatform.escapeHtml(v);let catalog={channels:[]},channelId='',data={vendors:[],items:[],shipments:[]},editing=null;
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2400)}function channel(){return catalog.channels.find(c=>c.id===channelId)}function item(id){return data.items.find(i=>i.id===id)}function vendor(id){return data.vendors.find(v=>v.id===id)}function statusLabel(s){return{pending:'입력 대기',ready:'발송 준비',shipped:'발송 완료',complete:'수령 완료'}[s]||s||'입력 대기'}
async function loadCatalog(){catalog=await CreoPlatform.api('channels');const q=new URLSearchParams(location.search).get('channel');channelId=catalog.channels.some(c=>c.id===q)?q:(catalog.channels[0]?.id||'');$('channel-select').innerHTML=catalog.channels.map(c=>`<option value="${esc(c.id)}" ${c.id===channelId?'selected':''}>${esc(c.name)}</option>`).join('')}
async function load(){data=await CreoPlatform.api(`channels/${encodeURIComponent(channelId)}/workspace`);if(channelId==='cdcup'&&typeof getBroadcastItemsCached==='function'){const legacy=await getBroadcastItemsCached(false,15000);if(legacy.length){const existing=new Set(data.items.map(i=>i.id));for(const i of legacy){const id=`legacy_${i.row}`;if(!existing.has(id))data.items.push({id,lotNumber:Number(i.num)||0,name:i.name||i.displayName||'개체',vendorName:i.company||'',winnerName:i.winner||'',winnerPhone:i.winner_phone||'',legacy:true})}}}const c=channel();$('title').textContent=(c?.name||channelId)+' 배송 관리';$('manage-link').href=c?.legacy?.managementUrl?`${c.legacy.managementUrl}?channel=${encodeURIComponent(channelId)}`:`channel-workspace.html?channel=${encodeURIComponent(channelId)}`;$('control-link').href=`auction-control.html?channel=${encodeURIComponent(channelId)}`;render()}
function render(){const rows=data.shipments.filter(s=>{const i=item(s.itemId),q=$('search').value.trim().toLowerCase(),f=$('filter').value;return(f==='all'||s.status===f)&&(!q||[i?.name,s.itemName,s.recipientName,s.recipientPhone,s.trackingNumber].some(v=>String(v||'').toLowerCase().includes(q)))});$('total').textContent=data.shipments.length;$('pending').textContent=data.shipments.filter(s=>!s.status||s.status==='pending').length;$('moving').textContent=data.shipments.filter(s=>['ready','shipped'].includes(s.status)).length;$('complete').textContent=data.shipments.filter(s=>s.status==='complete').length;$('table').innerHTML=rows.length?`<table><thead><tr><th>번호·개체</th><th>업체</th><th>수령인</th><th>수령 방식</th><th>배송·송장</th><th>배송비</th><th>상태</th><th></th></tr></thead><tbody>${rows.map(s=>{const i=item(s.itemId),v=vendor(s.vendorId||i?.vendorId),lot=i?.lotNumber||s.itemLotNumber,name=i?.name||s.itemName||'삭제된 개체',vendorName=v?.name||i?.vendorName||s.itemVendorName||'-';return`<tr><td><span class="lot">${lot?String(lot).padStart(3,'0'):'---'}</span> · ${esc(name)}</td><td>${esc(vendorName)}</td><td class="recipient"><b>${esc(s.recipientName||i?.winnerName||'-')}</b><span>${esc(s.recipientPhone||i?.winnerPhone||'-')}</span></td><td>${esc(s.method==='pickup'?'직접수령':'배송')}</td><td>${esc([s.carrier,s.trackingNumber].filter(Boolean).join(' · ')||'-')}</td><td>${CreoPlatform.money(s.cost)}</td><td><span class="pill ${esc(s.status)}">${esc(statusLabel(s.status))}</span></td><td><div class="actions"><button data-edit="${esc(s.id)}">수정</button><button data-delete="${esc(s.id)}">삭제</button></div></td></tr>`}).join('')}</tbody></table>`:'<div class="empty">조건에 맞는 배송 정보가 없습니다.</div>';document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>open(data.shipments.find(s=>s.id===b.dataset.edit)));document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=async()=>{if(!confirm('이 배송 정보를 삭제할까요?'))return;try{await CreoPlatform.api(`channels/${encodeURIComponent(channelId)}/shipments/${encodeURIComponent(b.dataset.delete)}`,{method:'DELETE'});await load();toast('삭제했습니다.')}catch(e){toast(e.message)}})}
function open(record=null){editing=record?.id||'';$('dialog-title').textContent=record?'배송 정보 수정':'배송 등록';$('item').innerHTML='<option value="">개체 선택</option>'+data.items.slice().sort((a,b)=>a.lotNumber-b.lotNumber).map(i=>`<option value="${esc(i.id)}">${String(i.lotNumber).padStart(3,'0')} · ${esc(i.name)}</option>`).join('');for(const el of $('form').elements){if(!el.name)continue;el.value=record?.[el.name]??(el.name==='status'?'pending':el.name==='method'?'delivery':'')} $('modal').hidden=false}
function close(){$('modal').hidden=true;editing=null}$('add').onclick=()=>open();$('close').onclick=$('cancel').onclick=close;$('search').oninput=render;$('filter').onchange=render;$('channel-select').onchange=async e=>{channelId=e.target.value;history.replaceState(null,'',`?channel=${encodeURIComponent(channelId)}`);await load()};$('form').onsubmit=async e=>{e.preventDefault();const record=Object.fromEntries(new FormData(e.currentTarget));record.cost=Number(record.cost)||0;const selected=item(record.itemId);record.vendorId=selected?.vendorId||'';record.itemName=selected?.name||'';record.itemLotNumber=selected?.lotNumber||0;record.itemVendorName=selected?.vendorName||vendor(selected?.vendorId)?.name||'';record.recipientName=record.recipientName||selected?.winnerName||'';record.recipientPhone=record.recipientPhone||selected?.winnerPhone||'';try{await CreoPlatform.api(`channels/${encodeURIComponent(channelId)}/shipments${editing?'/'+encodeURIComponent(editing):''}`,{method:editing?'PUT':'POST',body:JSON.stringify({record})});close();await load();toast('배송 정보를 저장했습니다.')}catch(err){toast(err.message)}};
async function boot(){await loadCatalog();await load()}$('login-form').onsubmit=async e=>{e.preventDefault();try{CreoPlatform.setAdmin($('password').value);if(!await CreoPlatform.verifyAdmin())throw new Error('비밀번호가 맞지 않습니다.');$('login').hidden=true;await boot()}catch(e){toast(e.message)}};(async()=>{if(CreoPlatform.getAdmin()){try{if(await CreoPlatform.verifyAdmin()){$('login').hidden=true;await boot();return}}catch(_){CreoPlatform.setAdmin('')}}$('login').hidden=false})();
</script></body></html>
