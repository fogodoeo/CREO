<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
    <title>CREO 통합 송출</title>
    <style>
        html,body{width:100%;height:100%;min-height:100dvh;margin:0;overflow:hidden;background:transparent}
        iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:transparent}
        .status{position:fixed;top:14px;left:14px;z-index:2;padding:9px 11px;border:1px solid #ffffff26;background:#000b;color:#fff;font:800 12px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
        body:not(.debug) .status{display:none}
    </style>
</head>
<body>
<iframe id="broadcast-frame" title="CREO 송출 화면" allowtransparency="true"></iframe>
<div class="status" id="status">송출 화면 연결 중</div>
<script>
const params=new URLSearchParams(location.search),frame=document.getElementById('broadcast-frame'),statusEl=document.getElementById('status');let lastChannel='',lastPage='';
if(params.get('debug')==='1')document.body.classList.add('debug');
function normalize(value){const id=String(value||'').toLowerCase().replace(/[^a-z0-9-]/g,'').slice(0,32);return id==='crewarts'?'crewart':id}
function page(){return ['1','2','3'].includes(params.get('page'))?params.get('page'):'1'}
async function refresh(){try{let channel=normalize(params.get('event'));if(!channel){const response=await fetch('/api/platform/active-channel',{cache:'no-store'});if(!response.ok)throw new Error(`채널 연결 오류 ${response.status}`);channel=normalize((await response.json()).channelId)}if(!channel)throw new Error('운영 채널이 없습니다.');const selectedPage=page();if(channel!==lastChannel||selectedPage!==lastPage){frame.src=`auction-live.html?channel=${encodeURIComponent(channel)}&page=${selectedPage}`;lastChannel=channel;lastPage=selectedPage;statusEl.textContent=`${channel} · ${selectedPage}P 송출 중`}}catch(error){statusEl.textContent=error.message||String(error);document.body.classList.add('debug')}}
refresh();setInterval(refresh,1000);
</script>
</body>
</html>
