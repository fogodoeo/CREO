<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>통합 방송 제어 · CREO</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"><script src="platform-client.js?v=20260720-platform-v1"></script>
    <style>
        :root{color-scheme:dark;--bg:#090c11;--panel:#121720;--line:#29313e;--text:#f5f7fb;--muted:#8f99a8;--accent:#d7b66d}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Pretendard Variable,Pretendard,sans-serif;letter-spacing:-.018em}button,input,select{font:inherit}.top{display:flex;align-items:center;gap:16px;min-height:66px;padding:0 24px;border-bottom:1px solid var(--line);background:#0d1117}.brand{color:var(--text);font-weight:900;letter-spacing:.12em;text-decoration:none}.top select{height:40px;min-width:230px;padding:0 12px;border:1px solid var(--line);border-radius:10px;background:#151b24;color:var(--text);font-weight:760}.top a.live{margin-left:auto;padding:10px 13px;border-radius:10px;background:var(--accent);color:#171108;font-size:12px;font-weight:820;text-decoration:none}.layout{display:grid;grid-template-columns:400px minmax(0,1fr);min-height:calc(100vh - 67px)}.control{padding:26px;border-right:1px solid var(--line);overflow:auto}.control h1{margin:0;font-size:27px}.control>p{margin:8px 0 24px;color:var(--muted);font-size:13px}.group{margin-top:22px;padding-top:20px;border-top:1px solid var(--line)}.group label{display:block;margin-bottom:8px;color:var(--muted);font-size:11px;font-weight:760}.group select,.group input{width:100%;height:45px;padding:0 12px;border:1px solid #333d4a;border-radius:10px;background:#0c1016;color:var(--text)}.seg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.seg button{min-height:42px;padding:0 5px;border:1px solid var(--line);border-radius:9px;background:#171d27;color:var(--muted);font-size:11px;font-weight:770;cursor:pointer}.seg button.active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,#151b24);color:var(--accent)}.page-seg{grid-template-columns:repeat(3,1fr)}.save{width:100%;min-height:48px;margin-top:24px;border:0;border-radius:11px;background:var(--accent);color:#181208;font-weight:850;cursor:pointer}.hint{margin-top:14px;color:#6f7987;font-size:11px;line-height:1.55}.preview{display:grid;place-items:center;padding:28px;background:radial-gradient(circle at center,#1b2330,#080b10 70%)}.frame-wrap{position:relative;width:min(100%,calc((100vh - 122px)*16/9));aspect-ratio:16/9;overflow:hidden;border:1px solid #303a48;border-radius:14px;background:#000;box-shadow:0 30px 90px #0008}.frame-wrap iframe{width:100%;height:100%;border:0}.toast{position:fixed;right:20px;bottom:20px;padding:13px 16px;border:1px solid #394352;border-radius:10px;background:#171e28;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}.login{position:fixed;inset:0;z-index:40;display:grid;place-items:center;background:#080b10e8}.login[hidden]{display:none}.login form{display:flex;gap:8px;width:min(420px,calc(100% - 40px));padding:24px;border:1px solid var(--line);border-radius:16px;background:var(--panel)}.login input{flex:1;min-width:0;height:43px;padding:0 11px;border:1px solid var(--line);border-radius:9px;background:#0a0e14;color:var(--text)}.login button{padding:0 15px;border:0;border-radius:9px;background:var(--accent);font-weight:800}@media(max-width:900px){.layout{grid-template-columns:1fr}.control{border-right:0}.preview{min-height:420px}.top{padding:10px 14px;flex-wrap:wrap}.top select{order:3;width:100%}}
    </style>
</head>
<body>
<header class="top"><a class="brand" href="/">CREO</a><select id="channel-select" aria-label="경매 채널"></select><a class="live" id="open-live" href="#" target="_blank" rel="noopener">송출 화면 열기</a></header>
<main class="layout"><section class="control"><h1 id="title">방송 제어</h1><p>이 화면 하나에서 채널과 디자인을 함께 전환합니다.</p><div class="group"><label for="active-item">현재 개체</label><select id="active-item"></select></div><div class="group"><label>방송 상태</label><div class="seg" id="mode-buttons"><button data-value="standby">대기</button><button data-value="live">진행</button><button data-value="sold">낙찰</button><button data-value="summary">목록</button></div></div><div class="group"><label>송출 페이지</label><div class="seg page-seg" id="page-buttons"><button data-value="1">1P</button><button data-value="2">2P</button><button data-value="3">3P</button></div></div><div class="group"><label for="headline">화면 문구</label><input id="headline" maxlength="120" placeholder="경매가 곧 시작됩니다"></div><button class="save" id="save">방송에 적용</button><p class="hint">적용하면 열려 있는 송출 화면이 약 1초 안에 자동으로 바뀝니다. 채널을 바꾸면 해당 채널의 개체와 디자인만 표시됩니다.</p></section><section class="preview"><div class="frame-wrap"><iframe id="preview-frame" title="방송 미리보기"></iframe></div></section></main>
<div class="login" id="login"><form id="login-form"><input type="password" id="password" autocomplete="current-password" placeholder="관리자 비밀번호" required><button>확인</button></form></div><div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);let catalog={channels:[]},channelId='',workspace=null,state={mode:'standby',page:1,activeItemId:'',headline:''};
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2300)}function syncButtons(){document.querySelectorAll('#mode-buttons button').forEach(b=>b.classList.toggle('active',b.dataset.value===state.mode));document.querySelectorAll('#page-buttons button').forEach(b=>b.classList.toggle('active',Number(b.dataset.value)===Number(state.page)))}function links(){const preview=`broadcast-router.html?event=${encodeURIComponent(channelId)}&page=${state.page}&debug=0`;if($('preview-frame').getAttribute('src')!==preview)$('preview-frame').src=preview;$('open-live').href=`broadcast-router.html?page=${state.page}`}
async function loadCatalog(){catalog=await CreoPlatform.api('channels');const q=new URLSearchParams(location.search).get('channel');channelId=catalog.channels.some(c=>c.id===q)?q:(catalog.channels[0]?.id||'');$('channel-select').innerHTML=catalog.channels.map(c=>`<option value="${c.id}" ${c.id===channelId?'selected':''}>${CreoPlatform.escapeHtml(c.name)}</option>`).join('')}
async function load(){workspace=await CreoPlatform.api(`channels/${encodeURIComponent(channelId)}/workspace`);state={mode:'standby',page:1,activeItemId:'',headline:'',...(workspace.broadcast||{})};const c=catalog.channels.find(c=>c.id===channelId);$('title').textContent=(c?.name||channelId)+' 방송';$('active-item').innerHTML='<option value="">개체 선택</option>'+workspace.items.slice().sort((a,b)=>a.lotNumber-b.lotNumber).map(i=>`<option value="${i.id}" ${i.id===state.activeItemId?'selected':''}>${String(i.lotNumber).padStart(3,'0')} · ${CreoPlatform.escapeHtml(i.name)}</option>`).join('');$('headline').value=state.headline||'';syncButtons();links()}
document.querySelectorAll('#mode-buttons button').forEach(b=>b.onclick=()=>{state.mode=b.dataset.value;syncButtons()});document.querySelectorAll('#page-buttons button').forEach(b=>b.onclick=()=>{state.page=Number(b.dataset.value);syncButtons();links()});$('active-item').onchange=e=>state.activeItemId=e.target.value;$('headline').oninput=e=>state.headline=e.target.value;$('channel-select').onchange=async e=>{channelId=e.target.value;history.replaceState(null,'',`?channel=${encodeURIComponent(channelId)}`);await load()};$('save').onclick=async()=>{try{state.activeItemId=$('active-item').value;state.headline=$('headline').value;await CreoPlatform.api('active-channel',{method:'PUT',body:JSON.stringify({channelId})});const r=await CreoPlatform.api(`channels/${encodeURIComponent(channelId)}/broadcast-state`,{method:'PUT',body:JSON.stringify(state)});state={...state,...r.state};links();toast('통합 송출이 이 채널로 전환됐습니다.')}catch(e){toast(e.message)}};
async function boot(){await loadCatalog();await load()}$('login-form').onsubmit=async e=>{e.preventDefault();try{CreoPlatform.setAdmin($('password').value);if(!await CreoPlatform.verifyAdmin())throw new Error('비밀번호가 맞지 않습니다.');$('login').hidden=true;await boot()}catch(e){toast(e.message)}};(async()=>{if(CreoPlatform.getAdmin()){try{if(await CreoPlatform.verifyAdmin()){$('login').hidden=true;await boot();return}}catch(_){CreoPlatform.setAdmin('')}}$('login').hidden=false})();
</script></body></html>
