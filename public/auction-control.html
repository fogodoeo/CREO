<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
    <title>CREO 방송 제어</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"><script src="platform-client.js?v=20260720-platform-v1"></script>
    <style>
        :root{color-scheme:dark;--bg:#090b0f;--rail:#0d1015;--panel:#13171d;--panel2:#181d25;--line:#29303a;--text:#f4f6f8;--muted:#8d96a3;--accent:#d4ad60;--blue:#668cff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Pretendard Variable",Pretendard,sans-serif;letter-spacing:-.018em}button,input,select,textarea{font:inherit}.top{height:64px;display:flex;align-items:center;gap:18px;padding:0 22px;border-bottom:1px solid var(--line);background:#0b0e12}.brand{color:#fff;font-weight:900;letter-spacing:.14em;text-decoration:none}.channel{height:40px;min-width:230px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:#151a21;color:#fff;font-weight:760}.source-links{display:flex;gap:5px;margin-left:auto}.source-links a{padding:9px 12px;border:1px solid var(--line);border-radius:8px;color:#aeb7c3;font-size:11px;font-weight:800;text-decoration:none}.source-links a:hover{color:#fff;border-color:#4a5565}.layout{display:grid;grid-template-columns:430px minmax(0,1fr);height:calc(100vh - 65px)}.controls{overflow:auto;border-right:1px solid var(--line);background:var(--rail)}.controls-head{padding:25px 24px 19px}.eyebrow{color:var(--accent);font-size:10px;font-weight:900;letter-spacing:.14em}.controls h1{margin:6px 0 0;font-size:25px}.controls-head p{margin:7px 0 0;color:var(--muted);font-size:12px}.page-tabs{position:sticky;top:0;z-index:3;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;padding:0 24px 15px;background:var(--rail)}.page-tab{height:46px;border:1px solid var(--line);background:#131820;color:#828c99;font-weight:850;cursor:pointer}.page-tab:first-child{border-radius:9px 0 0 9px}.page-tab:last-child{border-radius:0 9px 9px 0}.page-tab.active{border-color:var(--accent);background:#221d13;color:var(--accent)}.panel{display:none;padding:0 24px 120px}.panel.active{display:block}.section{padding:20px 0;border-top:1px solid #222933}.section:first-child{border-top:0}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.section h2{margin:0;font-size:13px}.section small{color:#6f7987;font-size:10px}.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field.full{grid-column:1/-1}.field label{display:block;margin:0 0 6px;color:#929ba7;font-size:10px;font-weight:760}.field input,.field select,.field textarea{width:100%;min-height:41px;padding:9px 10px;border:1px solid #303844;border-radius:8px;outline:none;background:#0b0f14;color:#fff}.field textarea{min-height:68px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(102,140,255,.1)}.switch-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.switch{display:flex;align-items:center;gap:9px;min-height:40px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#11161d;color:#bbc3cd;font-size:11px;font-weight:720}.switch input{accent-color:var(--accent)}.mode{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.mode button{height:40px;border:1px solid var(--line);border-radius:8px;background:#131820;color:#838d9a;font-size:11px;font-weight:800;cursor:pointer}.mode button.active{border-color:var(--blue);background:#18213a;color:#9eb5ff}.savebar{position:fixed;bottom:0;left:0;z-index:5;width:430px;padding:14px 24px 18px;border-top:1px solid var(--line);background:rgba(13,16,21,.95);backdrop-filter:blur(12px)}.save{width:100%;height:48px;border:0;border-radius:9px;background:var(--accent);color:#171107;font-weight:900;cursor:pointer}.preview{position:relative;display:grid;place-items:center;padding:30px;background:radial-gradient(circle at 50% 36%,#202836,#080a0e 66%)}.preview-head{position:absolute;top:16px;left:22px;color:#7f8996;font-size:10px;font-weight:850;letter-spacing:.1em}.frame{position:relative;width:min(100%,calc((100vh - 134px)*16/9));aspect-ratio:16/9;overflow:hidden;border:1px solid #37404c;border-radius:6px;background:#0a0d12;box-shadow:0 26px 90px #0009}.frame:before{content:"CAMERA PREVIEW";position:absolute;top:50%;left:50%;color:#29313c;font-size:11px;font-weight:900;letter-spacing:.17em;transform:translate(-50%,-50%)}iframe{position:absolute;inset:0;width:100%;height:100%;border:0}.login{position:fixed;inset:0;z-index:40;display:grid;place-items:center;background:#080a0edb;backdrop-filter:blur(12px)}.login[hidden]{display:none}.login form{display:flex;gap:8px;width:min(420px,calc(100% - 32px));padding:24px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}.login input{flex:1;min-width:0;height:43px;padding:0 11px;border:1px solid var(--line);border-radius:8px;background:#0b0e13;color:#fff}.login button{padding:0 15px;border:0;border-radius:8px;background:var(--accent);font-weight:850}.toast{position:fixed;right:20px;bottom:20px;z-index:50;padding:12px 15px;border:1px solid #35404e;border-radius:8px;background:#19202a;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:none}@media(max-width:950px){.layout{display:block;height:auto}.controls{border-right:0}.preview{min-height:430px}.savebar{width:100%}.source-links a:not(:first-child){display:none}}@media(max-width:520px){.top{height:auto;padding:10px 12px;flex-wrap:wrap}.channel{order:3;width:100%}.layout{height:auto}.fields,.switch-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.controls-head,.panel{padding-right:16px;padding-left:16px}.page-tabs{padding-right:16px;padding-left:16px}.preview{padding:14px;min-height:280px}.savebar{padding:10px 16px}.source-links{margin-left:auto}}
    </style>
</head>
<body>
<header class="top"><a class="brand" href="/">CREO</a><select class="channel" id="channel-select" aria-label="경매 채널"></select><nav class="source-links"><a id="source-1" target="_blank" rel="noopener">1P 송출</a><a id="source-2" target="_blank" rel="noopener">2P 송출</a><a id="source-3" target="_blank" rel="noopener">3P 송출</a></nav></header>
<main class="layout"><section class="controls"><div class="controls-head"><span class="eyebrow">BROADCAST OVERLAY</span><h1 id="title">방송 제어</h1><p>카메라별 오버레이를 각각 설정합니다.</p></div><div class="page-tabs"><button class="page-tab active" data-page="1">1P 진행자</button><button class="page-tab" data-page="2">2P 개체</button><button class="page-tab" data-page="3">3P 추가정보</button></div>
<form id="control-form">
<div class="panel active" data-panel="1"><div class="section"><div class="section-head"><h2>진행자 정보</h2><small>카메라 1 상시 표시</small></div><div class="switch-grid"><label class="switch"><input name="page1HostsOn" type="checkbox"> 진행자 정보 표시</label><label class="switch"><input name="page1NoticeOn" type="checkbox"> 공지 표시</label></div><div class="fields" style="margin-top:10px"><div class="field"><label>진행자 1 이름</label><input name="hostName1" maxlength="60"></div><div class="field"><label>역할</label><input name="hostRole1" maxlength="40" placeholder="MAIN HOST"></div><div class="field"><label>진행자 2 이름</label><input name="hostName2" maxlength="60"></div><div class="field"><label>역할</label><input name="hostRole2" maxlength="40" placeholder="CO-HOST"></div></div></div><div class="section"><div class="section-head"><h2>공지·하단 자막</h2></div><div class="switch-grid"><label class="switch"><input name="page1TickerOn" type="checkbox"> 하단 자막 표시</label><label class="switch"><input name="page1BannerOn" type="checkbox"> 배너 표시</label></div><div class="fields" style="margin-top:10px"><div class="field full"><label>공지 제목</label><input name="notice" maxlength="160"></div><div class="field full"><label>공지 세부 문구</label><textarea name="noticeDetail" maxlength="200"></textarea></div><div class="field full"><label>하단 자막</label><input name="page1Ticker" maxlength="220"></div><div class="field full"><label>배너 이미지 URL</label><input name="page1BannerUrl" maxlength="600"></div></div></div></div>
<div class="panel" data-panel="2"><div class="section"><div class="section-head"><h2>현재 개체</h2><small>카메라 2 상시 표시</small></div><div class="field full"><label>송출할 개체</label><select name="activeItemId" id="active-item"></select></div><div class="mode" id="mode-buttons" style="margin-top:10px"><button type="button" data-mode="standby">대기</button><button type="button" data-mode="live">진행</button><button type="button" data-mode="sold">낙찰 공지</button></div></div><div class="section"><div class="section-head"><h2>표시 요소</h2></div><div class="switch-grid"><label class="switch"><input name="page2InfoOn" type="checkbox"> 개체·업체 정보</label><label class="switch"><input name="page2PhotoOn" type="checkbox"> 보조 사진</label><label class="switch"><input name="page2PriceOn" type="checkbox"> 가격 표시</label><label class="switch"><input name="page2SoldOn" type="checkbox"> 낙찰 연출</label><label class="switch"><input name="page2TickerOn" type="checkbox"> 하단 자막</label><label class="switch"><input name="page2BannerOn" type="checkbox"> 배너 표시</label></div><div class="fields" style="margin-top:10px"><div class="field full"><label>하단 자막</label><input name="page2Ticker" maxlength="220"></div><div class="field full"><label>배너 이미지 URL</label><input name="page2BannerUrl" maxlength="600"></div></div></div></div>
<div class="panel" data-panel="3"><div class="section"><div class="section-head"><h2>추가정보 송출</h2><small>필요할 때만 ON</small></div><label class="switch"><input name="page3On" type="checkbox"> 3P 화면 송출</label><div class="fields" style="margin-top:10px"><div class="field full"><label>화면 유형</label><select name="extraMode"><option value="bracket">대진표</option><option value="ranking">낙찰 순위</option><option value="status">낙찰 현황</option></select></div><div class="field full"><label>화면 제목</label><input name="page3Title" maxlength="120"></div></div></div></div>
</form><div class="savebar"><button class="save" id="save" type="button">방송에 적용</button></div></section><section class="preview"><span class="preview-head" id="preview-label">CAM 1 · HOST OVERLAY</span><div class="frame"><iframe id="preview-frame" title="송출 미리보기"></iframe></div></section></main>
<div class="login" id="login"><form id="login-form"><input type="password" id="password" autocomplete="current-password" placeholder="관리자 비밀번호" required><button>확인</button></form></div><div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id),form=$('control-form');let catalog={channels:[]},channelId='',workspace={items:[]},state={},page=1,mode='standby';
const defaults={mode:'standby',page:1,activeItemId:'',hostName1:'',hostRole1:'MAIN HOST',hostName2:'',hostRole2:'CO-HOST',notice:'',noticeDetail:'',page1HostsOn:true,page1NoticeOn:true,page1TickerOn:true,page1BannerOn:false,page1Ticker:'',page1BannerUrl:'',page2InfoOn:true,page2PhotoOn:true,page2PriceOn:true,page2SoldOn:true,page2TickerOn:true,page2BannerOn:false,page2Ticker:'',page2BannerUrl:'',page3On:false,extraMode:'bracket',page3Title:''};
function toast(m){const e=$('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2300)}
function sourceUrl(p){return`broadcast-router.html?event=${encodeURIComponent(channelId)}&page=${p}`}
function syncLinks(){for(let p=1;p<=3;p++)$('source-'+p).href=sourceUrl(p)}
function syncPreview(){const labels={1:'CAM 1 · HOST OVERLAY',2:'CAM 2 · ITEM OVERLAY',3:'EXTRA INFO OVERLAY'};$('preview-label').textContent=labels[page];const src=`auction-live.html?channel=${encodeURIComponent(channelId)}&page=${page}&preview=1&r=${state.revision||0}`;if($('preview-frame').getAttribute('src')!==src)$('preview-frame').src=src}
function fill(){for(const el of form.elements){if(!el.name)continue;if(el.type==='checkbox')el.checked=state[el.name]!==false;else if(state[el.name]!==undefined)el.value=state[el.name]??''}mode=state.mode||'standby';$('active-item').innerHTML='<option value="">개체 선택</option>'+workspace.items.slice().sort((a,b)=>a.lotNumber-b.lotNumber).map(i=>`<option value="${CreoPlatform.escapeHtml(i.id)}" ${i.id===state.activeItemId?'selected':''}>${String(i.lotNumber).padStart(3,'0')} · ${CreoPlatform.escapeHtml(i.name)}</option>`).join('');syncMode()}
function read(){const next={...state};for(const el of form.elements){if(!el.name)continue;next[el.name]=el.type==='checkbox'?el.checked:el.value}next.mode=mode;next.page=page;return next}
function syncMode(){document.querySelectorAll('#mode-buttons button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode))}
function setPage(next){page=Number(next);document.querySelectorAll('.page-tab').forEach(b=>b.classList.toggle('active',Number(b.dataset.page)===page));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',Number(p.dataset.panel)===page));syncPreview()}
async function loadCatalog(){catalog=await CreoPlatform.api('channels');const q=new URLSearchParams(location.search).get('channel');channelId=catalog.channels.some(c=>c.id===q)?q:(catalog.channels[0]?.id||'');$('channel-select').innerHTML=catalog.channels.map(c=>`<option value="${CreoPlatform.escapeHtml(c.id)}" ${c.id===channelId?'selected':''}>${CreoPlatform.escapeHtml(c.name)}</option>`).join('')}
async function load(){workspace=await CreoPlatform.api(`channels/${encodeURIComponent(channelId)}/workspace`);state={...defaults,...(workspace.broadcast||{})};const channel=catalog.channels.find(c=>c.id===channelId);$('title').textContent=(channel?.name||channelId)+' 방송';fill();syncLinks();setPage(page)}
document.querySelectorAll('.page-tab').forEach(b=>b.onclick=()=>setPage(b.dataset.page));document.querySelectorAll('#mode-buttons button').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;syncMode()});$('channel-select').onchange=async e=>{channelId=e.target.value;history.replaceState(null,'',`?channel=${encodeURIComponent(channelId)}`);await load()};$('save').onclick=async()=>{try{state=read();await CreoPlatform.api('active-channel',{method:'PUT',body:JSON.stringify({channelId})});const saved=await CreoPlatform.api(`channels/${encodeURIComponent(channelId)}/broadcast-state`,{method:'PUT',body:JSON.stringify(state)});state={...state,...saved.state};syncPreview();toast('방송 오버레이를 적용했습니다.')}catch(e){toast(e.message)}};
async function boot(){await loadCatalog();await load()}$('login-form').onsubmit=async e=>{e.preventDefault();try{CreoPlatform.setAdmin($('password').value);if(!await CreoPlatform.verifyAdmin())throw new Error('비밀번호가 맞지 않습니다.');$('login').hidden=true;await boot()}catch(e){toast(e.message)}};(async()=>{if(CreoPlatform.getAdmin()){try{if(await CreoPlatform.verifyAdmin()){$('login').hidden=true;await boot();return}}catch(_){CreoPlatform.setAdmin('')}}$('login').hidden=false})();
</script></body></html>
